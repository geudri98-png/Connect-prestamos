                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <p className="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Total a Pagar</p>
                                            <p className="text-xl font-black text-emerald-400">{currency}{Math.round(loanPreview.totalToPay).toLocaleString()}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Valor de Cuota</p>
                                            <p className="text-xl font-black">{currency}{Math.round(loanPreview.installmentAmount).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-3 border-t border-slate-700/50">
                                        <p className="text-[9px] text-slate-400 uppercase tracking-widest">Interés Total Generado</p>
                                        <p className="font-bold text-sm text-indigo-300">{currency}{Math.round(loanPreview.totalInterest).toLocaleString()} {loanForm.type === 'Rédito' && <span className="text-[8px] uppercase">/ {loanForm.frequency}</span>}</p>
                                    </div>
                                </div>

                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto del Préstamo ({currency})</label><input type="number" value={loanForm.amount} onChange={e => setLoanForm({...loanForm, amount: e.target.value})} className="w-full p-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] font-black text-xl text-center outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Modalidad</label><select value={loanForm.type} onChange={e => setLoanForm({...loanForm, type: e.target.value, installments: e.target.value === 'Rédito' ? '1' : loanForm.installments})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500 appearance-none text-center cursor-pointer"><option value="Amortizado">Amortizado</option><option value="Rédito">Solo Rédito</option></select></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">% Interés</label><input type="number" step="0.1" value={loanForm.interest} onChange={e => setLoanForm({...loanForm, interest: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500" required /></div>
                                </div>

                                {loanForm.type === 'Amortizado' && (
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cálculo de Interés</label>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                                            <button type="button" onClick={() => setLoanForm({...loanForm, interestType: 'Fijo'})} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${loanForm.interestType === 'Fijo' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Fijo (Monto x %)</button>
                                            <button type="button" onClick={() => setLoanForm({...loanForm, interestType: 'Por Cuota'})} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${loanForm.interestType === 'Por Cuota' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Por Cuota (Sube)</button>
                                        </div>
                                    </div>
                                )}
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select value={loanForm.frequency} onChange={e => setLoanForm({...loanForm, frequency: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500 appearance-none text-center cursor-pointer"><option value="Diario">Diario</option><option value="Semanal">Semanal</option><option value="Quincenal">Quincenal</option><option value="Mensual">Mensual</option></select></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Total Cuotas</label><input type="number" min="1" value={loanForm.installments} onChange={e => setLoanForm({...loanForm, installments: e.target.value})} disabled={loanForm.type === 'Rédito'} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500 disabled:opacity-50" required /></div>
                                </div>

                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Fecha de Entrega</label><input type="date" value={loanForm.startDate} onChange={e => setLoanForm({...loanForm, startDate: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500 text-slate-700" required /></div>

                                <button type="submit" className="w-full bg-emerald-500 text-white p-5 rounded-[2.2rem] font-black text-lg shadow-xl shadow-emerald-500/30 active:scale-95 transition-transform mt-6">Aprobar Préstamo</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL TRANSACCIÓN (COBRO) */}
                    {isTransacting && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-8 w-full max-w-sm shadow-2xl animate-in relative">
                                <button onClick={() => setIsTransacting(false)} className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200"><Icon name="x"/></button>
                                
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4"><Icon name="wallet" size={28}/></div>
                                    <h3 className="heading-font text-2xl font-black text-slate-800">Registrar Cobro</h3>
                                </div>

                                <div className="space-y-6">
                                    {(selectedClient.loan?.type === 'Rédito' || selectedClient.loan?.type === 'Amortizado') && (
                                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-4">
                                            <button onClick={() => setTransactionType('Interés')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Interés' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Pago Normal</button>
                                            <button onClick={() => setTransactionType('Capital')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Capital' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Abono Extra a Capital</button>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col gap-3">
                                        <div className="flex justify-between items-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Deuda Actual' : 'Cuota Base'}</p>
                                            <p className="text-lg font-black text-slate-700">{currency}{Math.round(transactionType === 'Capital' ? selectedClient.totalDebt : selectedClient.loan?.installmentAmount).toLocaleString()}</p>
                                        </div>
                                        {(selectedClient.loan?.partialCredit > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Abono previo</p>
                                                <p className="text-lg font-black text-indigo-600">-{currency}{Math.round(selectedClient.loan?.partialCredit || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        {(selectedClient.loan?.mora > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Mora Acumulada</p>
                                                <p className="text-lg font-black text-red-500">+{currency}{Math.round(selectedClient.loan?.mora || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        <div className="flex justify-between items-center pt-2 border-t border-slate-200">
                                            <p className="text-[11px] font-black text-slate-800 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Total Restante' : 'Total Sugerido'}</p>
                                            <p className="text-xl font-black text-emerald-600">{currency}{Math.round((transactionType === 'Capital' ? selectedClient.totalDebt : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0)).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha Pago</label>
                                            <input id="inputDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center focus:border-indigo-500 outline-none text-slate-700 text-xs" />
                                        </div>
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recibido ({currency})</label>
                                            <input id="inputAmount" type="number" defaultValue={Math.round((transactionType === 'Capital' ? 0 : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0))} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center text-xl focus:border-indigo-500 outline-none text-indigo-600" />
                                        </div>
                                    </div>
                                    <button disabled={isProcessing} onClick={() => recordTransaction(selectedClientId, document.getElementById('inputAmount').value, document.getElementById('inputDate').value)} className="w-full bg-emerald-500 text-white p-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all disabled:opacity-50">
                                        {isProcessing ? 'Procesando...' : 'Confirmar en Nube'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RECIBO DE PAGO SUPER DETALLADO */}
                    {receiptData && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={receiptRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-20 h-20 mx-auto mb-2" color="#10b981" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">{companyName}</h4>
                                        <p className="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] mb-2">Recibo de Pago</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cliente:</p>
                                        <p className="font-black text-slate-800 text-sm">{receiptData.client.name}</p>
                                    </div>
                                    <div className="space-y-3 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Fecha Pago</span><span className="font-black text-slate-800">{receiptData.transaction.date}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Referencia</span><span className="font-black text-slate-800">{receiptData.transaction.ref}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Tipo de Pago</span><span className="font-black text-slate-800">{receiptData.transaction.type}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Concepto</span><span className="font-black text-slate-800 text-right max-w-[150px]">{receiptData.transaction.description}</span></div>
                                        
                                        <div className="pt-3 mt-3 border-t border-slate-200 border-dashed space-y-2">
                                            <div className="flex justify-between text-sm"><span className="text-slate-500 font-bold">Monto Recibido</span><span className="font-black text-slate-800">{currency}{Math.round(receiptData.transaction.amount).toLocaleString()}</span></div>
                                            {(receiptData.transaction.paidMora > 0) && (
                                                <div className="flex justify-between text-xs"><span className="text-red-400 font-bold">Aplicado a Mora</span><span className="font-black text-red-500">-{currency}{Math.round(receiptData.transaction.paidMora).toLocaleString()}</span></div>
                                            )}
                                            {(receiptData.transaction.surplus > 0) && (
                                                <div className="flex justify-between text-xs"><span className="text-indigo-400 font-bold">Abono a Próx. Cuota</span><span className="font-black text-indigo-500">{currency}{Math.round(receiptData.transaction.surplus).toLocaleString()}</span></div>
                                            )}
                                        </div>
                                        <div className="pt-3 mt-3 border-t border-slate-200 border-dashed space-y-2">
                                            <div className="flex justify-between text-xs"><span className="text-slate-500 font-bold">Cuotas Restantes</span><span className="font-black text-slate-800">{receiptData.transaction.remainingInstallments}</span></div>
                                            {receiptData.transaction.remainingDebt !== undefined && (
                                                <div className="flex justify-between text-xs"><span className="text-slate-500 font-bold">Balance Pendiente</span><span className="font-black text-slate-800">{currency}{Math.round(receiptData.transaction.remainingDebt).toLocaleString()}</span></div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-emerald-50 border border-emerald-100 p-5 rounded-[1.5rem] text-center">
                                        <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">Total Pagado</p>
                                        <h3 className="text-3xl font-black text-emerald-600 tracking-tight">{currency}{Math.round(receiptData.transaction.amount).toLocaleString()}</h3>
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-emerald-100/50 text-center">
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">{receiptFooter}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={async () => {
                                        if(!receiptRef.current) return;
                                        try {
                                            const canvas = await html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                                            canvas.toBlob(async (blob) => {
                                                if (navigator.share) {
                                                    const file = new File([blob], `Recibo_${receiptData.transaction.ref}.png`, { type: 'image/png' });
                                                    try { await navigator.share({ title: 'Recibo', files: [file] }); } 
                                                    catch (err) { const link = document.createElement('a'); link.download = `Recibo_${receiptData.transaction.ref}.png`; link.href = canvas.toDataURL(); link.click(); }
                                                } else {
                                                    const link = document.createElement('a'); link.download = `Recibo_${receiptData.transaction.ref}.png`; link.href = canvas.toDataURL(); link.click();
                                                }
                                            }, 'image/png');
                                        } catch (error) { showNotify("Error generando recibo"); }
                                    }} className="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-emerald-100">
                                        <Icon name="share-2" size={18}/> Compartir Ticket
                                    </button>
                                    <button onClick={() => setReceiptData(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RECORDATORIO DE PAGO EN IMAGEN */}
                    {reminderClient && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={reminderRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem] overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-3 bg-indigo-500"></div>
                                    <div className="text-center mb-6 mt-2 relative z-10">
                                        <LogoSVG className="w-16 h-16 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">{companyName}</h4>
                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-2">Aviso de Cobro</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100 text-center mb-6 relative z-10">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cliente</p>
                                        <p className="font-black text-slate-800 text-lg leading-tight">{reminderClient.name}</p>
                                    </div>
                                    <div className="text-center mb-6">
                                        <p className="text-xs font-bold text-slate-500 mb-2">Le recordamos amablemente su compromiso de pago programado para la fecha:</p>
                                        <div className="inline-block px-4 py-2 bg-slate-100 rounded-xl">
                                            <p className="font-black text-slate-800 text-lg">{reminderClient.loan?.nextPaymentDate || 'Pendiente'}</p>
                                        </div>
                                    </div>
                                    <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-[1.5rem] text-center relative z-10">
                                        <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-1">Cuota a Pagar</p>
                                        <h3 className="text-3xl font-black text-indigo-600 tracking-tight">
                                            {currency}{Math.round((reminderClient.loan?.installmentAmount - (reminderClient.loan?.partialCredit || 0)) + (reminderClient.loan?.mora || 0)).toLocaleString()}
                                        </h3>
                                        {reminderClient.loan?.mora > 0 && <p className="text-[9px] text-red-500 font-bold mt-2 uppercase tracking-widest bg-red-100 inline-block px-2 py-1 rounded-md">Incluye {currency}{Math.round(reminderClient.loan.mora).toLocaleString()} de Mora</p>}
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-indigo-100/50 text-center">
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Evite recargos pagando a tiempo.</p>
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-1">{receiptFooter}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={async () => {
                                        if(!reminderRef.current) return;
                                        try {
                                            const canvas = await html2canvas(reminderRef.current, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                                            canvas.toBlob(async (blob) => {
                                                if (navigator.share) {
                                                    const file = new File([blob], `Recordatorio_${reminderClient.name}.png`, { type: 'image/png' });
                                                    try { await navigator.share({ title: 'Aviso de Cobro', files: [file] }); } 
                                                    catch (err) { const link = document.createElement('a'); link.download = `Recordatorio_${reminderClient.name}.png`; link.href = canvas.toDataURL(); link.click(); }
                                                } else {
                                                    const link = document.createElement('a'); link.download = `Recordatorio_${reminderClient.name}.png`; link.href = canvas.toDataURL(); link.click();
                                                }
                                            }, 'image/png');
                                        } catch (error) { showNotify("Error generando imagen"); }
                                    }} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                                        <Icon name="share-2" size={18}/> Compartir Aviso
                                    </button>
                                    <button onClick={() => setReminderClient(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA DEL PANEL DE RUTAS */}
                    {view === 'routes_panel' && userProfile?.role !== 'cobrador' && (
                        <div className="animate-in bg-slate-50 min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 sticky top-0 bg-white z-10 shadow-sm">
                                <button onClick={() => setView('dashboard')} className="p-3 text-slate-400 bg-slate-50 rounded-2xl hover:bg-slate-100"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Panel de Rutas</h2>
                            </header>
                            <main className="p-6 space-y-4 pb-24">
                                {routesList.map((route, i) => {
                                    const routeClients = clients.filter(c => c.route === route);
                                    const activeClients = routeClients.filter(c => c.totalDebt > 0);
                                    const routeDebt = routeClients.reduce((acc, c) => acc + (c.totalDebt || 0), 0);
                                    
                                    const todayFormatted = new Date().toLocaleDateString('es-DO');
                                    const routeCollectedToday = routeClients.reduce((acc, c) => {
                                        let cTotal = 0;
                                        c.history?.forEach(h => { if (h.date && h.date.split(',')[0].trim() === todayFormatted && !h.archivedGain) cTotal += parseFloat(h.amount) || 0; });
                                        return acc + cTotal;
                                    }, 0);

                                    return (
                                        <div key={i} className="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-bl-full -z-0 opacity-50"></div>
                                            <div className="flex items-center gap-3 mb-4 relative z-10">
                                                <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-[1rem] flex items-center justify-center"><Icon name="map" size={18}/></div>
                                                <h3 className="heading-font text-lg font-black text-slate-800">{route}</h3>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 relative z-10">
                                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Clientes Activos</p>
                                                    <p className="text-xl font-black text-slate-800">{activeClients.length} <span className="text-[10px] text-slate-400 font-bold">/ {routeClients.length}</span></p>
                                                </div>
                                                <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-emerald-600 mb-1">Cobrado Hoy</p>
                                                    <p className="text-xl font-black text-emerald-600">+{currency}{Math.round(routeCollectedToday).toLocaleString()}</p>
                                                </div>
                                                <div className="col-span-2 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 flex justify-between items-center">
                                                    <p className="text-[10px] font-black uppercase tracking-widest text-indigo-600">Capital Prestado</p>
                                                    <p className="text-xl font-black text-indigo-700">{currency}{Math.round(routeDebt).toLocaleString()}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </main>
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm"><button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800">Ajustes</h2></header>
                            <main className="p-6 space-y-8 pb-24">
                                
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="shield" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Preferencias Pro</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <div className="flex justify-between items-center pt-2 pb-2 border-b border-slate-200">
                                            <span className="font-bold text-slate-700 text-sm">Modo Oscuro</span>
                                            <div className="w-12 h-6 rounded-full relative cursor-pointer transition-colors"
                                                 style={{ backgroundColor: userProfile?.darkMode ? '#4f46e5' : '#cbd5e1' }}
                                                 onClick={() => handleUpdateSetting('darkMode', !userProfile?.darkMode)}>
                                                 <div className="w-4 h-4 bg-white rounded-full absolute top-1 transition-all"
                                                      style={{ left: userProfile?.darkMode ? '1.75rem' : '0.25rem' }}></div>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center pt-2 pb-2 border-b border-slate-200">
                                            <div>
                                                <span className="font-bold text-slate-700 text-sm block">Modo Privacidad</span>
                                                <span className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Oculta saldos en inicio</span>
                                            </div>
                                            <div className="w-12 h-6 rounded-full relative cursor-pointer transition-colors"
                                                 style={{ backgroundColor: privacyMode ? '#4f46e5' : '#cbd5e1' }}
                                                 onClick={() => handleUpdateSetting('privacyMode', !privacyMode)}>
                                                 <div className="w-4 h-4 bg-white rounded-full absolute top-1 transition-all"
                                                      style={{ left: privacyMode ? '1.75rem' : '0.25rem' }}></div>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center pt-2 pb-2">
                                            <div>
                                                <span className="font-bold text-slate-700 text-sm block">Integración WhatsApp</span>
                                                <span className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Notificaciones (Futuro)</span>
                                            </div>
                                            <div className="w-12 h-6 rounded-full relative cursor-pointer transition-colors"
                                                 style={{ backgroundColor: userProfile?.smsAuto ? '#10b981' : '#cbd5e1' }}
                                                 onClick={() => handleUpdateSetting('smsAuto', !userProfile?.smsAuto)}>
                                                 <div className="w-4 h-4 bg-white rounded-full absolute top-1 transition-all"
                                                      style={{ left: userProfile?.smsAuto ? '1.75rem' : '0.25rem' }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="file-text" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Personalización del Negocio</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Negocio</label><input type="text" defaultValue={companyName} onBlur={e => handleUpdateSetting('companyName', e.target.value || 'Connect Préstamos')} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: Mi Financiera" /></div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Moneda Principal</label><select value={currency} onChange={e => handleUpdateSetting('currency', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500 appearance-none cursor-pointer"><option value="RD$">RD$ (Pesos Dominicanos)</option><option value="USD$">USD$ (Dólares)</option><option value="MXN$">MXN$ (Pesos Mexicanos)</option><option value="COP$">COP$ (Pesos Colombianos)</option><option value="€">€ (Euros)</option><option value="$">$ (Genérico)</option></select></div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Interés Base por Defecto (%)</label><input type="number" defaultValue={userProfile?.defaultInterest || ''} onBlur={e => handleUpdateSetting('defaultInterest', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: 20" /></div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Mora Base por Defecto (%)</label><input type="number" defaultValue={userProfile?.defaultMoraPercentage || ''} onBlur={e => handleUpdateSetting('defaultMoraPercentage', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: 10" /></div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Pie de Página (Recibos)</label><input type="text" defaultValue={receiptFooter} onBlur={e => handleUpdateSetting('receiptFooter', e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: ¡Gracias por preferirnos!" /></div>
                                    </div>
                                </div>

                                {/* SECCIÓN: GESTIÓN DE RUTAS */}
                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center"><Icon name="map" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Gestión de Rutas</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <div className="flex gap-2">
                                            <input type="text" value={newRouteInput} onChange={e => setNewRouteInput(e.target.value)} placeholder="Nueva Ruta (Ej: Centro)" className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none focus:border-amber-500" />
                                            <button onClick={() => {
                                                if(!newRouteInput) return;
                                                const updated = [...routesList, newRouteInput];
                                                handleUpdateSetting('routes', updated);
                                                setNewRouteInput('');
                                                showNotify("Ruta agregada");
                                            }} className="px-5 bg-amber-500 text-white rounded-2xl font-black active:scale-95 transition-transform"><Icon name="user-plus" size={18}/></button>
                                        </div>
                                        <div className="space-y-2 mt-4">
                                            {routesList.map((r, i) => (
                                                <div key={i} className="flex justify-between items-center bg-white p-4 border border-slate-200 rounded-2xl shadow-sm">
                                                    <span className="font-bold text-slate-700">{r}</span>
                                                    {r !== 'General' && (
                                                        <button onClick={() => {
                                                            const updated = routesList.filter(x => x !== r);
                                                            handleUpdateSetting('routes', updated);
                                                        }} className="text-red-400 hover:bg-red-50 p-2 rounded-xl transition-colors"><Icon name="trash-2" size={16}/></button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Asigna estas rutas al crear clientes para organizarlos.</p>
                                    </div>
                                </div>

                                {/* SECCIÓN: GESTIÓN DE COBRADORES */}
                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><Icon name="truck" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Cobradores (Usuarios)</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <button onClick={() => setCobradorModal(true)} className="w-full bg-emerald-100 text-emerald-700 p-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                            <Icon name="user-plus" size={18}/> Crear Nuevo Cobrador
                                        </button>
                                        
                                        {cobradores.length > 0 && (
                                            <div className="mt-4 space-y-2">
                                                <h5 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Cobradores Activos</h5>
                                                {cobradores.map(cob => (
                                                    <div key={cob.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                                        <p className="font-black text-slate-800">{cob.name}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 mt-1">{cob.email} • Ruta: {cob.assignedRoute}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Los cobradores tienen su propio login y solo ven la ruta asignada.</p>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="users" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Modo Empleado Local (UI)</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <div className="flex justify-between items-center pt-2 pb-2">
                                            <span className="font-bold text-slate-700 text-sm">Bloqueo de Interfaz Local</span>
                                            <div className="w-12 h-6 rounded-full relative cursor-pointer transition-colors"
                                                 style={{ backgroundColor: userProfile?.role === 'empleado' ? '#4f46e5' : '#cbd5e1' }}
                                                 onClick={() => {
                                                     if(userProfile?.role === 'empleado') { setPinModal(true); } 
                                                     else { handleUpdateSetting('role', 'empleado'); showNotify("UI Bloqueada"); }
                                                 }}>
                                                 <div className="w-4 h-4 bg-white rounded-full absolute top-1 transition-all" style={{ left: userProfile?.role === 'empleado' ? '1.75rem' : '0.25rem' }}></div>
                                            </div>
                                        </div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Oculta ajustes en este mismo dispositivo sin crear otro usuario.</p>
                                        <button onClick={() => setChangePinModal(true)} className="w-full bg-slate-200 text-slate-700 p-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                            <Icon name="shield" size={18}/> Cambiar PIN de Desbloqueo
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="database" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Migración de Datos</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <button onClick={exportBackup} className="w-full bg-emerald-500 text-white p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2">
                                            <Icon name="download" size={18}/> Exportar Datos (JSON)
                                        </button>
                                        <div className="relative w-full">
                                            <input type="file" accept=".json" onChange={importBackup} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <button className="w-full bg-slate-200 text-slate-600 p-4 rounded-2xl font-black flex items-center justify-center gap-2">
                                                <Icon name="upload" size={18}/> Importar Backup
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center"><Icon name="trash-2" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Peligro</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <button onClick={() => setWipeSystemConfirm(true)} className="w-full bg-red-500 text-white p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2">
                                            <Icon name="trash-2" size={18}/> Borrar Histórico Completo
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 text-center">
                                        <p className="text-xs font-black text-slate-400 mb-4">{user?.email}</p>
                                        <button onClick={() => setPasswordModal(true)} className="w-full mb-3 bg-slate-200 text-slate-700 p-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                            <Icon name="lock" size={18}/> Cambiar Contraseña
                                        </button>
                                        <button onClick={() => auth.signOut()} className="w-full bg-slate-200 text-slate-600 p-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition-transform"><Icon name="log-out" size={18}/> Cerrar Sesión</button>
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* MODAL CREAR COBRADOR (Secundario) */}
                    {cobradorModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[400] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl animate-in">
                                <h3 className="heading-font text-xl font-black text-slate-800 mb-2">Nuevo Cobrador</h3>
                                <p className="text-xs text-slate-500 font-bold mb-6">Esta persona podrá iniciar sesión en la app con este correo.</p>
                                
                                <form onSubmit={handleCreateCobrador} className="space-y-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre</label><input type="text" value={cobradorForm.name} onChange={e => setCobradorForm({...cobradorForm, name: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-emerald-500" required /></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo de Acceso</label><input type="email" value={cobradorForm.email} onChange={e => setCobradorForm({...cobradorForm, email: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-emerald-500" required /></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Contraseña</label><input type="password" value={cobradorForm.pass} onChange={e => setCobradorForm({...cobradorForm, pass: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-emerald-500" required minLength="6" /></div>
                                    
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Asignar Ruta</label>
                                        <select value={cobradorForm.route} onChange={e => setCobradorForm({...cobradorForm, route: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-emerald-500 appearance-none cursor-pointer">
                                            <option value="Todas">Acceso a Todas las Rutas</option>
                                            {routesList.map((r, i) => <option key={i} value={r}>{r}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="flex gap-3 mt-6">
                                        <button type="button" onClick={() => setCobradorModal(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-600 active:scale-95 transition-transform">Cancelar</button>
                                        <button type="submit" disabled={isProcessing} className="flex-1 py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-lg shadow-emerald-500/30 active:scale-95 transition-transform">{isProcessing ? '...' : 'Crear Usuario'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
