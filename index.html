<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Préstamos - Sistema de Cartera</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK Compat (Necesario para ejecutar en un solo HTML sin errores de require) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        [data-lucide] { visibility: hidden; }
        .lucide { visibility: visible !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuración Real de Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDid8PFmp7fKbLjFSn7mzMcrIfDgjEGwLM",
            authDomain: "connect-prestamos.firebaseapp.com",
            projectId: "connect-prestamos",
            storageBucket: "connect-prestamos.firebasestorage.app",
            messagingSenderId: "685856835997",
            appId: "1:685856835997:web:1d68dc29b9268c656a0774",
            measurementId: "G-5VFZ5ZCBYZ"
        };

        // Inicialización de Firebase Compat
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Mapeo de funciones de Firebase para mantener la lógica solicitada
        const onSnapshot = (ref, callback) => ref.onSnapshot(callback);
        const doc = (db, coll, user, sub, id) => db.collection(coll).doc(user).collection(sub).doc(id);
        const collection = (db, coll, user, sub) => db.collection(coll).doc(user).collection(sub);

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [clients, setClients] = useState([]);
            const [selectedClientId, setSelectedClientId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            const [receiptData, setReceiptData] = useState(null);
            const [isGeneratingImage, setIsGeneratingImage] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [loading, setLoading] = useState(true);
            
            const receiptRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((firebaseUser) => {
                    setUser(firebaseUser);
                    setLoading(false);
                    if (firebaseUser) setView('dashboard');
                    else setView('login');
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) {
                    setClients([]);
                    return;
                }
                const clientsRef = collection(db, 'users', user.uid, 'clients');
                const unsubscribe = onSnapshot(clientsRef, (snapshot) => {
                    const clientsData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setClients(clientsData);
                });

                return () => unsubscribe();
            }, [user]);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleRegister = async (name, email, password) => {
                try {
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    await res.user.updateProfile({ displayName: name });
                    showNotification("Cuenta creada correctamente");
                } catch (error) {
                    showNotification("Error al registrarse", "error");
                }
            };

            const handleLogin = async (email, password) => {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showNotification("Acceso concedido");
                } catch (error) {
                    showNotification("Error de acceso", "error");
                }
            };

            const handleLogout = () => auth.signOut();

            const addClient = async (newClientData) => {
                if (!user) return;
                try {
                    await db.collection('users').doc(user.uid).collection('clients').add({
                        ...newClientData,
                        totalDebt: 0,
                        history: [],
                        loan: null,
                        createdAt: new Date().toISOString()
                    });
                    setView('dashboard');
                    showNotification('Cliente registrado');
                } catch (error) {
                    showNotification('Error al guardar', 'error');
                }
            };

            const updateClientData = async (updatedData) => {
                if (!user || !updatedData.id) return;
                try {
                    const { id, ...data } = updatedData;
                    await db.collection('users').doc(user.uid).collection('clients').doc(id).update(data);
                    setView('profile');
                    showNotification('Datos actualizados');
                } catch (error) {
                    showNotification('Error al actualizar', 'error');
                }
            };

            const removeClient = async (id) => {
                if (!user) return;
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(id).delete();
                    setView('dashboard');
                    setSelectedClientId(null);
                    setShowDeleteConfirm(false);
                    showNotification('Cliente eliminado');
                } catch (error) {
                    showNotification('Error al eliminar', 'error');
                }
            };

            const assignNewLoan = async (clientId, loanDetails) => {
                if (!user) return;
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(clientId).update({
                        totalDebt: loanDetails.totalToPay,
                        loan: { ...loanDetails, paidInstallments: 0, partialCredit: 0 }
                    });
                    setView('profile');
                    showNotification('Préstamo asignado');
                } catch (error) {
                    showNotification('Error al asignar', 'error');
                }
            };

            const recordTransaction = async (clientId, type, amount, description) => {
                if (!user) return;
                const client = clients.find(c => c.id === clientId);
                if (!client) return;

                const numAmount = parseFloat(amount);
                const date = new Date().toLocaleDateString();
                
                let newPaidInstallments = client.loan?.paidInstallments || 0;
                let newPartialCredit = client.loan?.partialCredit || 0;

                if (type === 'Pago' && client.loan) {
                    const totalAvailable = newPartialCredit + numAmount;
                    const installmentsCovered = Math.floor(totalAvailable / client.loan.installmentAmount);
                    newPartialCredit = totalAvailable % client.loan.installmentAmount;
                    newPaidInstallments = Math.min(newPaidInstallments + installmentsCovered, client.loan.totalInstallments);
                }

                const newDebt = type === 'Pago' ? client.totalDebt - numAmount : client.totalDebt + numAmount;
                
                const newEntry = {
                    id: Date.now().toString(),
                    type,
                    amount: numAmount,
                    date,
                    description: description || (type === 'Pago' ? `Pago Cuota #${newPaidInstallments}` : 'Cargo extra'),
                    ref: 'REC-' + Math.floor(1000 + Math.random() * 8999),
                };

                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(clientId).update({
                        totalDebt: Math.max(0, newDebt),
                        loan: client.loan ? { ...client.loan, paidInstallments: newPaidInstallments, partialCredit: newPartialCredit } : null,
                        history: [newEntry, ...client.history]
                    });
                    setReceiptData({ 
                        client: { ...client, totalDebt: Math.max(0, newDebt), loan: client.loan ? { ...client.loan, paidInstallments: newPaidInstallments } : null }, 
                        transaction: newEntry 
                    });
                } catch (error) {
                    showNotification('Error al registrar pago', 'error');
                }
            };

            const sendWhatsAppReminder = (client) => {
                const message = `Hola ${client.name}, te recordamos que tienes un pago pendiente de $${client.totalDebt.toLocaleString()}. Saludos de Connect Préstamos.`;
                window.open(`https://wa.me/${client.phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`, '_blank');
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 bg-white">CARGANDO CARTERA...</div>;

            const selectedClient = clients.find(c => c.id === selectedClientId);

            // --- Vistas ---

            const LoginView = () => {
                const [isReg, setIsReg] = useState(false);
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50 p-6">
                        <div className="w-full max-w-sm bg-white rounded-[3rem] shadow-2xl p-10 border border-slate-100">
                            <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] text-white flex items-center justify-center mx-auto mb-8 shadow-xl shadow-indigo-200"><Icon name="users" size={40} /></div>
                            <h1 className="text-2xl font-black text-center text-slate-800 mb-8 tracking-tight">{isReg ? 'Registrarse' : 'Connect Préstamos'}</h1>
                            <form className="space-y-4" onSubmit={(e) => {
                                e.preventDefault();
                                if (isReg) handleRegister(e.target.name.value, e.target.email.value, e.target.pass.value);
                                else handleLogin(e.target.email.value, e.target.pass.value);
                            }}>
                                {isReg && <input name="name" type="text" placeholder="Nombre completo" className="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-bold text-sm" required />}
                                <input name="email" type="email" placeholder="Email" className="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-bold text-sm" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-bold text-sm" required />
                                <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all mt-4">
                                    {isReg ? 'Crear Cartera' : 'Entrar'}
                                </button>
                            </form>
                            <button onClick={() => setIsReg(!isReg)} className="w-full mt-6 text-xs font-bold text-indigo-600 hover:underline">
                                {isReg ? 'Ya tengo cuenta' : 'Regístrate aquí'}
                            </button>
                        </div>
                    </div>
                );
            };

            const DashboardView = () => {
                const filtered = clients.filter(c => 
                    c.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    c.phone.includes(searchTerm)
                );

                const totalDebt = clients.reduce((a, b) => a + (b.totalDebt || 0), 0);

                return (
                    <div className="pb-20">
                        <header className="bg-white p-6 sticky top-0 z-10 border-b shadow-sm">
                            <div className="flex justify-between items-center mb-6">
                                <div><h2 className="text-2xl font-black text-slate-800 tracking-tight">Cartera Total</h2><p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{user?.displayName}</p></div>
                                <div className="flex gap-2">
                                    <button onClick={() => setView('manage_clients')} className="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-indigo-600"><Icon name="users" size={20} /></button>
                                    <button onClick={handleLogout} className="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-red-500"><Icon name="log-out" size={20} /></button>
                                </div>
                            </div>
                            
                            <div className="bg-slate-900 rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden">
                                <p className="opacity-50 text-[10px] font-black uppercase tracking-widest mb-1">Capital en Calle</p>
                                <h3 className="text-4xl font-black">${totalDebt.toLocaleString()}</h3>
                                <Icon name="credit-card" className="absolute -right-4 -bottom-4 opacity-10 rotate-12" size={120} />
                            </div>

                            <div className="mt-6 relative">
                                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                                <input type="text" placeholder="Buscar cliente..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 font-bold text-sm outline-none" />
                            </div>
                        </header>

                        <main className="p-6 space-y-4">
                            {filtered.map(client => (
                                <div key={client.id} onClick={() => { setSelectedClientId(client.id); setView('profile'); }} className="bg-white p-5 rounded-[2.2rem] border border-slate-100 shadow-sm flex justify-between items-center active:scale-[0.98] transition-all cursor-pointer">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-black text-xl border border-indigo-100">{client.name.charAt(0)}</div>
                                        <div><h4 className="font-black text-slate-800 leading-tight">{client.name}</h4><p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{client.loan ? client.loan.frequency : 'Disponible'}</p></div>
                                    </div>
                                    <p className={`font-black text-lg ${client.totalDebt > 0.1 ? 'text-red-500' : 'text-emerald-500'}`}>${(client.totalDebt || 0).toLocaleString()}</p>
                                </div>
                            ))}
                        </main>
                        <button onClick={() => setView('add_client')} className="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl flex items-center justify-center z-20 active:scale-90 transition-transform"><Icon name="user-plus" size={28} /></button>
                    </div>
                );
            };

            const ProfileView = () => {
                if (!selectedClient) return null;
                const [isTransacting, setIsTransacting] = useState(false);
                const loan = selectedClient.loan;

                return (
                    <div className="pb-10 min-h-screen bg-slate-50">
                        <header className="p-6 bg-white flex items-center justify-between border-b sticky top-0 z-10">
                            <button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                            <div className="flex gap-2">
                                <button onClick={() => setShowDeleteConfirm(true)} className="p-3 text-red-400 bg-red-50 rounded-2xl"><Icon name="trash-2" size={18} /></button>
                                <button onClick={() => setView('edit_client')} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl"><Icon name="settings" size={18} /></button>
                            </div>
                        </header>

                        <main className="p-6 space-y-6">
                            <div className="bg-white rounded-[2.8rem] p-8 shadow-sm border border-slate-100 flex flex-col items-center text-center">
                                <div className="w-24 h-24 bg-indigo-600 text-white rounded-[2.2rem] flex items-center justify-center text-4xl font-black mb-4 shadow-xl shadow-indigo-100">{selectedClient.name.charAt(0)}</div>
                                <h3 className="text-2xl font-black text-slate-800">{selectedClient.name}</h3>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">{selectedClient.cedula || 'Sin ID'}</p>
                                
                                <div className="w-full grid grid-cols-2 gap-4 mt-8">
                                    <div className="bg-slate-50 p-5 rounded-[2rem] border border-slate-100 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Saldo</p>
                                        <p className={`text-xl font-black ${selectedClient.totalDebt > 0.05 ? 'text-red-500' : 'text-emerald-500'}`}>${selectedClient.totalDebt.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[2rem] border border-slate-100 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cuotas</p>
                                        <p className="text-xl font-black text-indigo-600">{loan ? `${loan.paidInstallments}/${loan.totalInstallments}` : '0/0'}</p>
                                    </div>
                                </div>

                                <div className="w-full mt-8">
                                    {/* CORRECCIÓN JUAN PEREZ: Si el saldo es casi 0, permitir nuevo préstamo */}
                                    {Math.round(selectedClient.totalDebt) > 0 ? (
                                        <button onClick={() => sendWhatsAppReminder(selectedClient)} className="w-full py-5 bg-emerald-500 text-white rounded-[1.8rem] font-black flex items-center justify-center gap-3 shadow-xl shadow-emerald-100 active:scale-95 transition-all">
                                            <Icon name="send" size={20} /> Enviar Recordatorio
                                        </button>
                                    ) : (
                                        <button onClick={() => setView('assign_loan')} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black flex items-center justify-center gap-3 shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                                            <Icon name="trending-up" size={20} /> Asignar Préstamo
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="space-y-4 pb-10">
                                <div className="flex justify-between items-center px-4">
                                    <h4 className="font-black text-[11px] uppercase text-slate-400 tracking-widest">Movimientos</h4>
                                    <button onClick={() => setIsTransacting(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-[11px] font-black shadow-lg">Cobrar</button>
                                </div>
                                <div className="space-y-3">
                                    {selectedClient.history?.map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[1.8rem] border border-slate-100 flex justify-between items-center shadow-sm">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${item.type === 'Pago' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}><Icon name="check-circle-2" size={22} /></div>
                                                <div><p className="font-bold text-slate-800 text-sm">{item.description}</p><p className="text-[10px] text-slate-400 font-black mt-1 uppercase">{item.date}</p></div>
                                            </div>
                                            <p className={`font-black text-lg ${item.type === 'Pago' ? 'text-emerald-500' : 'text-red-500'}`}>${item.amount.toLocaleString()}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>

                        {showDeleteConfirm && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[120] flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl text-center">
                                    <h3 className="text-xl font-black mb-2">¿Eliminar cliente?</h3>
                                    <div className="flex flex-col gap-3 mt-8">
                                        <button onClick={() => removeClient(selectedClient.id)} className="w-full bg-red-500 text-white py-4 rounded-2xl font-black">Sí, Eliminar</button>
                                        <button onClick={() => setShowDeleteConfirm(false)} className="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-black">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {isTransacting && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end sm:items-center justify-center p-4">
                                <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                    <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-black text-slate-800">Registrar Pago</h3><button onClick={() => setIsTransacting(false)} className="text-slate-400 p-2"><Icon name="x" /></button></div>
                                    <div className="space-y-4">
                                        <input type="number" id="payAmount" placeholder="Monto $" className="w-full p-5 rounded-2xl bg-slate-50 border outline-none font-black text-center text-2xl focus:border-indigo-500" />
                                        <button onClick={() => { 
                                            const val = document.getElementById('payAmount').value;
                                            if(val) recordTransaction(selectedClient.id, 'Pago', val, '');
                                            setIsTransacting(false);
                                        }} className="w-full p-5 rounded-2xl font-black text-lg bg-emerald-500 text-white shadow-lg">Confirmar Pago</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const ManageClientsView = () => {
                return (
                    <div className="bg-white min-h-screen animate-in">
                        <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10">
                            <button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                            <h2 className="text-xl font-black text-slate-800">Directorio Cloud</h2>
                        </header>
                        <div className="p-6 space-y-4">
                            {clients.map(client => (
                                <div key={client.id} className="bg-slate-50 p-5 rounded-3xl border border-slate-100 flex justify-between items-center">
                                    <div className="flex gap-3 items-center">
                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-bold text-indigo-600">{client.name.charAt(0)}</div>
                                        <div><p className="font-black text-slate-800 text-sm leading-none">{client.name}</p><p className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{client.phone}</p></div>
                                    </div>
                                    <button onClick={() => { setSelectedClientId(client.id); setView('edit_client'); }} className="p-3 bg-white text-indigo-600 rounded-xl shadow-sm"><Icon name="edit" size={16} /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const EditClientView = () => {
                const [formData, setFormData] = useState({ ...selectedClient });
                return (
                    <div className="pb-10 bg-white min-h-screen animate-in">
                        <header className="p-6 border-b flex items-center gap-4">
                            <button onClick={() => setView('manage_clients')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                            <h2 className="text-xl font-black">Editar Datos</h2>
                        </header>
                        <form onSubmit={(e) => { e.preventDefault(); updateClientData(formData); }} className="p-8 space-y-6">
                            <input type="text" className="w-full p-4 rounded-2xl bg-slate-50 border outline-none font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="Nombre" />
                            <input type="text" className="w-full p-4 rounded-2xl bg-slate-50 border outline-none font-bold" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} placeholder="WhatsApp" />
                            <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-[2rem] font-black shadow-xl">Guardar Cambios</button>
                        </form>
                    </div>
                );
            };

            const AssignLoanView = () => {
                const handleAssign = (e) => {
                    e.preventDefault();
                    const amount = parseFloat(e.target.amount.value);
                    const interest = parseFloat(e.target.interest.value);
                    const inst = parseInt(e.target.inst.value);
                    const total = amount + (amount * (interest / 100));
                    assignNewLoan(selectedClient.id, {
                        amount, interest, totalToPay: total,
                        installmentAmount: total / inst, frequency: e.target.freq.value, totalInstallments: inst,
                        startDate: new Date().toLocaleDateString()
                    });
                };
                return (
                    <div className="pb-10 bg-white min-h-screen animate-in">
                        <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="text-xl font-black">Nuevo Préstamo</h2></header>
                        <form onSubmit={handleAssign} className="p-8 space-y-6">
                            <input name="amount" type="number" placeholder="Capital $" className="w-full p-5 rounded-2xl bg-slate-50 border font-black text-2xl outline-none" required />
                            <div className="grid grid-cols-2 gap-4">
                                <input name="interest" type="number" defaultValue="10" placeholder="Interés %" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" />
                                <input name="inst" type="number" defaultValue="10" placeholder="Cuotas" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" />
                            </div>
                            <select name="freq" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"><option>Semanal</option><option>Diario</option><option>Quincenal</option><option>Mensual</option></select>
                            <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-[2rem] font-black shadow-xl mt-6">Activar Préstamo Cloud</button>
                        </form>
                    </div>
                );
            };

            const AddClientView = () => {
                const handleSubmit = (e) => {
                    e.preventDefault();
                    addClient({ name: e.target.name.value, cedula: e.target.cedula.value, phone: e.target.phone.value });
                };
                return (
                    <div className="pb-10 bg-white min-h-screen animate-in">
                        <header className="p-6 bg-white border-b flex items-center gap-4 sticky top-0 z-10"><button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="text-xl font-black text-slate-800">Registrar Cliente</h2></header>
                        <form onSubmit={handleSubmit} className="p-8 space-y-6">
                            <input name="name" type="text" placeholder="Nombre completo" className="w-full p-4 rounded-2xl bg-slate-100 border outline-none font-bold" required />
                            <input name="cedula" type="text" placeholder="ID / Cédula" className="w-full p-4 rounded-2xl bg-slate-100 border outline-none font-bold" />
                            <input name="phone" type="tel" placeholder="WhatsApp (Ej: 809...)" className="w-full p-4 rounded-2xl bg-slate-100 border outline-none font-bold" required />
                            <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl">Sincronizar a Nube</button>
                        </form>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white font-sans text-slate-900 overflow-x-hidden">
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl bg-slate-900 text-white text-xs font-black animate-in">{notification.message}</div>}
                    {view === 'login' && <LoginView />}
                    {view === 'dashboard' && <DashboardView />}
                    {view === 'add_client' && <AddClientView />}
                    {view === 'manage_clients' && <ManageClientsView />}
                    {view === 'edit_client' && <EditClientView />}
                    {view === 'profile' && <ProfileView />}
                    {view === 'assign_loan' && <AssignLoanView />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
