                                                        <button onClick={() => setDeletePaymentConfirm(h)} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-red-500 hover:bg-red-50 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        {!selectedClient.history?.length && <p className="text-center text-xs font-bold text-slate-400 py-6">Sin historial registrado</p>}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {view === 'assign_loan' && selectedClient && (
                        <div className="animate-in bg-white min-h-screen pb-20">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800">Asignar Préstamo</h2></header>
                            
                            <form onSubmit={async (e) => { 
                                e.preventDefault(); 
                                const { amount, interest, installments, type, interestType, frequency, startDate } = loanForm;
                                const loanData = { 
                                    amount: parseFloat(amount), interest: parseFloat(interest), totalInstallments: parseInt(installments) || 1, paidInstallments: 0, 
                                    type, interestType: type === 'Rédito' ? 'N/A' : interestType, frequency, 
                                    totalToPay: loanPreview.totalToPay, installmentAmount: loanPreview.installmentAmount, 
                                    startDate: formatDate(parseDateString(startDate)), nextPaymentDate: calculateNextDate(formatDate(parseDateString(startDate)), frequency) 
                                }; 
                                let p;
                                if (userProfile?.role === 'admin') {
                                    p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ totalDebt: loanPreview.totalToPay, loan: loanData }); 
                                    showNotify("Préstamo Asignado"); 
                                } else {
                                    p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ pendingLoan: loanData }); 
                                    showNotify("Préstamo enviado para aprobación"); 
                                }
                                if (isOnline) await p.catch(e=>e);
                                setView('profile'); 
                            }} className="p-6 space-y-6">
                                <div className="bg-slate-900 text-white rounded-[2rem] p-6 shadow-xl relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 w-24 h-24 bg-indigo-500/20 rounded-full blur-xl"></div>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-4">Resumen de Préstamo</h3>
                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <p className="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Total a Pagar</p>
                                            <p className="text-xl font-black text-emerald-400">{currency}{Math.round(loanPreview.totalToPay).toLocaleString()}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Valor de Cuota</p>
                                            <p className="text-xl font-black">{currency}{Math.round(loanPreview.installmentAmount).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-3 border-t border-slate-700/50">
                                        <p className="text-[9px] text-slate-400 uppercase tracking-widest">Interés Total Generado</p>
                                        <p className="font-bold text-sm text-indigo-300">{currency}{Math.round(loanPreview.totalInterest).toLocaleString()} {loanForm.type === 'Rédito' && <span className="text-[8px] uppercase">/ {loanForm.frequency}</span>}</p>
                                    </div>
                                </div>

                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto del Préstamo ({currency})</label><input type="number" value={loanForm.amount} onChange={e => setLoanForm({...loanForm, amount: e.target.value})} className="w-full p-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] font-black text-xl text-center outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Modalidad</label><select value={loanForm.type} onChange={e => setLoanForm({...loanForm, type: e.target.value, installments: e.target.value === 'Rédito' ? '1' : loanForm.installments})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500 appearance-none text-center cursor-pointer"><option value="Amortizado">Amortizado</option><option value="Rédito">Solo Rédito</option></select></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">% Interés</label><input type="number" step="0.1" value={loanForm.interest} onChange={e => setLoanForm({...loanForm, interest: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500" required /></div>
                                </div>

                                {loanForm.type === 'Amortizado' && (
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cálculo de Interés</label>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                                            <button type="button" onClick={() => setLoanForm({...loanForm, interestType: 'Fijo'})} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${loanForm.interestType === 'Fijo' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Fijo (Monto x %)</button>
                                            <button type="button" onClick={() => setLoanForm({...loanForm, interestType: 'Por Cuota'})} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${loanForm.interestType === 'Por Cuota' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Por Cuota (Sube)</button>
                                        </div>
                                    </div>
                                )}
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select value={loanForm.frequency} onChange={e => setLoanForm({...loanForm, frequency: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500 appearance-none text-center cursor-pointer"><option value="Diario">Diario</option><option value="Semanal">Semanal</option><option value="Quincenal">Quincenal</option><option value="Mensual">Mensual</option></select></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Total Cuotas</label><input type="number" min="1" value={loanForm.installments} onChange={e => setLoanForm({...loanForm, installments: e.target.value})} disabled={loanForm.type === 'Rédito'} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500 disabled:opacity-50" required /></div>
                                </div>

                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Fecha de Entrega</label><input type="date" value={loanForm.startDate} onChange={e => setLoanForm({...loanForm, startDate: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center outline-none focus:border-indigo-500 text-slate-700" required /></div>

                                <button type="submit" className="w-full bg-emerald-500 text-white p-5 rounded-[2.2rem] font-black text-lg shadow-xl shadow-emerald-500/30 active:scale-95 transition-transform mt-6">Aprobar Préstamo</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL TRANSACCIÓN (COBRO) */}
                    {isTransacting && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-8 w-full max-w-sm shadow-2xl animate-in relative">
                                <button onClick={() => setIsTransacting(false)} className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200"><Icon name="x"/></button>
                                
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4"><Icon name="wallet" size={28}/></div>
                                    <h3 className="heading-font text-2xl font-black text-slate-800">Registrar Cobro</h3>
                                </div>

                                <div className="space-y-6">
                                    {(selectedClient.loan?.type === 'Rédito' || selectedClient.loan?.type === 'Amortizado') && (
                                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-4">
                                            <button onClick={() => setTransactionType('Interés')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Interés' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Pago Normal</button>
                                            <button onClick={() => setTransactionType('Capital')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Capital' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Abono Extra a Capital</button>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col gap-3">
                                        <div className="flex justify-between items-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Deuda Actual' : 'Cuota Base'}</p>
                                            <p className="text-lg font-black text-slate-700">{currency}{Math.round(transactionType === 'Capital' ? selectedClient.totalDebt : selectedClient.loan?.installmentAmount).toLocaleString()}</p>
                                        </div>
                                        {(selectedClient.loan?.partialCredit > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Abono previo</p>
                                                <p className="text-lg font-black text-indigo-600">-{currency}{Math.round(selectedClient.loan?.partialCredit || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        {(selectedClient.loan?.mora > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Mora Acumulada</p>
                                                <p className="text-lg font-black text-red-500">+{currency}{Math.round(selectedClient.loan?.mora || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        <div className="flex justify-between items-center pt-2 border-t border-slate-200">
                                            <p className="text-[11px] font-black text-slate-800 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Total Restante' : 'Total Sugerido'}</p>
                                            <p className="text-xl font-black text-emerald-600">{currency}{Math.round((transactionType === 'Capital' ? selectedClient.totalDebt : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0)).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha Pago</label>
                                            <input id="inputDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center focus:border-indigo-500 outline-none text-slate-700 text-xs" />
                                        </div>
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recibido ({currency})</label>
                                            <input id="inputAmount" type="number" defaultValue={Math.round((transactionType === 'Capital' ? 0 : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0))} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center text-xl focus:border-indigo-500 outline-none text-indigo-600" />
                                        </div>
                                    </div>
                                    <button disabled={isProcessing} onClick={() => recordTransaction(selectedClientId, document.getElementById('inputAmount').value, document.getElementById('inputDate').value)} className="w-full bg-emerald-500 text-white p-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all disabled:opacity-50">
                                        {isProcessing ? 'Procesando...' : 'Confirmar Cobro'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RECIBO DE PAGO SUPER DETALLADO */}
                    {receiptData && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={receiptRef} style={{ '--print-width': userProfile?.paperSize === '80mm' ? '78mm' : '56mm' }} className="print-receipt-container p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500 no-print"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG customUrl={userProfile?.logo} className="w-20 h-20 mx-auto mb-2" color="#10b981" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">{companyName}</h4>
                                        <p className="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] mb-2">Recibo de Pago</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cliente:</p>
                                        <p className="font-black text-slate-800 text-sm">{receiptData.client.name}</p>
                                    </div>
                                    <div className="space-y-3 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Fecha Pago</span><span className="font-black text-slate-800">{receiptData.transaction.date}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Referencia</span><span className="font-black text-slate-800">{receiptData.transaction.ref}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Tipo de Pago</span><span className="font-black text-slate-800">{receiptData.transaction.type}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Concepto</span><span className="font-black text-slate-800 text-right max-w-[150px]">{receiptData.transaction.description}</span></div>
                                        
                                        <div className="pt-3 mt-3 border-t border-slate-200 border-dashed space-y-2">
                                            <div className="flex justify-between text-sm"><span className="text-slate-500 font-bold">Monto Recibido</span><span className="font-black text-slate-800">{currency}{Math.round(receiptData.transaction.amount).toLocaleString()}</span></div>
                                            {(receiptData.transaction.paidMora > 0) && (
                                                <div className="flex justify-between text-xs"><span className="text-red-400 font-bold">Aplicado a Mora</span><span className="font-black text-red-500">-{currency}{Math.round(receiptData.transaction.paidMora).toLocaleString()}</span></div>
                                            )}
                                            {(receiptData.transaction.surplus > 0) && (
                                                <div className="flex justify-between text-xs"><span className="text-indigo-400 font-bold">Abono a Próx. Cuota</span><span className="font-black text-indigo-500">{currency}{Math.round(receiptData.transaction.surplus).toLocaleString()}</span></div>
                                            )}
                                        </div>
                                        <div className="pt-3 mt-3 border-t border-slate-200 border-dashed space-y-2">
                                            <div className="flex justify-between text-xs"><span className="text-slate-500 font-bold">Cuotas Restantes</span><span className="font-black text-slate-800">{receiptData.transaction.remainingInstallments}</span></div>
                                            {receiptData.transaction.remainingDebt !== undefined && (
                                                <div className="flex justify-between text-xs"><span className="text-slate-500 font-bold">Balance Pendiente</span><span className="font-black text-slate-800">{currency}{Math.round(receiptData.transaction.remainingDebt).toLocaleString()}</span></div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-emerald-50 border border-emerald-100 p-5 rounded-[1.5rem] text-center">
                                        <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">Total Pagado</p>
                                        <h3 className="text-3xl font-black text-emerald-600 tracking-tight">{currency}{Math.round(receiptData.transaction.amount).toLocaleString()}</h3>
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-emerald-100/50 text-center">
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">{receiptFooter}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex flex-wrap gap-2 rounded-b-[2.5rem] no-print">
                                    <button onClick={async () => {
                                        if(!receiptRef.current) return;
                                        try {
                                            const canvas = await html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                                            canvas.toBlob(async (blob) => {
                                                if (navigator.share) {
                                                    const file = new File([blob], `Recibo_${receiptData.transaction.ref}.png`, { type: 'image/png' });
                                                    try { await navigator.share({ title: 'Recibo', files: [file] }); } 
                                                    catch (err) { const link = document.createElement('a'); link.download = `Recibo_${receiptData.transaction.ref}.png`; link.href = canvas.toDataURL(); link.click(); }
                                                } else {
                                                    const link = document.createElement('a'); link.download = `Recibo_${receiptData.transaction.ref}.png`; link.href = canvas.toDataURL(); link.click();
                                                }
                                            }, 'image/png');
                                        } catch (error) { showNotify("Error generando recibo"); }
                                    }} className="flex-[1_0_100%] bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-emerald-100">
                                        <Icon name="share-2" size={18}/> Compartir Ticket Digital
                                    </button>
                                    <button onClick={() => printReceiptDirectly(receiptData)} className="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg">
                                        <Icon name="printer" size={18}/> Imprimir (Térmica)
                                    </button>
                                    <button onClick={() => setReceiptData(null)} className="flex-none p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RECORDATORIO DE PAGO */}
                    {reminderClient && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={reminderRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem] overflow-hidden" style={{ backgroundColor: '#ffffff' }}>
                                    <div className="absolute top-0 left-0 w-full h-3 bg-indigo-500"></div>
                                    <div className="text-center mb-6 mt-2 relative z-10">
                                        <LogoSVG customUrl={userProfile?.logo} className="w-16 h-16 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">{companyName}</h4>
                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-2">Aviso de Cobro</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100 text-center mb-6 relative z-10">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cliente</p>
                                        <p className="font-black text-slate-800 text-lg leading-tight">{reminderClient.name}</p>
                                    </div>
                                    
                                    <div className="text-center mb-6">
                                        <p className="text-xs font-bold text-slate-500 mb-2">Le recordamos amablemente su compromiso de pago programado para la fecha:</p>
                                        <div className="block w-full max-w-[220px] mx-auto px-4 py-3 rounded-xl border border-slate-200" style={{ backgroundColor: '#f1f5f9', display: 'block' }}>
                                            <p className="font-black text-lg" style={{ color: '#1e293b', margin: 0, padding: 0, fontFamily: 'sans-serif' }}>
                                                {reminderClient.loan?.nextPaymentDate || 'Pendiente'}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-[1.5rem] text-center relative z-10">
                                        <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-1">Cuota a Pagar</p>
                                        <h3 className="text-3xl font-black text-indigo-600 tracking-tight">
                                            {currency}{Math.round((reminderClient.loan?.installmentAmount - (reminderClient.loan?.partialCredit || 0)) + (reminderClient.loan?.mora || 0)).toLocaleString()}
                                        </h3>
                                        {reminderClient.loan?.mora > 0 && <p className="text-[9px] text-red-500 font-bold mt-2 uppercase tracking-widest bg-red-100 inline-block px-2 py-1 rounded-md">Incluye {currency}{Math.round(reminderClient.loan.mora).toLocaleString()} de Mora</p>}
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-indigo-100/50 text-center">
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">Evite recargos pagando a tiempo.</p>
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-1">{receiptFooter}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={async () => {
                                        if(!reminderRef.current) return;
                                        try {
                                            const canvas = await html2canvas(reminderRef.current, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                                            canvas.toBlob(async (blob) => {
                                                if (navigator.share) {
                                                    const file = new File([blob], `Recordatorio_${reminderClient.name}.png`, { type: 'image/png' });
                                                    try { await navigator.share({ title: 'Aviso de Cobro', files: [file] }); } 
                                                    catch (err) { const link = document.createElement('a'); link.download = `Recordatorio_${reminderClient.name}.png`; link.href = canvas.toDataURL(); link.click(); }
                                                } else {
                                                    const link = document.createElement('a'); link.download = `Recordatorio_${reminderClient.name}.png`; link.href = canvas.toDataURL(); link.click();
                                                }
                                            }, 'image/png');
                                        } catch (error) { showNotify("Error generando imagen"); }
                                    }} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                                        <Icon name="share-2" size={18}/> Compartir Aviso
                                    </button>
                                    <button onClick={() => setReminderClient(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE CAJA Y GANANCIAS */}
                    {view === 'earnings' && (
                        <div className="animate-in bg-slate-50 min-h-screen pb-20">
                            <header className="p-6 border-b bg-white sticky top-0 z-20 shadow-sm flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('dashboard')} className="p-3 text-slate-400 bg-slate-50 rounded-2xl hover:bg-slate-100 active:scale-95 transition-transform"><Icon name="arrow-left"/></button>
                                    <h2 className="heading-font text-xl font-black text-slate-800">Caja y Ganancias</h2>
                                </div>
                            </header>

                            <main className="p-6 space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-indigo-600 text-white p-5 rounded-[1.5rem] shadow-lg shadow-indigo-200">
                                        <p className="text-[9px] font-black uppercase tracking-widest text-indigo-200 mb-1">Ingreso Total</p>
                                        <p className="text-xl font-black">{currency}{Math.round(monthlyCollected).toLocaleString()}</p>
                                    </div>
                                    <div className="bg-emerald-500 text-white p-5 rounded-[1.5rem] shadow-lg shadow-emerald-200">
                                        <p className="text-[9px] font-black uppercase tracking-widest text-emerald-100 mb-1">Ganancia Limpia</p>
                                        <p className="text-xl font-black">{currency}{Math.round(monthlyGains).toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white border border-slate-200 p-5 rounded-[1.5rem] shadow-sm col-span-2 flex justify-between items-center">
                                        <div>
                                            <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Capital Recuperado</p>
                                            <p className="text-xl font-black text-slate-800">{currency}{Math.round(monthlyCollected - monthlyGains).toLocaleString()}</p>
                                        </div>
                                        <div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center"><Icon name="trending-up" size={24}/></div>
                                    </div>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={() => setShowReportModal(true)} className="flex-1 bg-white border border-slate-200 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all shadow-sm">
                                        <Icon name="file-text" className="text-indigo-500"/>
                                        <span className="text-[10px] font-black uppercase text-slate-600 tracking-widest">Reporte / PDF</span>
                                    </button>
                                    <button onClick={() => setResetGainsConfirm(true)} className="flex-1 bg-white border border-slate-200 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all shadow-sm">
                                        <Icon name="archive" className="text-amber-500"/>
                                        <span className="text-[10px] font-black uppercase text-slate-600 tracking-widest">Hacer Corte</span>
                                    </button>
                                </div>

                                <div className="bg-white rounded-[2rem] border border-slate-100 p-2 shadow-sm overflow-hidden">
                                    <div className="flex overflow-x-auto no-scrollbar gap-1 mb-2 border-b border-slate-50 p-2">
                                        <button onClick={() => setEarningsTab('operaciones')} className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${earningsTab === 'operaciones' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400'}`}>Cobrados ({storedGains.length})</button>
                                        <button onClick={() => setEarningsTab('pendientes')} className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${earningsTab === 'pendientes' ? 'bg-amber-50 text-amber-600' : 'text-slate-400'}`}>Pendientes</button>
                                        <button onClick={() => setEarningsTab('cortes')} className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${earningsTab === 'cortes' ? 'bg-emerald-50 text-emerald-600' : 'text-slate-400'}`}>Archivos Históricos</button>
                                    </div>

                                    {earningsTab !== 'cortes' && (
                                        <div className="px-4 pb-3 space-y-3">
                                            <div className="flex gap-2">
                                                <input type="date" value={earningsStartDate} onChange={e => setEarningsStartDate(e.target.value)} className="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-black text-slate-600 outline-none" title="Desde" />
                                                <input type="date" value={earningsEndDate} onChange={e => setEarningsEndDate(e.target.value)} className="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-black text-slate-600 outline-none" title="Hasta" />
                                            </div>
                                            <div className="relative">
                                                <Icon name="search" className="absolute left-3 top-3 text-slate-300" size={16} />
                                                <input type="text" placeholder="Buscar cliente..." value={earningsSearch} onChange={e => setEarningsSearch(e.target.value)} className="w-full pl-10 p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-indigo-500" />
                                            </div>
                                        </div>
                                    )}

                                    <div className="p-2 space-y-2">
                                        {earningsTab === 'cortes' ? (
                                            cortesHistory.length > 0 ? cortesHistory.map(corte => (
                                                <div key={corte.id} className="bg-slate-50 border border-slate-100 p-4 rounded-[1.2rem] relative flex justify-between items-center">
                                                    <div>
                                                        <p className="font-black text-slate-800 text-sm">Corte del {new Date(corte.timestamp).toLocaleDateString('es-DO')}</p>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Periodo: {corte.startDate} a {corte.endDate}</p>
                                                        <div className="flex gap-3 mt-2">
                                                            <span className="text-[9px] font-black text-slate-500">Recaudado: <span className="text-slate-700">{currency}{Math.round(corte.collected).toLocaleString()}</span></span>
                                                            <span className="text-[9px] font-black text-emerald-500">Ganancia: <span className="text-emerald-600">{currency}{Math.round(corte.gains).toLocaleString()}</span></span>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => { setSelectedCorte(corte); setShowReportModal(true); }} className="bg-white p-3 rounded-2xl text-indigo-600 shadow-sm border border-slate-200 hover:bg-indigo-50 active:scale-95 transition-all"><Icon name="file-text" size={20}/></button>
                                                </div>
                                            )) : <p className="text-center text-[10px] font-black uppercase text-slate-400 tracking-widest py-8">No hay cortes archivados</p>
                                        ) : (
                                            filteredGains.filter(g => earningsTab === 'pendientes' ? g.status === 'pendiente' : g.status !== 'pendiente').length > 0 
                                            ? filteredGains.filter(g => earningsTab === 'pendientes' ? g.status === 'pendiente' : g.status !== 'pendiente').map(gain => (
                                                <div key={gain.id} className="bg-slate-50 border border-slate-100 p-4 rounded-[1.2rem] flex justify-between items-center">
                                                    <div>
                                                        <p className="font-black text-slate-800 text-sm leading-tight">{gain.clientName}</p>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">{gain.desc || gain.type} • {gain.date.split(',')[0]}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className={`font-black text-lg ${gain.status === 'pendiente' ? 'text-amber-500' : 'text-emerald-500'}`}>+{currency}{Math.round(gain.gainAmount || 0).toLocaleString()}</p>
                                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">De {currency}{Math.round(gain.totalValue || 0).toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            )) : <p className="text-center text-[10px] font-black uppercase text-slate-400 tracking-widest py-8">Sin registros en esta vista</p>
                                        )}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* VISTA DEL PANEL DE RUTAS */}
                    {view === 'routes_panel' && (
                        <div className="animate-in bg-slate-50 min-h-screen pb-20">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-20 shadow-sm">
                                <button onClick={() => setView('dashboard')} className="p-3 text-slate-400 bg-slate-50 rounded-2xl active:scale-95 transition-transform"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Gestión de Rutas</h2>
                            </header>

                            <main className="p-6 space-y-6">
                                {/* Agregar nueva ruta */}
                                <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 ml-2">Añadir Nueva Ruta / Sector</h3>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!newRouteInput.trim()) return;
                                        if (!isOnline) return showNotify("Se requiere conexión a Internet");
                                        
                                        const currentRoutes = userProfile?.routes || ['General'];
                                        if (currentRoutes.includes(newRouteInput.trim())) {
                                            showNotify("Esa ruta ya existe");
                                            return;
                                        }
                                        
                                        setIsProcessing(true);
                                        const updatedRoutes = [...currentRoutes, newRouteInput.trim()];
                                        handleUpdateSetting('routes', updatedRoutes).then(() => {
                                            setNewRouteInput('');
                                            showNotify("Ruta agregada exitosamente");
                                            setIsProcessing(false);
                                        }).catch(() => {
                                            showNotify("Error al guardar la ruta");
                                            setIsProcessing(false);
                                        });
                                    }} className="flex gap-2">
                                        <input 
                                            type="text" 
                                            value={newRouteInput} 
                                            onChange={(e) => setNewRouteInput(e.target.value)} 
                                            placeholder="Ej: Zona Norte, Centro..." 
                                            className="flex-1 p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm text-slate-700 outline-none focus:border-indigo-500" 
                                        />
                                        <button type="submit" disabled={isProcessing} className="px-6 bg-indigo-600 text-white rounded-xl font-black shadow-lg shadow-indigo-200 active:scale-95 transition-transform disabled:opacity-50">
                                            Agregar
                                        </button>
                                    </form>
                                </div>

                                {/* Lista de Rutas */}
                                <div className="space-y-3">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Rutas Existentes ({routesList.length})</h3>
                                    <div className="space-y-2">
                                        {routesList.map((ruta, idx) => {
                                            // Calcular métricas en tiempo real para esta ruta
                                            const clientsInRoute = clients.filter(c => c.route === ruta);
                                            const capitalInRoute = clientsInRoute.reduce((sum, c) => sum + (c.totalDebt || 0), 0);
                                            
                                            return (
                                                <div key={idx} className="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm flex justify-between items-center relative overflow-hidden">
                                                    <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-indigo-500"></div>
                                                    <div className="pl-2">
                                                        <h4 className="font-black text-slate-800 text-lg leading-none mb-1">{ruta}</h4>
                                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                                            {clientsInRoute.length} Clientes • {currency}{Math.round(capitalInRoute).toLocaleString()}
                                                        </p>
                                                    </div>
                                                    {ruta !== 'General' && (
                                                        <button 
                                                            onClick={() => {
                                                                if (clientsInRoute.length > 0) {
                                                                    showNotify("⚠️ No puedes borrar esta ruta porque tiene clientes activos. Cámbiálos de ruta primero.");
                                                                    return;
                                                                }
                                                                if (!window.confirm(`¿Seguro que deseas eliminar la ruta "${ruta}"?`)) return;
                                                                if (!isOnline) return showNotify("Se requiere conexión a Internet");
                                                                
                                                                setIsProcessing(true);
                                                                const updatedRoutes = routesList.filter(r => r !== ruta);
                                                                handleUpdateSetting('routes', updatedRoutes).then(() => {
                                                                    showNotify("Ruta eliminada correctamente");
                                                                    setIsProcessing(false);
                                                                }).catch(() => {
                                                                    showNotify("Error al eliminar");
                                                                    setIsProcessing(false);
                                                                });
                                                            }} 
                                                            className="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-100 active:scale-95 transition-colors"
                                                            title="Eliminar Ruta"
                                                        >
                                                            <Icon name="trash-2" size={16}/>
                                                        </button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* VISTA DE AJUSTES (SETTINGS) */}
                    {view === 'settings' && (
                        <div className="animate-in bg-slate-50 min-h-screen pb-20">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-20 shadow-sm">
                                <button onClick={() => setView('dashboard')} className="p-3 text-slate-400 bg-slate-50 rounded-2xl active:scale-95 transition-transform"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Ajustes Generales</h2>
                            </header>

                            <main className="p-6 space-y-6">
                                {/* Perfil del Administrador */}
                                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm text-center">
                                    <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 border border-indigo-100 shadow-inner overflow-hidden">
                                        <LogoSVG customUrl={userProfile?.logo} className="w-full h-full object-contain p-2" />
                                    </div>
                                    <h3 className="font-black text-slate-800 text-lg">{companyName}</h3>
                                    <p className="text-xs text-slate-400 font-bold">{user?.email}</p>
                                    <button onClick={() => setPasswordModal(true)} className="mt-4 px-5 py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Cambiar Contraseña</button>
                                </div>

                                {/* Preferencias de la App */}
                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Preferencias del Negocio</h4>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Nombre del Negocio</label>
                                            <input type="text" value={userProfile?.companyName || ''} onChange={(e) => handleUpdateSetting('companyName', e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: Inversiones Pérez" />
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Logo del Negocio</label>
                                            <div className="flex items-center gap-3">
                                                <label className="flex-1 bg-slate-50 border border-slate-200 border-dashed p-3 rounded-xl flex items-center justify-center gap-2 cursor-pointer hover:bg-slate-100 transition-colors">
                                                    <Icon name="camera" size={16} className="text-indigo-500"/>
                                                    <span className="text-[10px] font-black text-slate-600 uppercase">Subir Logo</span>
                                                    <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                                                        const file = e.target.files[0];
                                                        if(file) { 
                                                            setIsProcessing(true);
                                                            const compressed = await compressImage(file); 
                                                            await handleUpdateSetting('logo', compressed);
                                                            setIsProcessing(false);
                                                        }
                                                    }} />
                                                </label>
                                                {userProfile?.logo && (
                                                    <button onClick={() => handleUpdateSetting('logo', null)} className="p-3 bg-red-50 text-red-500 rounded-xl active:scale-95 border border-red-100">
                                                        <Icon name="trash-2" size={16}/>
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Interés Defecto (%)</label>
                                                <input type="number" value={userProfile?.defaultInterest || ''} onChange={(e) => handleUpdateSetting('defaultInterest', e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: 20" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Mora Defecto (%)</label>
                                                <input type="number" value={userProfile?.defaultMoraPercentage || ''} onChange={(e) => handleUpdateSetting('defaultMoraPercentage', e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: 5" />
                                            </div>
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Moneda</label>
                                            <input type="text" value={userProfile?.currency || ''} onChange={(e) => handleUpdateSetting('currency', e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: RD$, $, €" />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Pie de página en recibos</label>
                                            <input type="text" value={userProfile?.receiptFooter || ''} onChange={(e) => handleUpdateSetting('receiptFooter', e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" placeholder="Ej: ¡Gracias por su pago!" />
                                        </div>
                                        
                                        <div className="pt-4 border-t border-slate-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm font-black text-slate-800">Modo Oscuro</p>
                                                <p className="text-[10px] text-slate-400 font-bold">Interfaz nocturna (Experimental)</p>
                                            </div>
                                            <button onClick={() => handleUpdateSetting('darkMode', !userProfile?.darkMode)} className={`w-14 h-8 rounded-full p-1 transition-colors relative ${userProfile?.darkMode ? 'bg-indigo-500' : 'bg-slate-200'}`}>
                                                <div className={`w-6 h-6 bg-white rounded-full shadow-md transition-transform absolute top-1 ${userProfile?.darkMode ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                            </button>
                                        </div>

                                        <div className="pt-4 border-t border-slate-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm font-black text-slate-800">Modo Privacidad</p>
                                                <p className="text-[10px] text-slate-400 font-bold">Ocultar montos totales de la app</p>
                                            </div>
                                            <button onClick={() => handleUpdateSetting('privacyMode', !userProfile?.privacyMode)} className={`w-14 h-8 rounded-full p-1 transition-colors relative ${userProfile?.privacyMode ? 'bg-indigo-500' : 'bg-slate-200'}`}>
                                                <div className={`w-6 h-6 bg-white rounded-full shadow-md transition-transform absolute top-1 ${userProfile?.privacyMode ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Impresora Térmica */}
                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Impresión Térmica Bluetooth</h4>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm space-y-4 text-center">
                                        <div className="w-16 h-16 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mx-auto mb-2"><Icon name="printer" size={28}/></div>
                                        <p className="text-xs font-bold text-slate-500 px-4">Conecta una impresora térmica (Chrome en Android requerido).</p>
                                        <button onClick={handleConnectPrinter} disabled={isProcessing} className={`w-full py-4 rounded-xl font-black text-sm active:scale-95 transition-all shadow-sm ${isPrinterReady ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                                            {isPrinterReady ? 'Impresora Conectada ✓' : 'Vincular Impresora Bluetooth'}
                                        </button>
                                        <div className="flex gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-100">
                                            <button onClick={() => handleUpdateSetting('paperSize', '58mm')} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${userProfile?.paperSize !== '80mm' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Rollo 58mm</button>
                                            <button onClick={() => handleUpdateSetting('paperSize', '80mm')} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${userProfile?.paperSize === '80mm' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Rollo 80mm</button>
                                        </div>
                                    </div>
                                </div>

                                {/* Cobradores / Equipo */}
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center ml-2">
                                        <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Equipo y Cobradores</h4>
                                        <button onClick={() => setCobradorModal(true)} className="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-3 py-1.5 rounded-lg active:scale-95 transition-all">+ Añadir</button>
                                    </div>
                                    <div className="bg-white p-2 rounded-[2rem] border border-slate-100 shadow-sm">
                                        {cobradores.length === 0 ? (
                                            <p className="text-center text-xs font-bold text-slate-400 py-6">No hay personal registrado</p>
                                        ) : (
                                            <div className="space-y-2 p-2">
                                                {cobradores.map(c => (
                                                    <div key={c.id} className="bg-slate-50 border border-slate-100 p-4 rounded-2xl flex justify-between items-center">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center font-black">{c.name[0]}</div>
                                                            <div>
                                                                <p className="font-black text-sm text-slate-800 leading-tight">{c.name}</p>
                                                                <p className="text-[10px] text-slate-500 font-bold">{c.email}</p>
                                                                <p className="text-[9px] text-emerald-600 font-black uppercase mt-1 tracking-widest bg-emerald-50 px-2 py-0.5 rounded-md inline-block">Ruta: {c.assignedRoute}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setEditingCobrador({id: c.id, name: c.name, email: c.email, route: c.assignedRoute}); setEditCobradorModal(true); }} className="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-600 rounded-xl transition-all" title="Editar"><Icon name="edit" size={16}/></button>
                                                            <button onClick={() => setDeleteCobradorConfirm(c.id)} className="p-2 text-red-400 hover:bg-red-50 hover:text-red-600 rounded-xl transition-all" title="Eliminar"><Icon name="trash-2" size={16}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Copia de Seguridad */}
                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Respaldo y Seguridad</h4>
                                    <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
                                        <div className="flex gap-3">
                                            <button onClick={exportBackup} className="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 p-4 rounded-xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all">
                                                <Icon name="download" size={20} className="text-indigo-500"/>
                                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Exportar BD</span>
                                            </button>
                                            <label className="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 p-4 rounded-xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all cursor-pointer">
                                                <Icon name="upload" size={20} className="text-emerald-500"/>
                                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Importar BD</span>
                                                <input type="file" accept=".json" className="hidden" onChange={importBackup} />
                                            </label>
                                        </div>
                                        <button onClick={() => setWipeSystemConfirm(true)} className="w-full py-4 bg-red-50 text-red-600 border border-red-100 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                                            <Icon name="trash-2" size={16}/> Limpieza Total de Sistema
                                        </button>
                                    </div>
                                </div>

                                <div className="text-center pt-8 pb-4">
                                    <button onClick={() => auth.signOut()} className="px-6 py-3 bg-slate-200 text-slate-600 rounded-[1.5rem] font-black text-xs uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto">
                                        <Icon name="log-out" size={16}/> Cerrar Sesión Segura
                                    </button>
                                </div>
                            </main>
                            
                            {/* Modal Crear Cobrador */}
                            {cobradorModal && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[2.5rem] p-6 w-full max-w-sm shadow-2xl animate-in">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="heading-font text-xl font-black text-slate-800">Nuevo Cobrador</h3>
                                            <button onClick={() => setCobradorModal(false)} className="p-2 text-slate-400 bg-slate-50 rounded-xl"><Icon name="x"/></button>
                                        </div>
                                        <form onSubmit={handleCreateCobrador} className="space-y-4">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre</label><input type="text" value={cobradorForm.name} onChange={e => setCobradorForm({...cobradorForm, name: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" required /></div>
                                            <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Email de Acceso</label><input type="email" value={cobradorForm.email} onChange={e => setCobradorForm({...cobradorForm, email: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" required /></div>
                                            <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Contraseña</label><input type="password" value={cobradorForm.pass} onChange={e => setCobradorForm({...cobradorForm, pass: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" required minLength="6" /></div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Asignar Ruta</label>
                                                <select value={cobradorForm.route} onChange={e => setCobradorForm({...cobradorForm, route: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500 appearance-none">
                                                    <option value="Todas">Todas las rutas (Acceso Global)</option>
                                                    {routesList.map((r, i) => <option key={i} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <button type="submit" disabled={isProcessing} className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black mt-4 shadow-lg active:scale-95 transition-all">{isProcessing ? 'Creando...' : 'Crear Usuario'}</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* Modal Editar Cobrador */}
                            {editCobradorModal && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[2.5rem] p-6 w-full max-w-sm shadow-2xl animate-in">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="heading-font text-xl font-black text-slate-800">Editar Cobrador</h3>
                                            <button onClick={() => setEditCobradorModal(false)} className="p-2 text-slate-400 bg-slate-50 rounded-xl"><Icon name="x"/></button>
                                        </div>
                                        <form onSubmit={handleUpdateCobrador} className="space-y-4">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre</label><input type="text" value={editingCobrador.name} onChange={e => setEditingCobrador({...editingCobrador, name: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500" required /></div>
                                            <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Email (No editable)</label><input type="email" value={editingCobrador.email} className="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl font-bold text-slate-400 outline-none cursor-not-allowed" disabled /></div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Asignar Ruta</label>
                                                <select value={editingCobrador.route} onChange={e => setEditingCobrador({...editingCobrador, route: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-500 appearance-none">
                                                    <option value="Todas">Todas las rutas (Acceso Global)</option>
                                                    {routesList.map((r, i) => <option key={i} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <button type="submit" disabled={isProcessing} className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black mt-4 shadow-lg active:scale-95 transition-all">{isProcessing ? 'Guardando...' : 'Guardar Cambios'}</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
