<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Préstamos - Gestión Profesional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- html2canvas para Recibos y Fotos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #4f46e5;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        .heading-font { font-family: 'Plus Jakarta Sans', sans-serif; }

        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .splash-fade-out {
            animation: splashExit 0.8s forwards ease-in-out;
            animation-delay: 2.5s;
        }
        @keyframes splashExit {
            to { opacity: 0; visibility: hidden; pointer-events: none; }
        }

        .logo-bounce {
            animation: logoBounce 2s infinite ease-in-out;
        }
        @keyframes logoBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .icon-container svg { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, startTransition } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDid8PFmp7fKbLjFSn7mzMcrIfDgjEGwLM",
            authDomain: "connect-prestamos.firebaseapp.com",
            projectId: "connect-prestamos",
            storageBucket: "connect-prestamos.firebasestorage.app",
            messagingSenderId: "685856835997",
            appId: "1:685856835997:web:1d68dc29b9268c656a0774",
            measurementId: "G-5VFZ5ZCBYZ"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Logo SVG Profesional Connect
        const LogoSVG = ({ className = "w-12 h-12", color = "#4f46e5" }) => (
            <svg viewBox="0 0 24 24" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2" opacity="0.1" />
                <path d="M7 12C7 9.23858 9.23858 7 12 7C14.7614 7 17 9.23858 17 12" stroke={color} strokeWidth="2.5" strokeLinecap="round" />
                <path d="M7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.4" />
                <path d="M12 7L14.5 4.5M14.5 4.5H11.5M14.5 4.5V7.5" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                <circle cx="12" cy="12" r="2" fill={color} />
            </svg>
        );

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                "users": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                "log-out": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
                "credit-card": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
                "search": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                "user-plus": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>,
                "arrow-left": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
                "trash-2": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                "settings": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                "send": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>,
                "trending-up": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
                "check-circle-2": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                "share-2": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
                "x": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                "download": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                "printer": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
                "clock": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                "bell": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
                "user": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                "shield": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                "mail": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
                "lock": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            };
            return <span className={`icon-container inline-flex items-center justify-center ${className}`}>{icons[name] || null}</span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [clients, setClients] = useState([]);
            const [selectedClientId, setSelectedClientId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            const [receiptData, setReceiptData] = useState(null);
            const [reminderClient, setReminderClient] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showSplash, setShowSplash] = useState(true);
            const [isGeneratingImage, setIsGeneratingImage] = useState(false);
            const [isTransacting, setIsTransacting] = useState(false);
            const [earningsFilter, setEarningsFilter] = useState('todas');
            const [earningsSearch, setEarningsSearch] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [deletePaymentConfirm, setDeletePaymentConfirm] = useState(null);
            
            // Perfil de usuario para configuraciones
            const [userProfile, setUserProfile] = useState({ smsAuto: false });

            // Nuevos estados para Cartera
            const [portfolioSearch, setPortfolioSearch] = useState('');
            const [portfolioFilter, setPortfolioFilter] = useState('all'); // all, active, inactive

            const receiptRef = useRef(null);
            const reminderRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    startTransition(() => {
                        setUser(u);
                        setLoading(false);
                        if (u) setView('dashboard');
                        else setView('login');
                    });
                });
                const timer = setTimeout(() => setShowSplash(false), 3300);
                return () => { unsubscribe(); clearTimeout(timer); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('users').doc(user.uid).collection('clients')
                    .onSnapshot((snap) => {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        startTransition(() => { setClients(data); });
                    }, (err) => console.error("Firestore error:", err));
                    
                const unsubProfile = db.collection('users').doc(user.uid)
                    .onSnapshot((doc) => {
                        if (doc.exists) setUserProfile(doc.data());
                    });
                    
                return () => { unsub(); unsubProfile(); }
            }, [user]);

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // Función robusta de parseo de fechas (Solución a gestión de fechas)
            const parseDateString = (dateStr) => {
                let d = new Date(dateStr);
                if (!isNaN(d.getTime())) return d;
                
                // Fallback para formato dd/mm/yyyy o dd-mm-yyyy
                const parts = dateStr.split(/[-/]/);
                if (parts.length === 3) {
                    d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T12:00:00`);
                    if (!isNaN(d.getTime())) return d;
                }
                return new Date(); // Fallback final
            };

            const calculateNextDate = (currentDateStr, frequency) => {
                const date = parseDateString(currentDateStr);
                switch(frequency) {
                    case 'Diario': date.setDate(date.getDate() + 1); break;
                    case 'Semanal': date.setDate(date.getDate() + 7); break;
                    case 'Quincenal': date.setDate(date.getDate() + 15); break;
                    case 'Mensual': date.setMonth(date.getMonth() + 1); break;
                    default: date.setDate(date.getDate() + 7);
                }
                return date.toLocaleDateString();
            };

            const handleShare = async (ref, fileName, title) => {
                if (!ref.current) return;
                setIsGeneratingImage(true);
                try {
                    const canvas = await html2canvas(ref.current, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    const file = new File([blob], `${fileName}.png`, { type: 'image/png' });
                    
                    if (navigator.share) {
                        try {
                            await navigator.share({ files: [file], title: title });
                        } catch (err) {
                            // Fallback automático si navigator.share falla
                            const link = document.createElement('a');
                            link.download = `${fileName}.png`;
                            link.href = canvas.toDataURL();
                            link.click();
                        }
                    } else {
                        const link = document.createElement('a');
                        link.download = `${fileName}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    }
                } catch (e) { 
                    console.error("Share error:", e); 
                    showNotify("Error al generar la imagen");
                } finally { 
                    setIsGeneratingImage(false); 
                }
            };

            const recordTransaction = async (clientId, amount, paymentDateStr) => {
                const client = clients.find(c => c.id === clientId);
                if (!client) return;
                const num = parseFloat(amount.toString().replace(/,/g, ''));
                if (isNaN(num) || num <= 0) { showNotify("Monto no válido"); return; }

                let displayDate = new Date().toLocaleDateString();
                if (paymentDateStr) {
                    const [y, m, d] = paymentDateStr.split('-');
                    if (y && m && d) displayDate = `${d}/${m}/${y}`;
                }

                const currentPaid = client.loan?.paidInstallments || 0;
                const instBaseAmount = client.loan?.installmentAmount || 0;
                const currentPartial = client.loan?.partialCredit || 0;

                const totalMoneyAvailable = num + currentPartial;
                const installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                const surplus = totalMoneyAvailable % instBaseAmount;
                
                const newPaid = Math.min(client.loan.totalInstallments, currentPaid + installmentsCovered);
                const newDebt = Math.max(0, client.totalDebt - num);
                
                let nextDate = client.loan.nextPaymentDate || new Date().toLocaleDateString();
                if (installmentsCovered > 0) {
                    for(let i=0; i < installmentsCovered; i++) { 
                        nextDate = calculateNextDate(nextDate, client.loan.frequency); 
                    }
                }

                const entry = {
                    id: Date.now().toString(),
                    amount: num,
                    surplus: surplus,
                    date: displayDate,
                    type: 'Pago',
                    description: installmentsCovered > 0 ? `Pago ${installmentsCovered} Cuota(s)` : 'Abono parcial',
                    ref: 'REC-' + Math.floor(1000 + Math.random() * 8999),
                    installmentStatus: `${newPaid}/${client.loan.totalInstallments}`,
                    remainingInstallments: client.loan.totalInstallments - newPaid
                };

                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(clientId).update({
                        totalDebt: newDebt,
                        history: [entry, ...client.history],
                        'loan.paidInstallments': newPaid,
                        'loan.partialCredit': surplus,
                        'loan.nextPaymentDate': nextDate
                    });
                    setReceiptData({ 
                        client: {...client, totalDebt: newDebt, loan: {...client.loan, paidInstallments: newPaid, partialCredit: surplus}}, 
                        transaction: entry, surplus: surplus 
                    });
                    showNotify("Pago registrado correctamente");
                    setIsTransacting(false);
                } catch (e) { showNotify("Error al guardar"); }
            };

            const deleteClient = async () => {
                if(!deleteConfirm) return;
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(deleteConfirm).delete();
                    setDeleteConfirm(null); setSelectedClientId(null); setView('dashboard');
                    showNotify("Cliente eliminado permanentemente");
                } catch(e) { showNotify("Error al eliminar"); }
            };

            const deletePayment = async () => {
                if(!deletePaymentConfirm || !selectedClientId) return;
                const client = clients.find(c => c.id === selectedClientId);
                const payment = deletePaymentConfirm;

                // Sacamos el pago del historial
                const newHistory = client.history.filter(h => h.id !== payment.id);
                
                let updateData = {
                    history: newHistory,
                    totalDebt: client.totalDebt + payment.amount
                };

                // Si hay un préstamo activo, revertimos las cuotas y la fecha
                if (client.loan) {
                    const currentTotalPaid = (client.loan.paidInstallments * client.loan.installmentAmount) + (client.loan.partialCredit || 0);
                    const newTotalPaid = Math.max(0, currentTotalPaid - payment.amount);
                    
                    const newPaidInstallments = Math.floor((newTotalPaid + 0.001) / client.loan.installmentAmount);
                    const newPartialCredit = Math.max(0, newTotalPaid - (newPaidInstallments * client.loan.installmentAmount));

                    // Intentamos retroceder la fecha de cobro según las cuotas eliminadas
                    let revertedDate = client.loan.nextPaymentDate;
                    const installmentsDiff = client.loan.paidInstallments - newPaidInstallments;
                    
                    if (installmentsDiff > 0 && revertedDate) {
                        const d = parseDateString(revertedDate);
                        for(let i=0; i < installmentsDiff; i++) {
                            switch(client.loan.frequency) {
                                case 'Diario': d.setDate(d.getDate() - 1); break;
                                case 'Semanal': d.setDate(d.getDate() - 7); break;
                                case 'Quincenal': d.setDate(d.getDate() - 15); break;
                                case 'Mensual': d.setMonth(d.getMonth() - 1); break;
                            }
                        }
                        revertedDate = d.toLocaleDateString();
                    }

                    updateData['loan.paidInstallments'] = newPaidInstallments;
                    updateData['loan.partialCredit'] = newPartialCredit;
                    updateData['loan.nextPaymentDate'] = revertedDate;
                }

                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update(updateData);
                    setDeletePaymentConfirm(null);
                    showNotify("Pago anulado y saldo restaurado");
                } catch(e) {
                    showNotify("Error al anular el pago");
                }
            };

            const updateClient = async (e) => {
                e.preventDefault();
                const data = {
                    name: e.target.name.value,
                    cedula: e.target.cedula.value,
                    phone: e.target.phone.value,
                    email: e.target.email?.value || '',
                    address: e.target.address.value,
                };
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update(data);
                    setView('profile'); showNotify("Datos actualizados");
                } catch (e) { showNotify("Error al actualizar"); }
            };

            const assignLoan = async (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.amount.value);
                const interest = parseFloat(e.target.interest.value);
                const inst = parseInt(e.target.inst.value);
                const total = amount + (amount * (interest/100));
                const firstPaymentDate = new Date().toLocaleDateString();
                
                await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update({
                    totalDebt: total,
                    loan: {
                        amount, interest, totalToPay: total, totalInstallments: inst, paidInstallments: 0,
                        installmentAmount: total / inst, frequency: e.target.freq.value, partialCredit: 0,
                        nextPaymentDate: calculateNextDate(firstPaymentDate, e.target.freq.value)
                    }
                });
                setView('profile'); showNotify("Préstamo asignado");
            };

            const handleUpdateEmail = async (e) => {
                e.preventDefault();
                try {
                    await auth.currentUser.verifyBeforeUpdateEmail(e.target.email.value);
                    showNotify("Revisa tu nueva bandeja de entrada para verificar el correo.");
                    e.target.reset();
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar para cambiar datos sensibles.");
                    else showNotify("Error al actualizar correo: " + error.message);
                }
            };

            const handleUpdatePassword = async (e) => {
                e.preventDefault();
                try {
                    await auth.currentUser.updatePassword(e.target.password.value);
                    showNotify("Contraseña actualizada exitosamente");
                    e.target.reset();
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar.");
                    else showNotify("Error al actualizar contraseña");
                }
            };

            const downloadCSV = () => {
                const headers = "Cliente,Fecha,Monto,Ganancia,Estado\n";
                const rows = filteredGains.map(g => `"${g.clientName}",${g.date},${g.totalValue.toFixed(2)},${g.gainAmount.toFixed(2)},${g.status}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `ganancias_connect_${new Date().getTime()}.csv`;
                a.click();
            };

            // Metrics Logic
            const todayStr = new Date().toLocaleDateString();
            const dueToday = useMemo(() => clients.filter(c => c.loan && c.loan.nextPaymentDate === todayStr && c.totalDebt > 0.1), [clients, todayStr]);

            const netCapitalOnStreet = useMemo(() => clients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const principalRatio = curr.loan.amount / curr.loan.totalToPay;
                    return acc + ((curr.totalDebt || 0) * principalRatio);
                }
                return acc + (curr.totalDebt || 0);
            }, 0), [clients]);
            
            const totalEarned = useMemo(() => clients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalInstallments > 0) {
                    const profitPerInstallment = (curr.loan.totalToPay - curr.loan.amount) / curr.loan.totalInstallments;
                    return acc + (profitPerInstallment * (curr.loan.paidInstallments || 0));
                }
                return acc;
            }, 0), [clients]);

            const pendingProfit = useMemo(() => clients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const profitRatio = (curr.loan.totalToPay - curr.loan.amount) / curr.loan.totalToPay;
                    return acc + ((curr.totalDebt || 0) * profitRatio);
                }
                return acc;
            }, 0), [clients]);

            const allGainsBreakdown = useMemo(() => {
                const list = [];
                clients.forEach(c => {
                    if (c.history) {
                        c.history.forEach(h => {
                            const profitRatio = (c.loan && c.loan.totalToPay > 0) ? (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay : 0;
                            list.push({ id: h.id, clientId: c.id, clientName: c.name, date: h.date, totalValue: h.amount || 0, gainAmount: (h.amount || 0) * profitRatio, status: 'cobrada', desc: h.description });
                        });
                    }
                    if ((c.totalDebt || 0) > 0.1 && c.loan && c.loan.totalToPay > 0) {
                        const profitRatio = (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay;
                        list.push({ id: `pend-${c.id}`, clientId: c.id, clientName: c.name, date: c.loan.nextPaymentDate || 'Pendiente', totalValue: c.totalDebt, gainAmount: c.totalDebt * profitRatio, status: 'pendiente', desc: 'Interés por cobrar' });
                    }
                });
                return list;
            }, [clients]);

            const filteredGains = useMemo(() => {
                const search = earningsSearch.toLowerCase();
                return allGainsBreakdown.filter(g => {
                    const matchStatus = earningsFilter === 'todas' || g.status === earningsFilter;
                    const matchSearch = g.clientName.toLowerCase().includes(search);
                    return matchStatus && matchSearch;
                });
            }, [allGainsBreakdown, earningsFilter, earningsSearch]);

            const filteredClients = useMemo(() => {
                const s = searchTerm.toLowerCase();
                return clients.filter(c => 
                    c.name.toLowerCase().includes(s) ||
                    (c.cedula && c.cedula.includes(s)) ||
                    (c.phone && c.phone.includes(s)) ||
                    (c.address && c.address.toLowerCase().includes(s))
                );
            }, [clients, searchTerm]);

            // Filtrado específico para la Cartera
            const portfolioFilteredClients = useMemo(() => {
                const s = portfolioSearch.toLowerCase();
                return clients.filter(c => {
                    const matchSearch = c.name.toLowerCase().includes(s) || (c.cedula && c.cedula.includes(s)) || (c.phone && c.phone.includes(s));
                    let matchFilter = true;
                    if (portfolioFilter === 'active') matchFilter = c.loan && c.totalDebt > 0;
                    if (portfolioFilter === 'inactive') matchFilter = !c.loan || c.totalDebt <= 0;
                    return matchSearch && matchFilter;
                });
            }, [clients, portfolioSearch, portfolioFilter]);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 z-[500] bg-slate-950 flex flex-col items-center justify-center splash-fade-out">
                        <LogoSVG className="w-32 h-32 mb-6 logo-bounce" color="#6366f1" />
                        <h1 className="heading-font text-3xl font-black text-white tracking-tighter">Connect Préstamos</h1>
                        <p className="text-indigo-500/50 text-[10px] uppercase font-black tracking-[0.3em] mt-4">Gestión Inteligente</p>
                    </div>
                );
            }

            if (loading) return null;

            const selectedClient = clients.find(c => c.id === selectedClientId);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[110] bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-2xl animate-in">{notification}</div>}

                    {/* MODAL ELIMINAR CLIENTE */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Eliminar Cliente?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">Se borrará de la nube permanentemente.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={deleteClient} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-sm">Eliminar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL ELIMINAR PAGO */}
                    {deletePaymentConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Anular Pago?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">El monto de <span className="text-slate-800">${deletePaymentConfirm.amount.toLocaleString()}</span> se devolverá a la deuda y se ajustarán las cuotas.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeletePaymentConfirm(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={deletePayment} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-sm">Anular</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'login' && (
                        <div className="p-10 flex flex-col items-center justify-center h-screen animate-in bg-white">
                            <LogoSVG className="w-24 h-24 mb-8" color="#4f46e5" />
                            <h1 className="heading-font text-2xl font-black mb-8 text-slate-800 tracking-tight">Connect Préstamos</h1>
                            <form onSubmit={(e) => { e.preventDefault(); auth.signInWithEmailAndPassword(e.target.email.value, e.target.pass.value); }} className="w-full space-y-4">
                                <input name="email" type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">Iniciar Sesión</button>
                            </form>
                            <div className="mt-8 flex flex-col items-center gap-3 w-full border-t border-slate-100 pt-6">
                                <p className="text-xs text-slate-400 font-bold">¿Aún no tienes cuenta?</p>
                                <button onClick={() => setView('register')} className="w-full bg-slate-50 border border-slate-200 text-indigo-600 p-4 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors">
                                    <Icon name="user-plus" size={18} /> Crear Usuario / Registrar Cartera
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'register' && (
                        <div className="p-10 flex flex-col items-center justify-center h-screen animate-in bg-white">
                            <LogoSVG className="w-16 h-16 mb-6" color="#4f46e5" />
                            <h1 className="heading-font text-2xl font-black mb-8 text-slate-800 text-center leading-tight">Crea tu Cartera <br/>Connect</h1>
                            <form onSubmit={async (e) => { 
                                e.preventDefault(); 
                                try {
                                    const cred = await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.pass.value); 
                                    await db.collection('users').doc(cred.user.uid).set({
                                        phone: e.target.phone.value,
                                        smsAuto: false,
                                        createdAt: firebase.firestore.FieldValue.serverTimestamp()

                                    showNotify("Error: " + error.message);
                                }

                                <input name="email" type="email" placeholder="Tu Email Principal" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />

                                <input name="pass" type="password" placeholder="Contraseña Segura" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">Comenzar a Gestionar</button>
                            </form>
                            <button onClick={() => setView('login')} className="mt-6 text-indigo-600 font-bold text-sm">Ya tengo una cuenta</button>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <div className="animate-in min-h-screen pb-24">
                            <header className="p-6 border-b bg-white sticky top-0 z-10 shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <LogoSVG className="w-8 h-8" color="#4f46e5" />
                                        <h2 className="heading-font text-xl font-black text-slate-800 tracking-tighter">Connect Préstamos</h2>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setView('portfolio')} className="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-indigo-600 transition-colors"><Icon name="users" size={20}/></button>
                                        <button onClick={() => setView('settings')} className="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-indigo-600 transition-colors"><Icon name="settings" size={20}/></button>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <div className="bg-slate-900 p-7 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                        <p className="opacity-50 text-[10px] font-black uppercase tracking-widest mb-1">Capital Neto en Calle</p>
                                        <h3 className="text-4xl font-black tracking-tight">${Math.round(netCapitalOnStreet).toLocaleString()}</h3>
                                        <Icon name="credit-card" className="absolute -right-6 -bottom-6 opacity-10 rotate-12" size={120} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div onClick={() => { setEarningsFilter('pendiente'); setView('ganancias'); }} className="bg-emerald-50 rounded-[2rem] p-5 border border-emerald-100 flex flex-col items-center text-center cursor-pointer active:scale-95 transition-all">
                                            <p className="text-emerald-600/60 text-[9px] font-black uppercase tracking-widest mb-1">G. Pendiente</p>
                                            <h3 className="text-xl font-black text-emerald-600">${Math.round(pendingProfit).toLocaleString()}</h3>
                                        </div>
                                        <div onClick={() => { setEarningsFilter('cobrada'); setView('ganancias'); }} className="bg-indigo-50 rounded-[2rem] p-5 border border-indigo-100 flex flex-col items-center text-center cursor-pointer active:scale-95 transition-all">
                                            <p className="text-indigo-600/60 text-[9px] font-black uppercase tracking-widest mb-1">G. Cobrada</p>
                                            <h3 className="text-xl font-black text-indigo-600">${Math.round(totalEarned).toLocaleString()}</h3>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 relative">
                                    <Icon name="search" className="absolute left-4 top-4 text-slate-300" size={18} />
                                    <input type="text" placeholder="Buscar por Nombre, ID, Teléfono..." className="w-full pl-12 p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-xs outline-none focus:border-indigo-500" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </header>

                            <main className="p-6 space-y-8">
                                {dueToday.length > 0 && (
                                    <div className="space-y-4">
                                        <h4 className="heading-font text-[11px] font-black uppercase text-slate-500 tracking-widest px-2 flex items-center gap-2"><Icon name="bell" size={14}/> Cobros para hoy</h4>
                                        <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                            {dueToday.map(c => (
                                                <div key={c.id} onClick={() => { setSelectedClientId(c.id); setView('profile'); }} className="min-w-[150px] p-5 bg-amber-50 border border-amber-100 rounded-[2rem] flex flex-col items-center text-center shadow-sm cursor-pointer hover:bg-amber-100 transition-colors">
                                                    <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center font-black text-amber-600 mb-3 border border-amber-200">{c.name[0]}</div>
                                                    <p className="font-black text-slate-800 text-xs truncate w-full">{c.name}</p>
                                                    <p className="text-[10px] font-black text-amber-600 mt-1">${Math.round(c.loan.installmentAmount - (c.loan.partialCredit || 0)).toLocaleString()}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h4 className="heading-font text-[11px] font-black uppercase text-slate-400 tracking-widest px-2">Cartera General</h4>
                                    <div className="space-y-3">
                                        {filteredClients.map(c => (
                                            <div key={c.id} onClick={() => { setSelectedClientId(c.id); setView('profile'); }} className="p-5 bg-white border border-slate-100 rounded-[2.2rem] shadow-sm flex justify-between items-center cursor-pointer active:scale-[0.98] transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-14 h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center font-black text-xl">{c.name[0]}</div>
                                                    <div>
                                                        <h4 className="font-black text-slate-800 leading-none mb-1">{c.name}</h4>
                                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">{c.phone}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`font-black text-lg ${c.totalDebt > 0.1 ? 'text-red-500' : 'text-emerald-500'}`}>${(c.totalDebt || 0).toLocaleString()}</p>
                                                    {c.loan && <p className="text-[9px] text-slate-300 font-bold uppercase">{c.loan.frequency}</p>}
                                                </div>
                                            </div>
                                        ))}
                                        {filteredClients.length === 0 && (
                                            <p className="text-center text-[10px] font-black uppercase text-slate-300 py-10 tracking-widest">No hay resultados</p>
                                        )}
                                    </div>
                                </div>
                            </main>
                            <button onClick={() => setView('add_client')} className="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl flex items-center justify-center z-20 hover:scale-105 active:scale-95 transition-all"><Icon name="user-plus" size={28} /></button>
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center justify-between sticky top-0 bg-white z-20 shadow-sm">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setView('dashboard')} className="p-3 text-slate-400 hover:bg-slate-50 rounded-2xl"><Icon name="arrow-left"/></button>
                                    <h2 className="heading-font text-xl font-black text-slate-800 tracking-tighter">Ajustes Generales</h2>
                                </div>
                                <button onClick={() => auth.signOut()} className="p-3 text-red-500 bg-red-50 rounded-2xl font-black text-xs flex items-center gap-2"><Icon name="log-out" size={16}/> Salir</button>
                            </header>
                            <main className="p-6 space-y-8">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="mail" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Modificar Correo</h4>
                                    </div>
                                    <form onSubmit={handleUpdateEmail} className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <p className="text-xs font-bold text-slate-500">Actual: {user?.email}</p>
                                        <input name="email" type="email" placeholder="Nuevo correo electrónico" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500" required />
                                        <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">Actualizar Correo</button>
                                    </form>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="lock" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Modificar Contraseña</h4>
                                    </div>
                                    <form onSubmit={handleUpdatePassword} className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <input name="password" type="password" placeholder="Nueva contraseña (mín 6 caracteres)" minLength="6" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500" required />
                                        <button className="w-full bg-slate-800 text-white p-4 rounded-2xl font-black shadow-lg">Cambiar Contraseña</button>
                                    </form>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="shield" size={20}/></div>
                                        <h4 className="font-black text-sm uppercase tracking-widest text-slate-400">Preferencias Pro</h4>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-4">
                                        <div className="flex justify-between items-center pt-2 pb-2">
                                            <span className="font-bold text-slate-700 text-sm">Modo Oscuro (Próximamente)</span>
                                            <div className="w-12 h-6 bg-slate-300 rounded-full relative cursor-pointer"><div className="w-4 h-4 bg-white rounded-full absolute left-1 top-1"></div></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 text-center">
                                        <LogoSVG className="w-12 h-12 mx-auto mb-2 opacity-50" color="#64748b" />
                                        <p className="font-black text-sm text-slate-600">Connect Préstamos Pro</p>
                                        <p className="text-xs font-bold text-slate-400 mt-1">Versión 2.5.0 Cloud</p>
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-4">Gestión Segura con Firebase</p>
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {view === 'ganancias' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center justify-between sticky top-0 bg-white z-20 no-print shadow-sm">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                    <h2 className="heading-font text-xl font-black text-slate-800">Estado de Cuenta</h2>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={downloadCSV} className="p-3 bg-slate-50 rounded-2xl"><Icon name="download" size={20}/></button>
                                    <button onClick={() => window.print()} className="p-3 bg-slate-50 rounded-2xl"><Icon name="printer" size={20}/></button>
                                </div>
                            </header>
                            <main className="p-6 space-y-6">
                                <div className="no-print space-y-4">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                        {['todas', 'cobrada', 'pendiente'].map(f => (
                                            <button key={f} onClick={() => setEarningsFilter(f)} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${earningsFilter === f ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>{f}</button>
                                        ))}
                                    </div>
                                    <div className="relative">
                                        <Icon name="search" className="absolute left-4 top-4 text-slate-300" size={16} />
                                        <input type="text" placeholder="Filtrar por nombre..." className="w-full pl-11 p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-xs outline-none focus:border-indigo-500" value={earningsSearch} onChange={e => setEarningsSearch(e.target.value)} />
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    {filteredGains.map(g => (
                                        <div key={g.id} className="p-5 bg-white border border-slate-100 rounded-[2rem] flex justify-between items-center shadow-sm">

                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black border ${g.status === 'cobrada' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'}`}>
                                                    {g.status === 'cobrada' ? <Icon name="check-circle-2" size={20}/> : <Icon name="clock" size={20}/>}
                                                </div>
                                                <div><h4 className="font-black text-slate-800 text-sm leading-none mb-1">{g.clientName}</h4><p className="text-[10px] text-slate-400 font-bold uppercase">{g.date} • {g.desc}</p></div>
                                            </div>

                            <header className="p-6 border-b flex items-center gap-4 sticky top-0 bg-white shadow-sm z-10"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800 tracking-tighter">Nuevo Préstamo</h2></header>
                            <form onSubmit={assignLoan} className="p-8 space-y-6">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto a Prestar</label><input name="amount" type="number" step="any" className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Interés %</label><input name="interest" type="number" defaultValue="20" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" /></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">No. Cuotas</label><input name="inst" type="number" defaultValue="10" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" /></div>
                                </div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select name="freq" className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option>Semanal</option><option>Diario</option><option>Quincenal</option><option>Mensual</option></select></div>
                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-6 uppercase tracking-widest text-sm active:scale-95 transition-all">Activar Préstamo Cloud</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
