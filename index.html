    <link id="dynamic-manifest" rel="manifest">
    
    <script>
        const manifestData = {
            name: "Connect Préstamos",
            short_name: "Connect",
            start_url: window.location.href.split('?')[0].split('#')[0],
            display: "standalone",
            background_color: "#f8fafc",
            theme_color: "#0f172a",
            icons: [
                { src: "https://raw.githubusercontent.com/geudri98-png/Connect-prestamos/23ac554dea034e3dc9675fe2abffa052d83ad021/connectprestamos%20logopng%20(1).png", sizes: "192x192", type: "image/png", purpose: "any" },
                { src: "https://raw.githubusercontent.com/geudri98-png/Connect-prestamos/23ac554dea034e3dc9675fe2abffa052d83ad021/connectprestamos%20logopng%20(1).png", sizes: "512x512", type: "image/png", purpose: "any" }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
        document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'connect-pro-v1';
                    const ASSETS = [
                        '/',
                        'https://cdn.tailwindcss.com',
                        'https://unpkg.com/react@18/umd/react.production.min.js',
                        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                        'https://unpkg.com/@babel/standalone/babel.min.js',
                        'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
                        'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'
                    ];
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(
                            caches.match(e.request).then(res => res || fetch(e.request))
                        );
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => {
                    console.log('SW Error:', err);
                });
            });
        }
    </script>

                try {

                    const device = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: [

                        ]
                    });

                    const server = await device.gatt.connect();
                    const services = await server.getPrimaryServices();
                    let targetChar = null;

                    for (const service of services) {
                        const characteristics = await service.getCharacteristics();
                        for (const char of characteristics) {
                            if (char.properties.write || char.properties.writeWithoutResponse) {
                                targetChar = char;
                                break;
                            }
                        }
                        if (targetChar) break;
                    }

                    if (!targetChar) {
                        device.gatt.disconnect();
                        throw new Error("El dispositivo no admite impresión directa.");
                    }

                    printerDeviceRef.current = device;
                    printerCharRef.current = targetChar;
                    setIsPrinterReady(true);

            const printReceiptDirectly = async (data) => {
                if (!printerCharRef.current) {
                    showNotify("¡Atención! Primero vincula la impresora en Ajustes.");
                    setView('settings');
                    setReceiptData(null);
                    return;
                }

                try {
                    showNotify("Imprimiendo ticket...");
                    let bytes = [];
                    const addBytes = (arr) => bytes.push(...arr);
                    
                    const sanitize = (text) => text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n").replace(/Ñ/g, "N");
                    
                    const addText = (text) => {
                        const str = sanitize(text);
                        for (let i = 0; i < str.length; i++) bytes.push(str.charCodeAt(i));
                    };

                    const is80mm = userProfile?.paperSize === '80mm';
                    const charsPerLine = is80mm ? 48 : 32;

                    const centerText = (text) => {
                        const str = sanitize(text);
                        const spaces = Math.max(0, Math.floor((charsPerLine - str.length) / 2));
                        addText(' '.repeat(spaces) + str + '\n');
                    };

                    const padText = (left, right) => {
                        const lStr = sanitize(left);
                        const rStr = sanitize(right);
                        const spaces = Math.max(0, charsPerLine - lStr.length - rStr.length);
                        addText(lStr + ' '.repeat(spaces) + rStr + '\n');
                    };

                    const hr = () => addText('-'.repeat(charsPerLine) + '\n');

                    addBytes([0x1B, 0x40]); 
                    
                    addBytes([0x1B, 0x61, 0x01]); 
                    addBytes([0x1B, 0x45, 0x01]); 
                    addBytes([0x1D, 0x21, 0x11]); 
                    centerText(companyName);
                    addBytes([0x1D, 0x21, 0x00]); 
                    addBytes([0x1B, 0x45, 0x00]); 
                    addText("\nRECIBO DE PAGO\n\n");
                    
                    addBytes([0x1B, 0x61, 0x00]); 
                    padText("Fecha:", data.transaction.date);
                    padText("Ref:", data.transaction.ref);
                    padText("Cliente:", data.client.name.substring(0, charsPerLine - 10));
                    hr();
                    padText("Concepto:", data.transaction.description.substring(0, charsPerLine - 11));
                    
                    addBytes([0x1B, 0x45, 0x01]); 
                    padText("Recibido:", `${currency}${Math.round(data.transaction.amount).toLocaleString()}`);
                    addBytes([0x1B, 0x45, 0x00]); 
                    
                    if (data.transaction.paidMora > 0) padText("Mora Pagada:", `-${currency}${Math.round(data.transaction.paidMora).toLocaleString()}`);
                    if (data.transaction.surplus > 0) padText("Abono Prox.:", `${currency}${Math.round(data.transaction.surplus).toLocaleString()}`);
                    hr();
                    
                    if (data.transaction.remainingDebt !== undefined) {
                        padText("Bal. Restante:", `${currency}${Math.round(data.transaction.remainingDebt).toLocaleString()}`);
                        padText("Cuotas Rest:", String(data.transaction.remainingInstallments));
                    }

                    addBytes([0x1B, 0x61, 0x01]); 
                    addText("\n" + receiptFooter + "\n");
                    addBytes([0x0A, 0x0A, 0x0A]); 

                    const payload = new Uint8Array(bytes);
                    const CHUNK_SIZE = 100;
                    for (let i = 0; i < payload.length; i += CHUNK_SIZE) {
                        const chunk = payload.slice(i, i + CHUNK_SIZE);
                        await printerCharRef.current.writeValue(chunk);
                    }
                    
                    showNotify("Impresión exitosa");
                } catch (error) {
                    console.error("Print error:", error);
                    showNotify("La impresora perdió la conexión. Vuelve a vincularla.");
                    setIsPrinterReady(false);
                }
            };

                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_WIDTH = 800; 
                            if (width > MAX_WIDTH) {
                                height = Math.round((height * MAX_WIDTH) / width);
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

                let amountStr = String(inputAmount).replace(/,/g, '');

                    const paidMora = client.loan.mora || 0;
                    
                    let totalMoneyAvailable = amount + partialCredit;
                    
                    if (paidMora > 0) {
                        if (totalMoneyAvailable >= paidMora) totalMoneyAvailable -= paidMora;
                        else totalMoneyAvailable = 0;
                    }

                    let installmentsCovered = 0;
                    let surplus = 0;
                    let newPaid = client.loan.paidInstallments || 0;

                    let description = '';

                        } else {
                            installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                            surplus = totalMoneyAvailable % instBaseAmount;

                            description = installmentsCovered > 0 ? `Pago Interés (${installmentsCovered} cuotas)` : (paidMora > 0 ? 'Pago de Mora' : 'Abono parcial a interés');
                        }
                    } else {
                        if (transactionType === 'Capital') {
                            newDebt = Math.max(0, client.totalDebt - totalMoneyAvailable);
                            surplus = 0; description = 'Abono a Capital (Reducción de Deuda)';
                        } else {
                            installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                            surplus = totalMoneyAvailable % instBaseAmount;
                            newPaid = Math.min(client.loan.totalInstallments, currentPaid + installmentsCovered);
                            let totalMoneyToDiscount = installmentsCovered * instBaseAmount;
                            newDebt = Math.max(0, client.totalDebt - totalMoneyToDiscount);
                            
                            if (installmentsCovered > 0) { for(let i=0; i < installmentsCovered; i++) { nextDate = calculateNextDate(nextDate, client.loan.frequency); } }
                            description = installmentsCovered > 0 ? `Pago Cuota ${newPaid}/${client.loan.totalInstallments}` : (paidMora > 0 ? 'Pago de Mora' : 'Abono parcial');
                        }
                    }

                    let newInstallmentAmount = instBaseAmount;
                    let gainRecord = {
                        clientId: client.id, clientName: client.name,
                        date: dateOverride ? parseDateString(dateOverride).toLocaleDateString('es-DO') : formatDate(new Date()),
                        totalValue: amount,
                        gainAmount: isRedito ? (transactionType === 'Interés' ? amount : 0) : (installmentsCovered * instBaseAmount * (client.loan.interest / (100 + client.loan.interest))),
                        status: 'Activo', type: transactionType, timestamp: new Date().toISOString()
                    };

                    const transaction = {
                        id: Date.now().toString(), amount: amount, surplus: surplus,
                        date: dateOverride ? parseDateString(dateOverride).toLocaleDateString('es-DO') : new Date().toLocaleString('es-DO'),
                        type: transactionType, description: description,
                        ref: Math.floor(1000 + Math.random() * 8999).toString(),
                        installmentStatus: installmentsCovered > 0 ? 'Pagada' : 'Abono',
                        remainingInstallments: isRedito ? '∞' : client.loan.totalInstallments - newPaid,
                        paidMora: paidMora, remainingDebt: newDebt
                    };

                    const promises = [];

                    if (amount > 0) {
                        newHistory.unshift(transaction);
                        promises.push(db.collection('users').doc(adminUid).collection('gains').add(gainRecord));
                    }

                    if (newDebt <= 0.1) {
                        promises.push(db.collection('users').doc(adminUid).collection('clients').doc(clientId).update({ totalDebt: 0, loan: null, history: newHistory }));
                    } else {
                        promises.push(db.collection('users').doc(adminUid).collection('clients').doc(clientId).update({
                            totalDebt: newDebt, 'loan.paidInstallments': newPaid, 'loan.nextPaymentDate': nextDate,
                            'loan.partialCredit': surplus, 'loan.installmentAmount': newInstallmentAmount, 'loan.mora': 0, history: newHistory
                        }));
                    }

                    if (isOnline) {
                        await Promise.all(promises);
                    } else {
                        promises.forEach(p => p.catch(e => console.log("Encolado para sincronización")));
                    }

                    if (newDebt <= 0.1) showNotify("¡Préstamo Saldado!");
                    else showNotify("Transacción Registrada");

                    setIsTransacting(false);
                    if(amount > 0) setReceiptData({ client, transaction });
                } catch (error) { 
                    showNotify("Error al procesar el pago. Verifica permisos de tu DB."); 
                } finally { setIsProcessing(false); }
            };

            const handleDeleteClient = async (id) => {
                const p = db.collection('users').doc(adminUid).collection('clients').doc(id).delete();
                if(isOnline) await p.catch(e => console.log("Offline mode"));
                setDeleteConfirm(null); setView('dashboard'); showNotify("Cliente eliminado");
            };

            const handleDeletePayment = async (paymentId) => {
                try {
                    const newHistory = selectedClient.history.filter(h => h.id !== paymentId);
                    const p1 = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ history: newHistory });
                    const p2 = db.collection('users').doc(adminUid).collection('gains').where('clientId', '==', selectedClientId).where('date', '==', selectedClient.history.find(h => h.id === paymentId).date).get().then(snap => { snap.forEach(doc => doc.ref.delete()); });
                    
                    if(isOnline) await Promise.all([p1, p2]);
                    else { p1.catch(e=>e); p2.catch(e=>e); showNotify("Pago anulado (Se sincronizará luego)"); }
                    
                    setDeletePaymentConfirm(null); showNotify("Pago anulado");
                } catch (e) { showNotify("Error al anular pago"); }
            };

            const handleClearHistory = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ history: [] });
                    if(isOnline) await p;
                    setClearHistoryConfirm(false); showNotify("Historial limpio");
                } catch(e) { showNotify("Error al limpiar historial"); } finally { setIsProcessing(false); }
            };

            const handleResetGains = async () => {
                setIsProcessing(true);
                try {
                    const batch = db.batch();
                    let gainsToArchive = [];
                    let totalGainsInCut = 0;
                    let totalCollectedInCut = 0;

                    storedGains.forEach(g => {
                        if (isDateInRange(g.date, corteStartDate, corteEndDate)) {
                            gainsToArchive.push(g);
                            totalGainsInCut += (g.gainAmount || 0);
                            totalCollectedInCut += (g.totalValue || 0);
                        }
                    });

                    if (gainsToArchive.length === 0 && !window.confirm("No hay ganancias en el rango seleccionado. ¿Crear corte en cero de todos modos?")) {
                        setIsProcessing(false);
                        return;
                    }

                    clients.forEach(c => {
                        let updated = false;
                        const newHistory = (c.history || []).map(h => {
                            if (!h.archivedGain && isDateInRange(h.date, corteStartDate, corteEndDate)) { 
                                updated = true; 
                                return { ...h, archivedGain: true }; 
                            }
                            return h;
                        });
                        if (updated) {
                            const clientRef = db.collection('users').doc(adminUid).collection('clients').doc(c.id);
                            batch.update(clientRef, { history: newHistory });
                        }
                    });

                    gainsToArchive.forEach(g => { 
                        batch.delete(db.collection('users').doc(adminUid).collection('gains').doc(g.id)); 
                    });
                    
                    const riskCapitalSnapshot = overdueClients.reduce((sum, c) => sum + (c.totalDebt || 0), 0);
                    const capitalRecovered = totalCollectedInCut - totalGainsInCut;

                    const newCorteRef = db.collection('users').doc(adminUid).collection('cortes').doc();
                    batch.set(newCorteRef, {
                        timestamp: new Date().toISOString(),
                        startDate: corteStartDate || 'Inicio',
                        endDate: corteEndDate || 'Fin',
                        gains: totalGainsInCut,
                        collected: totalCollectedInCut,
                        capitalRecovered: capitalRecovered,
                        capitalSnapshot: netCapitalOnStreet,
                        pendingProfitSnapshot: pendingProfit,
                        riskCapitalSnapshot: riskCapitalSnapshot,
                        totalClients: clients.length,
                        activeLoans: displayedClients.filter(c => c.loan && c.totalDebt > 0.1).length,
                        overdueClients: overdueClients.length,
                        collectionCount: gainsToArchive.length
                    });

                    await batch.commit();
                    const p = db.collection('users').doc(adminUid).set({ historicalGains: firebase.firestore.FieldValue.increment(totalGainsInCut) }, { merge: true });
                    if(isOnline) await p;
                    
                    setResetGainsConfirm(false); 
                    setCorteStartDate('');
                    showNotify("Corte realizado y archivado exitosamente.");
                } catch (e) { showNotify("Error al hacer corte"); } finally { setIsProcessing(false); }
            };

            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(clients));
                const a = document.createElement('a'); a.href = dataStr; a.download = `connect_backup_${new Date().getTime()}.json`; a.click();
            };

            const importBackup = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const importedClients = JSON.parse(ev.target.result);
                        const batch = db.batch();
                        importedClients.forEach(client => {
                            const newDoc = db.collection('users').doc(adminUid).collection('clients').doc();
                            batch.set(newDoc, client);
                        });
                        await batch.commit(); showNotify("Backup importado con éxito");
                    } catch (err) { showNotify("Error al importar backup"); }
                };
                reader.readAsText(file);
            };

            const handleWipeSystem = async (e) => {
                e.preventDefault();
                if(!isOnline) return showNotify("Borrar el sistema requiere Internet");
                if(isProcessing) return;
                setIsProcessing(true);
                try {
                    const credential = firebase.auth.EmailAuthProvider.credential(user.email, wipePassword);
                    await auth.currentUser.reauthenticateWithCredential(credential);

                    const batch = db.batch();
                    for(let c of clients) { batch.update(db.collection('users').doc(adminUid).collection('clients').doc(c.id), { history: [] }); }
                    for(let g of storedGains) { batch.delete(db.collection('users').doc(adminUid).collection('gains').doc(g.id)); }
                    await batch.commit();
                    await db.collection('users').doc(adminUid).set({ historicalGains: 0 }, { merge: true });
                    setWipeSystemConfirm(false); 
                    setWipePassword('');
                    showNotify("¡Sistema limpiado por completo!");
                } catch (e) { 
                    showNotify("Contraseña incorrecta o error de conexión."); 
                } finally { setIsProcessing(false); }
            };

            const handleRefinance = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const addedAmount = parseFloat(refinanceForm.amount) || 0;
                    const newInterest = parseFloat(refinanceForm.interest);
                    const newInst = parseInt(refinanceForm.inst);
                    const currentClient = clients.find(c => c.id === selectedClientId);
                    
                    const currentDebt = currentClient.totalDebt;
                    const baseNewDebt = currentDebt + addedAmount;
                    const interestAmountPerCuota = baseNewDebt * (newInterest/100);
                    const totalInterest = currentClient.loan.interestType === 'Fijo' ? interestAmountPerCuota : interestAmountPerCuota * newInst;
                    const total = currentClient.loan.type === 'Rédito' ? baseNewDebt : baseNewDebt + totalInterest;
                    const newInstallmentAmount = currentClient.loan.type === 'Rédito' ? interestAmountPerCuota : total / newInst;
                    
                    const p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({
                        totalDebt: total, 'loan.amount': currentClient.loan.amount + addedAmount, 'loan.interest': newInterest,
                        'loan.totalToPay': total, 'loan.totalInstallments': newInst, 'loan.installmentAmount': newInstallmentAmount,
                        history: [{
                            id: Date.now().toString(), amount: 0, surplus: 0, date: formatDate(new Date()), type: 'Ajuste',
                            description: `Refinanciamiento: +${currency}${addedAmount} / ${newInterest}% / ${newInst} Cuotas`,
                            ref: 'REF-' + Math.floor(1000 + Math.random() * 8999), installmentStatus: 'N/A',
                            remainingInstallments: currentClient.loan.type === 'Rédito' ? '∞' : newInst - currentClient.loan.paidInstallments, paidMora: 0
                        }, ...(currentClient.history || [])]
                    });
                    if(isOnline) await p;
                    setRefinanceModal(false); showNotify("Préstamo refinanciado con éxito");
                } catch (err) { showNotify("Error al refinanciar"); } finally { setIsProcessing(false); }
            };

            const handleSaveEditLoan = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const updatedTotalDebt = parseFloat(editLoanData.totalDebt) || 0;
                    const p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({
                        totalDebt: updatedTotalDebt,
                        'loan.amount': parseFloat(editLoanData.amount) || 0,
                        'loan.interest': parseFloat(editLoanData.interest) || 0,
                        'loan.installmentAmount': parseFloat(editLoanData.installmentAmount) || 0,
                        'loan.totalInstallments': parseInt(editLoanData.totalInstallments) || 1,
                        'loan.paidInstallments': parseInt(editLoanData.paidInstallments) || 0,
                        'loan.nextPaymentDate': editLoanData.nextPaymentDate
                    });
                    if(isOnline) await p;
                    setEditLoanModal(false); showNotify("Préstamo modificado correctamente");
                } catch (err) { showNotify("Error al modificar préstamo"); } finally { setIsProcessing(false); }
            };

            const handleDeleteLoan = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const p = db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({
                        totalDebt: 0,
                        loan: null
                    });
                    if(isOnline) await p;
                    setEditLoanModal(false); showNotify("Préstamo eliminado. El cliente está libre.");
                } catch (err) { showNotify("Error al eliminar préstamo"); } finally { setIsProcessing(false); }
            };

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const todayStr = useMemo(() => formatDate(new Date()), []);
            const tomorrowStr = useMemo(() => { const d = new Date(); d.setDate(d.getDate() + 1); return formatDate(d); }, []);
            
            const dueToday = useMemo(() => displayedClients.filter(c => c.status !== 'pending_approval' && c.loan && c.loan.nextPaymentDate === todayStr && c.totalDebt > 0.1), [displayedClients, todayStr]);
            const dueTomorrow = useMemo(() => displayedClients.filter(c => c.status !== 'pending_approval' && c.loan && c.loan.nextPaymentDate === tomorrowStr && c.totalDebt > 0.1), [displayedClients, tomorrowStr]);
            
            const overdueClients = useMemo(() => displayedClients.filter(c => {
                if (c.status === 'pending_approval' || !c.loan || c.totalDebt <= 0.1 || !c.loan.nextPaymentDate) return false;
                const nextDate = parseDateString(c.loan.nextPaymentDate);
                nextDate.setHours(0, 0, 0, 0);
                return nextDate < today;
            }), [displayedClients]);

            const pendingApprovalsCount = useMemo(() => clients.filter(c => c.status === 'pending_approval' || c.pendingLoan).length, [clients]);

            const netCapitalOnStreet = useMemo(() => displayedClients.reduce((acc, curr) => {
                if(curr.status === 'pending_approval') return acc;
                if(curr.loan && curr.loan.type === 'Rédito') return acc + curr.totalDebt;
                if(curr.loan && curr.loan.type !== 'Rédito') return acc + curr.loan.amount;
                return acc;
            }, 0), [displayedClients]);
            
            const monthlyCollected = useMemo(() => storedGains.reduce((acc, curr) => acc + curr.totalValue, 0), [storedGains]);
            const monthlyGains = useMemo(() => storedGains.reduce((acc, curr) => acc + curr.gainAmount, 0), [storedGains]);

            const totalCollectedToday = useMemo(() => {
                const todayFormatted = new Date().toLocaleDateString('es-DO');
                return storedGains.filter(g => g.date && g.date.split(',')[0].trim() === todayFormatted).reduce((acc, g) => acc + (g.totalValue || 0), 0);
            }, [storedGains]);

            const allGainsBreakdown = useMemo(() => {
                const list = [...storedGains];
                displayedClients.forEach(c => {
                    const isRedito = c.loan?.type === 'Rédito';
                    const profitRatio = (c.loan && c.loan.totalToPay > 0 && !isRedito) ? (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay : 0;
                    if ((c.totalDebt || 0) > 0.1 && c.loan && c.loan.totalToPay > 0) {
                        let pendingGain = 0;
                        if (isRedito) pendingGain = (c.loan.installmentAmount || 0) - (c.loan.partialCredit || 0) + (c.loan.mora || 0);
                        else pendingGain = c.totalDebt * profitRatio;
                        
                        if (pendingGain > 0) {
                            list.push({ id: `pend-${c.id}`, clientId: c.id, clientName: c.name, date: c.loan.nextPaymentDate || 'Pendiente', totalValue: isRedito ? pendingGain : c.totalDebt, gainAmount: pendingGain, status: 'pendiente', desc: isRedito ? 'Interés/Mora por cobrar' : 'Interés por cobrar' });
                        }
                    }
                });
                return list;
            }, [displayedClients, storedGains]);

            const filteredGains = useMemo(() => {
                const search = normalizeStr(earningsSearch);
                return allGainsBreakdown.filter(g => {
                    const matchStatus = earningsFilter === 'todas' || g.status === earningsFilter;
                    const matchSearch = normalizeStr(g.clientName).includes(search);
                    
                    let matchDate = true;
                    if (g.date !== 'Pendiente') {
                        const gDateObj = parseDateString(g.date);
                        if (earningsStartDate) {
                            const startObj = new Date(earningsStartDate + 'T00:00:00');
                            if (gDateObj < startObj) matchDate = false;
                        }
                        if (earningsEndDate) {
                            const endObj = new Date(earningsEndDate + 'T23:59:59');
                            if (gDateObj > endObj) matchDate = false;
                        }
                    } else if (earningsStartDate || earningsEndDate) {
                        matchDate = false; 
                    }
                    
                    return matchStatus && matchSearch && matchDate;
                });
            }, [allGainsBreakdown, earningsFilter, earningsSearch, earningsStartDate, earningsEndDate]);

            const portfolioFilteredClients = useMemo(() => {
                const s = normalizeStr(portfolioSearch);
                let filtered = displayedClients.filter(c => {
                    const matchSearch = normalizeStr(c.name).includes(s) || normalizeStr(c.cedula).includes(s) || normalizeStr(c.phone).includes(s) || normalizeStr(c.address).includes(s);
                    let matchFilter = true;
                    if (portfolioFilter === 'active') matchFilter = c.loan && c.totalDebt > 0 && c.status !== 'pending_approval';
                    if (portfolioFilter === 'inactive') matchFilter = (!c.loan || c.totalDebt <= 0) && c.status !== 'pending_approval';
                    if (portfolioFilter === 'overdue') {
                        if (c.status === 'pending_approval' || !c.loan || c.totalDebt <= 0.1 || !c.loan.nextPaymentDate) matchFilter = false;
                        else {
                            const nextDate = parseDateString(c.loan.nextPaymentDate);
                            nextDate.setHours(0, 0, 0, 0);
                            matchFilter = nextDate < today;
                        }
                    }
                    if (portfolioFilter === 'approvals') matchFilter = c.status === 'pending_approval' || !!c.pendingLoan;
                    
                    let matchRoute = true;
                    if (portfolioRouteFilter !== 'Todas') matchRoute = c.route === portfolioRouteFilter;
                    
                    return matchSearch && matchFilter && matchRoute;
                });

                return filtered.sort((a, b) => {
                    if (portfolioSort === 'debt_desc') return (b.totalDebt || 0) - (a.totalDebt || 0);
                    if (portfolioSort === 'debt_asc') return (a.totalDebt || 0) - (b.totalDebt || 0);
                    return a.name.localeCompare(b.name);
                });
            }, [displayedClients, portfolioSearch, portfolioFilter, portfolioSort, portfolioRouteFilter]);

            const pendingProfit = useMemo(() => displayedClients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const isRedito = curr.loan.type === 'Rédito';
                    if (isRedito) return acc + ((curr.loan.installmentAmount || 0) - (curr.loan.partialCredit || 0) + (curr.loan.mora || 0));
                    else {
                        const profitRatio = (curr.loan.totalToPay - curr.loan.amount) / curr.loan.totalToPay;
                        return acc + ((curr.totalDebt || 0) * profitRatio);
                    }
                }
                return acc;
            }, 0), [displayedClients]);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center splash-fade-out">
                        <LogoSVG className="w-56 h-56 sm:w-64 sm:h-64 text-indigo-500 logo-bounce mb-6 drop-shadow-[0_0_35px_rgba(79,70,229,0.4)]" />
                        <h1 className="text-white text-5xl font-black heading-font tracking-tight">{companyName.split(' ')[0] || 'Connect'}</h1>
                        <p className="text-indigo-400 text-xs font-black uppercase tracking-[0.4em] mt-3">{companyName.split(' ').slice(1).join(' ') || 'Préstamos'}</p>
                    </div>
                );
            }

            const selectedClient = clients.find(c => c.id === selectedClientId);
            const isRestrictedRole = userProfile?.role === 'empleado' || userProfile?.role === 'cobrador';

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    {!isOnline && (
                        <div className="bg-orange-500 text-white text-[10px] font-black uppercase tracking-widest text-center py-2.5 flex items-center justify-center gap-2 z-[105] sticky top-0 shadow-md border-b border-orange-600 no-print">
                            <Icon name="alert-triangle" size={14} /> Modo Offline (Sincronización Pendiente)
                        </div>
                    )}
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[110] bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-2xl animate-in no-print">{notification}</div>}

                    {/* MODAL CAMBIAR CONTRASEÑA */}
                    {passwordModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[400] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="lock" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">Cambiar Contraseña</h3>
                                <p className="text-xs text-slate-400 font-bold mb-6">Ingresa tu nueva contraseña (mínimo 6 caracteres).</p>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    if(!isOnline) return showNotify("Esta acción requiere Internet");
                                    if(isProcessing) return;
                                    setIsProcessing(true);
                                    try {
                                        await auth.currentUser.updatePassword(newPassword);
                                        setPasswordModal(false); setNewPassword(''); showNotify("Contraseña actualizada con éxito");
                                    } catch (error) {
                                        if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar.");
                                        else showNotify("Error: " + error.message);
                                    } finally { setIsProcessing(false); }
                                }}>
                                    <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-center focus:border-indigo-500 outline-none mb-4 text-slate-700" placeholder="Nueva contraseña" required minLength="6" />
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => { setPasswordModal(false); setNewPassword(''); }} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm text-slate-600 active:scale-95 transition-transform">Cancelar</button>
                                        <button type="submit" disabled={isProcessing} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black text-sm disabled:opacity-50 active:scale-95 transition-transform">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODALES DE ACCIÓN (ELIMINAR, ANULAR, LIMPIAR, MORA, WIPE, REFINANCIAR, EDITAR PRESTAMO) */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="trash-2" size={32}/></div>
                                <h3 className="heading-font text-2xl font-black text-slate-800 mb-2">¿Eliminar Cliente?</h3>
                                <p className="text-sm text-slate-500 mb-8 font-medium">Esta acción no se puede deshacer y borrará todo su historial.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-600 active:scale-95 transition-transform">Cancelar</button>
                                    <button onClick={() => handleDeleteClient(deleteConfirm)} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black shadow-lg shadow-red-500/30 active:scale-95 transition-transform">Sí, Eliminar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {deletePaymentConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="alert-triangle" size={32}/></div>
                                <h3 className="heading-font text-2xl font-black text-slate-800 mb-2">¿Anular Pago?</h3>
                                <p className="text-sm text-slate-500 mb-8 font-medium">Se restará este pago del historial y de las ganancias de caja.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeletePaymentConfirm(null)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-600 active:scale-95 transition-transform">Cancelar</button>
                                    <button onClick={() => handleDeletePayment(deletePaymentConfirm.id)} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black shadow-lg shadow-red-500/30 active:scale-95 transition-transform">Sí, Anular</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {clearHistoryConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="file-text" size={32}/></div>
                                <h3 className="heading-font text-2xl font-black text-slate-800 mb-2">¿Limpiar Historial?</h3>
                                <p className="text-sm text-slate-500 mb-8 font-medium">Esto borrará solo la lista de recibos de este cliente.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setClearHistoryConfirm(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-600 active:scale-95 transition-transform">Cancelar</button>
                                    <button onClick={handleClearHistory} className="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black shadow-lg shadow-amber-500/30 active:scale-95 transition-transform">Limpiar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {moraConfirm && selectedClient && (
