                                    if (c.loan && c.totalDebt > 0.1) {
                                        statusText = 'AL DÍA';
                                        statusColor = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                                        
                                        if (c.loan.nextPaymentDate) {
                                            const nextDate = parseDateString(c.loan.nextPaymentDate);
                                            nextDate.setHours(0,0,0,0);
                                            if (nextDate < today) {
                                                statusText = 'EN MORA';
                                                statusColor = 'bg-red-50 text-red-600 border-red-100';
                                            }
                                        }
                                    }

                                    return (
                                    <div key={c.id} onClick={() => { setSelectedClientId(c.id); setView('profile'); }} className="p-5 bg-white border border-slate-200 rounded-[2rem] shadow-sm flex flex-col gap-3 cursor-pointer active:scale-[0.98] transition-all hover:border-indigo-300">
                                        <div className="flex justify-between items-start">
                                            <div className="flex gap-3 items-center">
                                                <div className="w-12 h-12 rounded-[1.2rem] flex items-center justify-center font-black text-lg bg-indigo-50 text-indigo-600 border border-indigo-100">
                                                    {c.name[0]}
                                                </div>
                                                <div>
                                                    <h4 className="font-black text-slate-800 text-sm">{c.name}</h4>
                                                    <p className="text-[10px] font-bold text-slate-400 mt-0.5">{c.phone} {c.cedula ? `• ${c.cedula}` : ''}</p>
                                                </div>
                                            </div>
                                            <span className={`text-[8px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg border ${statusColor}`}>
                                                {statusText}
                                            </span>
                                        </div>
                                        
                                        <div className="bg-slate-50 rounded-2xl p-4 flex justify-between items-center border border-slate-100">
                                            <div>
                                                <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Balance Pendiente</p>
                                                <p className={`font-black text-lg ${c.totalDebt > 0.1 ? 'text-slate-800' : 'text-emerald-500'}`}>
                                                    RD${(c.totalDebt || 0).toLocaleString()}
                                                </p>
                                            </div>
                                            {c.loan && c.totalDebt > 0.1 && (
                                                <div className="text-right">
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Próx. Cobro</p>
                                                    <p className={`font-black text-sm ${statusText === 'EN MORA' ? 'text-red-500' : 'text-indigo-600'}`}>
                                                        {c.loan.nextPaymentDate}
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )})}
                                {portfolioFilteredClients.length === 0 && (
                                    <div className="text-center py-10">
                                        <div className="w-16 h-16 bg-slate-100 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="users" size={24}/></div>
                                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sin resultados en esta categoría</p>
                                    </div>
                                )}
                            </main>
                            <button onClick={() => setView('add_client')} className="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl flex items-center justify-center z-20 hover:scale-105 active:scale-95 transition-all border-4 border-white"><Icon name="user-plus" size={28} /></button>
                        </div>
                    )}

                    {view === 'profile' && selectedClient && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex justify-between items-center sticky top-0 bg-white z-10 shadow-sm">
                                <button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <div className="flex gap-2">
                                    {userProfile?.role !== 'empleado' && (
                                        <button onClick={() => setDeleteConfirm(selectedClientId)} className="p-3 text-red-400 bg-red-50 rounded-2xl"><Icon name="trash-2" size={18}/></button>
                                    )}
                                    <button onClick={() => setView('edit_client')} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl"><Icon name="settings" size={18}/></button>
                                </div>
                            </header>
                            <main className="p-6 space-y-6">
                                <div className="bg-white rounded-[2.8rem] p-8 border border-slate-100 shadow-sm flex flex-col items-center text-center">
                                    <div className="relative w-24 h-24 mb-4">
                                        {selectedClient.idImage ? (
                                            <img src={selectedClient.idImage} className="w-full h-full object-cover rounded-[2.2rem] shadow-xl" alt="Documento" />
                                        ) : (
                                            <div className="w-full h-full bg-indigo-600 rounded-[2.2rem] flex items-center justify-center text-white text-4xl font-black shadow-xl">{selectedClient.name[0]}</div>
                                        )}
                                        <label className="absolute -bottom-2 -right-2 w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center shadow-lg cursor-pointer hover:scale-105 active:scale-95 transition-transform">
                                            <Icon name="camera" size={18} />
                                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                        </label>
                                        {selectedClient.idImage && (
                                            <button onClick={() => {
                                                const a = document.createElement('a');
                                                a.href = selectedClient.idImage;
                                                a.download = `Documento_${selectedClient.name}.jpg`;
                                                a.click();
                                            }} className="absolute -top-2 -right-2 w-8 h-8 bg-slate-800 text-white rounded-xl flex items-center justify-center shadow-lg cursor-pointer hover:scale-105 active:scale-95 transition-transform">
                                                <Icon name="download" size={14} />
                                            </button>
                                        )}
                                    </div>
                                    <h3 className="heading-font text-2xl font-black text-slate-800 leading-tight">{selectedClient.name}</h3>
                                    <p className="text-xs font-bold text-slate-400 uppercase mt-2">ID: {selectedClient.cedula || 'N/A'}</p>
                                    <div className="grid grid-cols-3 gap-2 w-full mt-8">
                                        <div className="bg-slate-50 p-3 rounded-[1.5rem] border border-slate-100 text-center"><p className="text-[8px] sm:text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Saldo Restante</p><p className={`text-sm sm:text-base font-black ${selectedClient.totalDebt > 0.05 ? 'text-red-500' : 'text-emerald-500'}`}>RD${selectedClient.totalDebt.toLocaleString()}</p></div>
                                        <div className="bg-slate-50 p-3 rounded-[1.5rem] border border-slate-100 text-center"><p className="text-[8px] sm:text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Cuotas</p><p className="text-sm sm:text-base font-black text-indigo-600">{selectedClient.loan ? `${selectedClient.loan.paidInstallments}/${selectedClient.loan.totalInstallments}` : '0/0'}</p></div>
                                        <div className="bg-slate-50 p-3 rounded-[1.5rem] border border-slate-100 text-center"><p className="text-[8px] sm:text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Préstamos Totales</p><p className="text-sm sm:text-base font-black text-slate-600">{selectedClient.totalLoansTaken || 0}</p></div>
                                    </div>
                                    {selectedClient.loan && (
                                        <div className="w-full mt-6 p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 flex flex-col gap-2 text-left">
                                            <div className="flex justify-between items-center">
                                                <div><p className="text-[9px] font-black text-indigo-400 uppercase">Próximo Cobro</p><p className="text-sm font-black text-indigo-700">{selectedClient.loan.nextPaymentDate || '...'}</p></div>
                                                <div className="text-right"><p className="text-[9px] font-black text-indigo-400 uppercase">Cuota Base</p><p className="text-sm font-black text-indigo-700">RD${Math.round(selectedClient.loan.installmentAmount - (selectedClient.loan.partialCredit || 0)).toLocaleString()}</p></div>
                                            </div>
                                            {selectedClient.loan.mora > 0 && (
                                                <div className="flex justify-between items-center pt-2 border-t border-indigo-100/50">
                                                    <div><p className="text-[9px] font-black text-red-500 uppercase">Mora Acumulada</p></div>
                                                    <div className="text-right"><p className="text-sm font-black text-red-500">RD${Math.round(selectedClient.loan.mora).toLocaleString()}</p></div>
                                                </div>
                                            )}
                                            <div className="flex justify-between items-center pt-2 border-t border-indigo-200">
                                                <div><p className="text-[10px] font-black text-slate-600 uppercase">Total a Pagar</p></div>
                                                <div className="text-right"><p className="text-lg font-black text-slate-800">RD${Math.round((selectedClient.loan.installmentAmount - (selectedClient.loan.partialCredit || 0)) + (selectedClient.loan.mora || 0)).toLocaleString()}</p></div>
                                            </div>
                                        </div>
                                    )}
                                    <div className="w-full mt-8 flex flex-col gap-3">
                                        {(selectedClient.totalDebt > 0.1) ? (
                                            <>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setReminderClient(selectedClient)} className="p-4 bg-emerald-50 text-emerald-600 rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-transform flex-1 font-black text-xs uppercase"><Icon name="send" size={16} className="mr-2"/> Recordar</button>
                                                    <button onClick={() => { 
                                                        const defaultMora = selectedClient.loan.installmentAmount * (selectedClient.loan.interest / 100);
                                                        setCustomMoraAmount(Math.round(defaultMora));
                                                        setMoraConfirm(true); 
                                                    }} className="p-4 bg-red-50 text-red-500 rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-transform flex-1 font-black text-xs uppercase"><Icon name="alert-triangle" size={16} className="mr-2"/> Mora</button>
                                                </div>
                                                <button onClick={() => { setTransactionType('Interés'); setIsTransacting(true); }} className="py-5 px-8 bg-indigo-600 text-white rounded-[1.8rem] font-black text-sm uppercase tracking-widest w-full active:scale-95 transition-transform mt-2">Cobrar Cuota</button>
                                            </>
                                        ) : (
                                            <button onClick={() => setView('assign_loan')} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black flex items-center justify-center gap-3 active:scale-95 transition-transform"><Icon name="trending-up" size={20} /> Asignar Nuevo Préstamo</button>
                                        )}
                                    </div>
                                </div>
                                <div className="space-y-4 pb-20">
                                    <div className="flex justify-between items-center px-4">
                                        <h4 className="heading-font font-black text-[11px] uppercase text-slate-400 tracking-widest">Historial de Pagos</h4>
                                        {selectedClient.history?.length > 0 && userProfile?.role !== 'empleado' && (
                                            <button onClick={() => setClearHistoryConfirm(true)} className="text-[10px] bg-amber-50 text-amber-600 font-black px-3 py-1.5 rounded-lg hover:bg-amber-100 active:scale-95 transition-colors">Limpiar Historial</button>
                                        )}
                                    </div>
                                    <div className="space-y-3 px-2">
                                        {selectedClient.history?.map(h => (
                                            <div key={h.id} className="p-5 bg-white border border-slate-100 rounded-[1.8rem] flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-4"><div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center border border-emerald-100"><Icon name="check-circle-2" size={22}/></div><div><p className="font-bold text-slate-800 text-sm leading-none">{h.description}</p><p className="text-[10px] text-slate-400 mt-1 uppercase font-black">{h.date}</p></div></div>
                                                <div className="flex items-center gap-2">
                                                    <p className="font-black text-emerald-500 text-lg mr-2">RD${h.amount.toLocaleString()}</p>
                                                    <button onClick={() => setReceiptData({client: selectedClient, transaction: h})} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-indigo-600 hover:bg-indigo-50 transition-colors"><Icon name="share-2" size={16}/></button>
                                                    {userProfile?.role !== 'empleado' && (
                                                        <button onClick={() => setDeletePaymentConfirm(h)} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-red-500 hover:bg-red-50 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {view === 'edit_client' && selectedClient && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800">Editar Cliente</h2></header>
                            <form onSubmit={updateClient} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre</label><input name="name" type="text" defaultValue={selectedClient.name} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cédula / ID</label><input name="cedula" type="text" defaultValue={selectedClient.cedula} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">WhatsApp / Teléfono</label><input name="phone" type="tel" defaultValue={selectedClient.phone} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo Electrónico</label><input name="email" type="email" defaultValue={selectedClient.email} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Dirección</label><textarea name="address" rows="3" defaultValue={selectedClient.address} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold resize-none focus:border-indigo-500 outline-none" /></div>
                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 active:scale-95 transition-all">Guardar Cambios</button>
                            </form>
                        </div>
                    )}

                    {isTransacting && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[150] flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                <div className="flex justify-between items-center mb-6"><h3 className="heading-font text-xl font-black text-slate-800">Registrar Pago</h3><button onClick={() => setIsTransacting(false)} className="text-slate-400 p-2"><Icon name="x" /></button></div>
                                <div className="space-y-6">
                                    
                                    {(selectedClient.loan?.type === 'Rédito' || selectedClient.loan?.type === 'Amortizado') && (
                                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-4">
                                            <button onClick={() => setTransactionType('Interés')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Interés' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Pago Normal</button>
                                            <button onClick={() => setTransactionType('Capital')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${transactionType === 'Capital' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>Abono Extra a Capital</button>
                                        </div>
                                    )}

                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col gap-3">
                                        <div className="flex justify-between items-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Deuda Actual' : 'Cuota Base'}</p>
                                            <p className="text-lg font-black text-slate-700">RD${Math.round(transactionType === 'Capital' ? selectedClient.totalDebt : selectedClient.loan?.installmentAmount).toLocaleString()}</p>
                                        </div>
                                        {(selectedClient.loan?.partialCredit > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Abono previo</p>
                                                <p className="text-lg font-black text-indigo-600">-RD${Math.round(selectedClient.loan?.partialCredit || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        {(selectedClient.loan?.mora > 0) && (
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Mora Acumulada</p>
                                                <p className="text-lg font-black text-red-500">+RD${Math.round(selectedClient.loan?.mora || 0).toLocaleString()}</p>
                                            </div>
                                        )}
                                        <div className="flex justify-between items-center pt-2 border-t border-slate-200">
                                            <p className="text-[11px] font-black text-slate-800 uppercase tracking-widest mb-1">{transactionType === 'Capital' ? 'Total Restante' : 'Total Sugerido'}</p>
                                            <p className="text-xl font-black text-emerald-600">RD${Math.round((transactionType === 'Capital' ? selectedClient.totalDebt : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0)).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha Pago</label>
                                            <input id="inputDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center focus:border-indigo-500 outline-none text-slate-700 text-xs" />
                                        </div>
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recibido</label>
                                            <input id="inputAmount" type="number" defaultValue={Math.round((transactionType === 'Capital' ? 0 : (selectedClient.loan?.installmentAmount - (selectedClient.loan?.partialCredit || 0))) + (selectedClient.loan?.mora || 0))} className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-center text-xl focus:border-indigo-500 outline-none text-indigo-600" />
                                        </div>
                                    </div>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-tighter text-center">{transactionType === 'Capital' ? 'Este abono reduce la deuda total y acorta el tiempo' : 'El excedente se abonará a la próxima cuota'}</p>
                                    
                                    <button disabled={isProcessing} onClick={() => recordTransaction(selectedClientId, document.getElementById('inputAmount').value, document.getElementById('inputDate').value)} className="w-full bg-emerald-500 text-white p-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all disabled:opacity-50">
                                        {isProcessing ? 'Procesando...' : 'Confirmar en Nube'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TARJETA DE RECORDATORIO DE PAGO EN FOTO */}
                    {reminderClient && reminderClient.loan && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden animate-in">
                                <div ref={reminderRef} className="p-8 bg-white text-slate-800 relative">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-48 h-48 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Connect Préstamos</h4>
                                        <p className="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] mb-2">Recordatorio de Pago</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="font-black text-slate-800 text-lg">{reminderClient.name}</p>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mt-1">ID: {reminderClient.cedula || 'N/A'} • {reminderClient.phone}</p>
                                        {reminderClient.email && <p className="text-[10px] font-bold text-slate-400 mt-1">{reminderClient.email}</p>}
                                    </div>
                                    <div className="space-y-4 border-b border-slate-100 pb-6 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuotas Pagadas</span><span className="font-black text-emerald-600">{reminderClient.loan.paidInstallments}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuotas Faltantes</span><span className="font-black text-amber-500">{reminderClient.loan.totalInstallments - reminderClient.loan.paidInstallments}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Total Abonado</span><span className="font-black text-slate-800">${((reminderClient.loan.paidInstallments * reminderClient.loan.installmentAmount) + (reminderClient.loan.partialCredit || 0)).toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm pt-2 border-t border-dashed border-slate-200"><span className="text-slate-400 font-bold">Monto Restante</span><span className="font-black text-red-500">${reminderClient.totalDebt.toLocaleString()}</span></div>
                                    </div>
                                    <div className="bg-indigo-50 p-4 rounded-[1.5rem] border border-indigo-100 flex justify-between items-center text-left">
                                        <div><p className="text-[9px] font-black text-indigo-400 uppercase">Próximo Cobro</p><p className="text-sm font-black text-indigo-700">{reminderClient.loan.nextPaymentDate}</p></div>
                                        <div className="text-right"><p className="text-[9px] font-black text-indigo-400 uppercase">Monto a Pagar</p><p className="text-lg font-black text-emerald-600">${(reminderClient.loan.installmentAmount - (reminderClient.loan.partialCredit || 0)).toLocaleString()}</p></div>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2">
                                    <button onClick={() => handleShare(reminderRef, `Recordatorio_${reminderClient.name.replace(/\s+/g, '_')}`, 'Recordatorio de Pago')} disabled={isGeneratingImage} className="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-emerald-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="send" size={18}/> Enviar Foto</>}
                                    </button>
                                    <button onClick={() => setReminderClient(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TARJETA DE RECIBO */}
                    {receiptData && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden animate-in">
                                <div ref={receiptRef} className="p-8 bg-white text-slate-800 relative">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-48 h-48 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Connect Préstamos</h4>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Comprobante de Pago</p>
                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">{receiptData.transaction.ref}</p>
                                    </div>
                                    <div className="space-y-4 border-y border-slate-100 py-6 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cliente</span><span className="font-black text-slate-800">{receiptData.client.name}</span></div>
                                        
                                        {receiptData.client.loan?.type === 'Rédito' ? (
                                            <>
                                                <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Modalidad</span><span className="font-black text-slate-600">A Rédito</span></div>
                                                <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Concepto</span><span className="font-black text-indigo-600">{receiptData.transaction.description}</span></div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuota Pagada</span><span className="font-black text-indigo-600">{receiptData.transaction.installmentStatus}</span></div>
                                                <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Restantes</span><span className="font-black text-slate-600">{receiptData.transaction.remainingInstallments}</span></div>
                                            </>
                                        )}

                                        <div className="pt-2 flex justify-between text-sm"><span className="text-slate-400 font-bold">Monto Recibido</span><span className="font-black text-emerald-500 text-lg">${receiptData.transaction.amount.toLocaleString()}</span></div>
                                        
                                        {receiptData.surplus > 0 && <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex justify-between items-center"><span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Abono Próx. Cuota</span><span className="font-black text-indigo-600 text-sm">${receiptData.surplus.toLocaleString()}</span></div>}
                                        
                                        <div className="flex justify-between text-sm pt-2 border-t border-dashed border-slate-200"><span className="text-slate-400 font-bold">{receiptData.client.loan?.type === 'Rédito' ? 'Capital Pendiente' : 'Saldo Pendiente'}</span><span className="font-black text-red-500">${receiptData.client.totalDebt.toLocaleString()}</span></div>
                                    </div>
                                    <div className="text-center text-[9px] text-slate-400 font-bold uppercase tracking-widest">{receiptData.transaction.date}</div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2">
                                    <button onClick={() => handleShare(receiptRef, `Recibo_${receiptData.transaction.ref}`, 'Recibo de Pago')} disabled={isGeneratingImage} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Compartir Ticket</>}
                                    </button>
                                    <button onClick={() => setReceiptData(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'add_client' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm"><button onClick={() => setView('dashboard')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800">Nuevo Cliente</h2></header>
                            <form onSubmit={(e) => { e.preventDefault(); const data = { name: e.target.name.value, cedula: e.target.cedula.value, phone: e.target.phone.value, email: e.target.email.value, address: e.target.address.value, totalDebt: 0, history: [], loan: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() }; db.collection('users').doc(user.uid).collection('clients').add(data); setView('dashboard'); showNotify("Registrado correctamente"); }} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre Completo</label><input name="name" type="text" placeholder="Ej: Juan Pérez" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cédula / ID</label><input name="cedula" type="text" placeholder="ID del cliente" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">WhatsApp / Teléfono</label><input name="phone" type="tel" placeholder="8090000000" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo Electrónico</label><input name="email" type="email" placeholder="cliente@correo.com" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Dirección de Cobro</label><textarea name="address" rows="3" placeholder="Ubicación..." className="w-full p-4 bg-slate-50 border rounded-2xl font-bold resize-none outline-none focus:border-indigo-500" /></div>
                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Registrar en Nube</button>
                            </form>
                        </div>
                    )}

                    {view === 'assign_loan' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 sticky top-0 bg-white shadow-sm z-10"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800 tracking-tighter">Nuevo Préstamo</h2></header>
                            <form onSubmit={assignLoan} className="p-8 space-y-6">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto a Prestar</label><input name="amount" type="number" step="any" value={loanForm.amount} onChange={handleLoanFormChange} className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Modalidad</label><select name="loanType" value={loanForm.loanType} onChange={handleLoanFormChange} className="w-full p-4 bg-purple-50 text-purple-700 border border-purple-100 rounded-2xl font-bold appearance-none cursor-pointer focus:border-purple-500 outline-none"><option value="Amortizado">Amortizado Normal</option><option value="Rédito">A Rédito (Solo Interés)</option></select></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cálculo de Interés</label><select name="interestType" value={loanForm.interestType} onChange={handleLoanFormChange} className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option value="Por Cuota">Por Cuota (Se suma en cada pago)</option><option value="Fijo">Fijo (1 sola vez al monto)</option></select></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Interés %</label><input name="interest" type="number" value={loanForm.interest} onChange={handleLoanFormChange} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required /></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">No. Cuotas</label><input name="inst" type="number" value={loanForm.inst} onChange={handleLoanFormChange} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required /></div>
                                </div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select name="freq" value={loanForm.freq} onChange={handleLoanFormChange} className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option>Semanal</option><option>Diario</option><option>Quincenal</option><option>Mensual</option></select></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Fecha de Inicio de Pago</label><input name="startDate" type="date" value={loanForm.startDate} onChange={handleLoanFormChange} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none text-slate-600" required/></div>
                                
                                {parseFloat(loanForm.amount) > 0 && (() => {
                                    const amt = parseFloat(loanForm.amount);
                                    const intr = parseFloat(loanForm.interest) / 100;
                                    const cuotas = parseInt(loanForm.inst) || 1;
                                    const interestPerCuota = amt * intr;
                                    const totalInterest = loanForm.interestType === 'Fijo' ? interestPerCuota : interestPerCuota * cuotas;
                                    const totalToPay = loanForm.loanType === 'Rédito' ? amt : amt + totalInterest;
                                    const cuota = loanForm.loanType === 'Rédito' ? interestPerCuota : totalToPay / cuotas;

                                    return (
                                        <div className="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100 flex flex-col gap-3 mt-6 animate-in">
                                            <h4 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest text-center mb-2">Vista Previa de Cuotas</h4>
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm font-bold text-slate-600">Total a Pagar:</span>
                                                <span className="text-lg font-black text-red-500">RD${Math.round(totalToPay).toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between items-center pt-3 border-t border-indigo-200/60">
                                                <span className="text-sm font-bold text-slate-600">Cuota ({loanForm.freq}):</span>
                                                <span className="text-xl font-black text-emerald-600">RD${Math.round(cuota).toLocaleString()}</span>
                                            </div>
                                            {loanForm.loanType === 'Rédito' && <p className="text-[9px] text-indigo-400 font-bold uppercase tracking-widest text-center mt-2">Modalidad a rédito: El capital se mantiene intacto.</p>}
                                        </div>
                                    );
                                })()}

                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-6 uppercase tracking-widest text-sm active:scale-95 transition-all">Activar Préstamo Cloud</button>
                            </form>
                        </div>
                    )}

                    {/* VISTA DE LA CALCULADORA */}
                    {view === 'calculator' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setView('settings')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Calculadora</h2>
                            </header>
                            <form onSubmit={handleCalculate} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Cliente (Opcional)</label><input name="clientName" type="text" placeholder="Para personalizar la cotización" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto a Cotizar</label><input name="amount" type="number" step="any" className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Interés %</label><input name="interest" type="number" defaultValue="20" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required/></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">No. Cuotas</label><input name="inst" type="number" defaultValue="10" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required/></div>
                                </div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select name="freq" className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option>Semanal</option><option>Diario</option><option>Quincenal</option><option>Mensual</option></select></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cálculo de Interés</label><select name="interestType" className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option value="Por Cuota">Por Cuota (Se suma en cada pago)</option><option value="Fijo">Fijo (1 sola vez al monto)</option></select></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Fecha de Inicio</label><input name="startDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none text-slate-600" required/></div>
                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Generar Cotización</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL DE RESULTADOS DE LA CALCULADORA (PARA COMPARTIR) */}
                    {calcResults && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto no-scrollbar">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in my-auto h-fit">
                                <div ref={calcRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-28 h-28 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Connect Préstamos</h4>
                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-2">Cotización de Préstamo</p>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cotizado para:</p>
                                        <p className="font-black text-slate-800 text-sm">{calcResults.clientName}</p>
                                    </div>
                                    
                                    <div className="space-y-4 border-b border-slate-100 pb-6 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Monto Solicitado</span><span className="font-black text-slate-800">${calcResults.amount.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Interés</span><span className="font-black text-slate-800">{calcResults.interest}% ({calcResults.interestType})</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Plan de Pago</span><span className="font-black text-slate-800">{calcResults.inst} Cuotas ({calcResults.freq})</span></div>
                                        <div className="flex justify-between text-sm pt-2 border-t border-dashed border-slate-200"><span className="text-slate-400 font-black uppercase tracking-widest text-[11px]">Total a Pagar</span><span className="font-black text-red-500 text-lg">${calcResults.total.toLocaleString()}</span></div>
                                    </div>
                                    
                                    <h4 className="heading-font font-black text-[11px] uppercase text-slate-400 tracking-widest mb-4">Desglose de Cuotas</h4>
                                    <div className="space-y-2">
                                        {calcResults.schedule.map(s => (
                                            <div key={s.number} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-7 h-7 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-[11px] font-black">{s.number}</div>
                                                    <span className="text-[11px] font-bold text-slate-600 uppercase tracking-widest">{s.date}</span>
                                                </div>
                                                <span className="font-black text-sm text-emerald-600">${Math.round(s.amount).toLocaleString()}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(calcRef, `Cotizacion_${calcResults.clientName.replace(/\s+/g, '_')}`, 'Cotización')} disabled={isGeneratingImage} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Compartir Cotización</>}
                                    </button>
                                    <button onClick={() => setCalcResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE LA CALCULADORA COMPACTA */}
                    {view === 'calculator_compact' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setView('settings')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Calculadora Resumen</h2>
                            </header>
                            <form onSubmit={handleCompactCalculate} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Cliente</label><input name="clientName" type="text" placeholder="Para personalizar el resumen" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto Solicitado</label><input name="amount" type="number" step="any" className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-indigo-500 text-indigo-600" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Interés Total %</label><input name="interest" type="number" defaultValue="20" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required/></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">No. Cuotas</label><input name="inst" type="number" defaultValue="10" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-indigo-500 outline-none" required/></div>
                                </div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Frecuencia</label><select name="freq" className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option>Semanal</option><option>Diario</option><option>Quincenal</option><option>Mensual</option></select></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cálculo de Interés</label><select name="interestType" className="w-full p-4 bg-slate-100 border rounded-2xl font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none"><option value="Por Cuota">Por Cuota (Se suma en cada pago)</option><option value="Fijo">Fijo (1 sola vez al monto)</option></select></div>
                                <button className="w-full bg-indigo-600 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Generar Resumen Visual</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL CALCULADORA COMPACTA (DISEÑO CUADRADO, NO ALARGADO) */}
                    {compactCalcResults && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={compactCalcRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-24 h-24 mx-auto mb-2" color="#4f46e5" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Connect Préstamos</h4>
                                        <p className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-2">Resumen de Préstamo</p>
                                    </div>
                                    
                                    {compactCalcResults.clientName !== "Cliente" && (
                                        <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cotizado para:</p>
                                            <p className="font-black text-slate-800 text-sm">{compactCalcResults.clientName}</p>
                                        </div>
                                    )}

                                    <div className="bg-indigo-600 p-6 rounded-[2rem] text-center mb-6 shadow-lg shadow-indigo-200">
                                        <p className="text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-1">Cuota Fija ({compactCalcResults.freq})</p>
                                        <h2 className="text-4xl font-black text-white tracking-tighter">${Math.round(compactCalcResults.installmentAmount).toLocaleString()}</h2>
                                        <p className="text-[10px] font-bold text-indigo-200 mt-2 bg-indigo-500/50 inline-block px-3 py-1 rounded-full">Durante {compactCalcResults.inst} cuotas</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 text-center">
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><span className="block text-[9px] text-slate-400 font-bold uppercase">Monto Solicitado</span><span className="font-black text-slate-800">${compactCalcResults.amount.toLocaleString()}</span></div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><span className="block text-[9px] text-slate-400 font-bold uppercase">Tasa de Interés</span><span className="font-black text-slate-800">{compactCalcResults.interest}%</span></div>
                                    </div>
                                    <div className="mt-3 bg-red-50 p-4 rounded-xl border border-red-100 text-center flex justify-between items-center px-4">
                                        <span className="text-[10px] text-red-400 font-black uppercase tracking-widest">Total a Pagar</span>
                                        <span className="font-black text-red-500 text-lg">${compactCalcResults.total.toLocaleString()}</span>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(compactCalcRef, `Resumen_${compactCalcResults.clientName.replace(/\s+/g, '_')}`, 'Resumen')} disabled={isGeneratingImage} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Enviar Resumen</>}
                                    </button>
                                    <button onClick={() => setCompactCalcResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE CAPACIDAD DE PAGO */}
                    {view === 'calc_capacity' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setView('settings')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Capacidad de Pago</h2>
                            </header>
                            <form onSubmit={handleCapacity} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Cliente</label><input name="clientName" type="text" placeholder="Para el reporte" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-emerald-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Ingresos Mensuales</label><input name="income" type="number" step="any" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-emerald-500" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Gastos Mensuales (Otros préstamos, alquiler, etc)</label><input name="expenses" type="number" step="any" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-emerald-500" required /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Cuota a Evaluar</label><input name="installment" type="number" step="any" className="w-full p-5 bg-emerald-50 border border-emerald-200 rounded-2xl font-black text-center text-2xl outline-none focus:border-emerald-500 text-emerald-600" required /></div>
                                
                                <button className="w-full bg-emerald-500 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Evaluar Cliente</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL CAPACIDAD DE PAGO */}
                    {capacityResults && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={capacityRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-20 h-20 mx-auto mb-2" color="#10b981" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Análisis Crediticio</h4>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="font-black text-slate-800 text-sm">{capacityResults.clientName}</p>
                                    </div>

                                    <div className="space-y-3 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Ingresos Declarados</span><span className="font-black text-slate-800">${capacityResults.income.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Gastos Fijos</span><span className="font-black text-slate-800">${capacityResults.expenses.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm pt-2 border-t border-slate-100"><span className="text-slate-400 font-bold">Efectivo Disponible</span><span className="font-black text-indigo-600">${capacityResults.freeIncome.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuota a Evaluar</span><span className="font-black text-slate-800">${capacityResults.installment.toLocaleString()}</span></div>
                                    </div>

                                    <div className={`${capacityResults.bg} border ${capacityResults.border} p-5 rounded-[1.5rem] text-center`}>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Estado de Aprobación</p>
                                        <h3 className={`text-2xl font-black ${capacityResults.color} uppercase tracking-tight`}>{capacityResults.status}</h3>
                                        <p className="text-[10px] font-bold text-slate-500 mt-2">Esta cuota compromete el <span className="font-black text-slate-800">{capacityResults.ratio.toFixed(1)}%</span> de sus fondos libres.</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(capacityRef, `Analisis_${capacityResults.clientName}`, 'Análisis Crediticio')} disabled={isGeneratingImage} className="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-emerald-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Enviar Reporte</>}
                                    </button>
                                    <button onClick={() => setCapacityResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA CALCULADORA DE MORA */}
                    {view === 'calc_penalty' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setView('settings')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Cálculo de Mora</h2>
                            </header>
                            <form onSubmit={handlePenalty} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Cliente</label><input name="clientName" type="text" placeholder="Para notificar atraso" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-red-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto de la Cuota Atrasada</label><input name="amount" type="number" step="any" className="w-full p-5 bg-red-50 border border-red-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-red-500 text-red-500" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Días de Atraso</label><input name="days" type="number" defaultValue="1" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-red-500 outline-none" required/></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">% Mora (Por Día)</label><input name="penaltyRate" type="number" step="any" defaultValue="1" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-red-500 outline-none" required/></div>
                                </div>
                                
                                <button className="w-full bg-red-500 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Calcular Recargo</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL CALCULADORA DE MORA */}
                    {penaltyResults && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={penaltyRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-red-500"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-20 h-20 mx-auto mb-2" color="#ef4444" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Aviso de Atraso</h4>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="font-black text-slate-800 text-sm">{penaltyResults.clientName}</p>
                                    </div>

                                    <div className="space-y-3 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuota Atrasada</span><span className="font-black text-slate-800">${penaltyResults.amount.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Días Vencidos</span><span className="font-black text-slate-800">{penaltyResults.days} días</span></div>
                                        <div className="flex justify-between text-sm pt-2 border-t border-slate-100"><span className="text-slate-400 font-bold">Recargo por Mora</span><span className="font-black text-red-500">${Math.round(penaltyResults.penaltyAmount).toLocaleString()}</span></div>
                                    </div>

                                    <div className="bg-red-50 border border-red-100 p-5 rounded-[1.5rem] text-center">
                                        <p className="text-[10px] font-black text-red-400 uppercase tracking-widest mb-1">Monto Exigible</p>
                                        <h3 className="text-3xl font-black text-red-600 tracking-tight">${Math.round(penaltyResults.total).toLocaleString()}</h3>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(penaltyRef, `Aviso_Mora_${penaltyResults.clientName}`, 'Aviso de Mora')} disabled={isGeneratingImage} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-red-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Enviar Aviso</>}
                                    </button>
                                    <button onClick={() => setPenaltyResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
