                "alert-triangle": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                "pie-chart": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
                "file-text": <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

            return <span className={`icon-container inline-flex items-center justify-center ${className}`}>{icons[name] || null}</span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [clients, setClients] = useState([]);
            const [selectedClientId, setSelectedClientId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            const [receiptData, setReceiptData] = useState(null);
            const [reminderClient, setReminderClient] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showSplash, setShowSplash] = useState(true);
            const [isGeneratingImage, setIsGeneratingImage] = useState(false);
            const [isTransacting, setIsTransacting] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false); // Nuevo estado para prevenir doble click
            const [earningsFilter, setEarningsFilter] = useState('todas');
            const [earningsSearch, setEarningsSearch] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [deletePaymentConfirm, setDeletePaymentConfirm] = useState(null);
            const [clearHistoryConfirm, setClearHistoryConfirm] = useState(false);
            const [resetGainsConfirm, setResetGainsConfirm] = useState(false);
            const [moraConfirm, setMoraConfirm] = useState(false);
            const [customMoraAmount, setCustomMoraAmount] = useState('');
            const [wipeSystemConfirm, setWipeSystemConfirm] = useState(false);
            
            // Perfil de usuario y Agenda
            const [userProfile, setUserProfile] = useState({ smsAuto: false, darkMode: false });
            const [agendaTab, setAgendaTab] = useState('hoy');

            // Nuevos estados para Cartera y Calculadora
            const [portfolioSearch, setPortfolioSearch] = useState('');
            const [portfolioFilter, setPortfolioFilter] = useState('all');
            const [calcResults, setCalcResults] = useState(null);
            const [compactCalcResults, setCompactCalcResults] = useState(null);
            const [capacityResults, setCapacityResults] = useState(null);
            const [penaltyResults, setPenaltyResults] = useState(null);

            const receiptRef = useRef(null);
            const reminderRef = useRef(null);
            const calcRef = useRef(null);
            const compactCalcRef = useRef(null);
            const capacityRef = useRef(null);
            const penaltyRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    startTransition(() => {
                        setUser(u);
                        setLoading(false);
                        if (u) setView('dashboard');
                        else setView('login');
                    });
                });
                const timer = setTimeout(() => setShowSplash(false), 3300);
                return () => { unsubscribe(); clearTimeout(timer); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('users').doc(user.uid).collection('clients')
                    .onSnapshot((snap) => {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        startTransition(() => { setClients(data); });
                    }, (err) => console.error("Firestore error:", err));
                    
                const unsubProfile = db.collection('users').doc(user.uid)
                    .onSnapshot((doc) => {
                        if (doc.exists) setUserProfile(doc.data());
                    });
                    
                return () => { unsub(); unsubProfile(); }
            }, [user]);

            // Efecto para inyectar/remover clase de Modo Oscuro global
            useEffect(() => {
                if (userProfile?.darkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [userProfile?.darkMode]);

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // Formateador estricto de fechas DD/MM/YYYY para evitar desajustes en la agenda
            const formatDate = (date) => {
                const d = date.getDate().toString().padStart(2, '0');
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const y = date.getFullYear();
                return `${d}/${m}/${y}`;
            };

            // Función robusta de parseo de fechas (Solución a gestión de fechas)
            const parseDateString = (dateStr) => {
                if (!dateStr) return new Date();
                
                // PRIMERO: Forzamos el formato DD/MM/YYYY de la App para evitar que JS confunda meses con días
                const parts = dateStr.split(/[-/]/);
                if (parts.length === 3 && parts[2].length === 4) {
                    const d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T12:00:00`);
                    if (!isNaN(d.getTime())) return d;
                }
                
                // SEGUNDO: Fallback por si llega un formato estándar ISO
            let d = new Date(dateStr);
            if (!isNaN(d.getTime())) return d;
            
            return new Date(); // Fallback final
        };

        const calculateNextDate = (currentDateStr, frequency) => {
            const date = parseDateString(currentDateStr);
            const targetDay = date.getDate(); // Guardamos el día original

            switch(frequency) {
                case 'Diario': date.setDate(date.getDate() + 1); break;
                case 'Semanal': date.setDate(date.getDate() + 7); break;
                case 'Quincenal': date.setDate(date.getDate() + 15); break;
                case 'Mensual': 
                    date.setMonth(date.getMonth() + 1); 
                    // Corrige el salto de mes si el mes destino tiene menos días (ej. 31 Ene -> 28/29 Feb)
                    if (date.getDate() !== targetDay) {
                        date.setDate(0);
                    }
                    break;
                default: date.setDate(date.getDate() + 7);
            }
            return formatDate(date);
        };

        const handlePrint = () => {
                setTimeout(() => window.print(), 100);
            };

            const handleShare = async (ref, fileName, title) => {
                if (!ref.current) return;
                setIsGeneratingImage(true);
                try {
                    const canvas = await html2canvas(ref.current, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    const file = new File([blob], `${fileName}.png`, { type: 'image/png' });
                    
                    if (navigator.share) {
                        try {
                            await navigator.share({ files: [file], title: title });
                        } catch (err) {
                            // Fallback automático si navigator.share falla
                            const link = document.createElement('a');
                            link.download = `${fileName}.png`;
                            link.href = canvas.toDataURL();
                            link.click();
                        }
                    } else {
                        const link = document.createElement('a');
                        link.download = `${fileName}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    }
                } catch (e) { 
                    console.error("Share error:", e); 
                    showNotify("Error al generar la imagen");
                } finally { 
                    setIsGeneratingImage(false); 
                }
            };

            const recordTransaction = async (clientId, amount, paymentDateStr) => {
                if (isProcessing) return; // Previene doble click
                setIsProcessing(true);

                try {
                    const client = clients.find(c => c.id === clientId);
                    if (!client) {
                        setIsProcessing(false);
                        return;
                    }
                    const num = parseFloat(amount.toString().replace(/,/g, ''));
                    if (isNaN(num) || num <= 0) { 
                        showNotify("Monto no válido"); 
                        setIsProcessing(false);
                        return; 
                    }

                    let displayDate = formatDate(new Date());
                    if (paymentDateStr) {
                        const [y, m, d] = paymentDateStr.split('-');
                        if (y && m && d) displayDate = `${d.padStart(2, '0')}/${m.padStart(2, '0')}/${y}`;
                    }

                    const currentPaid = client.loan?.paidInstallments || 0;
                    const instBaseAmount = client.loan?.installmentAmount || 1;
                    let currentMora = client.loan?.mora || 0;
                    
                    let totalMoneyAvailable = num + (client.loan?.partialCredit || 0);
                    let paidMora = 0;

                    if (totalMoneyAvailable >= currentMora) {
                        paidMora = currentMora;
                        totalMoneyAvailable -= currentMora;
                        currentMora = 0;
                    } else {
                        paidMora = totalMoneyAvailable;
                        currentMora -= totalMoneyAvailable;
                        totalMoneyAvailable = 0;
                    }

                    const installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                    const surplus = totalMoneyAvailable % instBaseAmount;
                    
                    const newPaid = Math.min(client.loan.totalInstallments, currentPaid + installmentsCovered);
                    const newDebt = Math.max(0, client.totalDebt - num);
                    
                    let nextDate = client.loan.nextPaymentDate || formatDate(new Date());
                    if (installmentsCovered > 0) {
                        for(let i=0; i < installmentsCovered; i++) { 
                            nextDate = calculateNextDate(nextDate, client.loan.frequency); 
                        }
                    }

                    const entry = {
                        id: Date.now().toString(),
                        amount: num,
                        surplus: surplus,
                        date: displayDate,
                        type: 'Pago',
                        description: installmentsCovered > 0 ? `Pago Cuota ${newPaid}/${client.loan.totalInstallments}` : (paidMora > 0 ? 'Pago de Mora' : 'Abono parcial'),
                        ref: 'REC-' + Math.floor(1000 + Math.random() * 8999),
                        installmentStatus: `${newPaid}/${client.loan.totalInstallments}`,
                        remainingInstallments: client.loan.totalInstallments - newPaid,
                        paidMora: paidMora
                    };

                    await db.collection('users').doc(user.uid).collection('clients').doc(clientId).update({
                        totalDebt: newDebt,
                        history: [entry, ...(client.history || [])],
                        'loan.paidInstallments': newPaid,
                        'loan.partialCredit': surplus,
                        'loan.nextPaymentDate': nextDate,
                        'loan.mora': currentMora
                    });
                    
                    setReceiptData({ 
                        client: {...client, totalDebt: newDebt, loan: {...client.loan, paidInstallments: newPaid, partialCredit: surplus, mora: currentMora}}, 
                        transaction: entry, surplus: surplus 
                    });
                    showNotify("Pago registrado correctamente");
                    setIsTransacting(false);
                } catch (e) { 
                    console.error("Error al guardar:", e);
                    showNotify("Error al guardar"); 
                } finally {
                    setIsProcessing(false);
                }
            };

            const deleteClient = async () => {
                if(!deleteConfirm) return;
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(deleteConfirm).delete();
                    setDeleteConfirm(null); setSelectedClientId(null); setView('dashboard');
                    showNotify("Cliente eliminado permanentemente");
                } catch(e) { showNotify("Error al eliminar"); }
            };

            const deletePayment = async () => {
                if(!deletePaymentConfirm || !selectedClientId) return;
                const client = clients.find(c => c.id === selectedClientId);
                const payment = deletePaymentConfirm;

                // Sacamos el pago del historial
                const newHistory = client.history.filter(h => h.id !== payment.id);
                
                let updateData = {
                    history: newHistory,
                    totalDebt: client.totalDebt + payment.amount
                };

                // Si hay un préstamo activo, revertimos las cuotas y la fecha
                if (client.loan) {
                    const currentTotalPaid = (client.loan.paidInstallments * client.loan.installmentAmount) + (client.loan.partialCredit || 0);
                    const newTotalPaid = Math.max(0, currentTotalPaid - payment.amount);
                    
                    const newPaidInstallments = Math.floor((newTotalPaid + 0.001) / client.loan.installmentAmount);
                    const newPartialCredit = Math.max(0, newTotalPaid - (newPaidInstallments * client.loan.installmentAmount));

                    // Intentamos retroceder la fecha de cobro según las cuotas eliminadas
                let revertedDate = client.loan.nextPaymentDate;
                const installmentsDiff = client.loan.paidInstallments - newPaidInstallments;
                
                if (installmentsDiff > 0 && revertedDate) {
                    const d = parseDateString(revertedDate);
                    for(let i=0; i < installmentsDiff; i++) {
                        const targetDay = d.getDate();
                        switch(client.loan.frequency) {
                            case 'Diario': d.setDate(d.getDate() - 1); break;
                            case 'Semanal': d.setDate(d.getDate() - 7); break;
                            case 'Quincenal': d.setDate(d.getDate() - 15); break;
                            case 'Mensual': 
                                d.setMonth(d.getMonth() - 1); 
                                if (d.getDate() !== targetDay) d.setDate(0);
                                break;
                        }
                    }
                    revertedDate = formatDate(d);
                }

                updateData['loan.paidInstallments'] = newPaidInstallments;
                    updateData['loan.partialCredit'] = newPartialCredit;
                    updateData['loan.nextPaymentDate'] = revertedDate;
                    updateData['loan.mora'] = (client.loan.mora || 0) + (payment.paidMora || 0);
                }

                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update(updateData);
                    setDeletePaymentConfirm(null);
                    showNotify("Pago anulado y saldo restaurado");
                } catch(e) {
                    showNotify("Error al anular el pago");
                }
            };

            const updateClient = async (e) => {
                e.preventDefault();
                const data = {
                    name: e.target.name.value,
                    cedula: e.target.cedula.value,
                    phone: e.target.phone.value,
                    email: e.target.email?.value || '',
                    address: e.target.address.value,
                };
                try {
                    await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update(data);
                    setView('profile'); showNotify("Datos actualizados");
                } catch (e) { showNotify("Error al actualizar"); }
            };

            const clearClientHistory = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    // Rescatar ganancias no archivadas antes de borrar para no perder el registro en el acumulado
                    let unarchivedGains = 0;
                    if (selectedClient.loan && selectedClient.loan.totalToPay > 0) {
                        const profitRatio = (selectedClient.loan.totalToPay - selectedClient.loan.amount) / selectedClient.loan.totalToPay;
                        (selectedClient.history || []).forEach(h => {
                            if (!h.archivedGain) unarchivedGains += (h.amount || 0) * profitRatio;
                        });
                    }

                    const updateData = { history: [] };
                    // Si el préstamo ya está pago, reiniciamos el préstamo para habilitar uno nuevo
                    if (selectedClient.totalDebt <= 0.1) {
                        updateData.loan = firebase.firestore.FieldValue.delete();
                    }
                    
                    const batch = db.batch();
                    const clientRef = db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId);
                    batch.update(clientRef, updateData);

                    // Si hay ganancias sin archivar, las pasamos al histórico del perfil
                    if (unarchivedGains > 0) {
                        const userRef = db.collection('users').doc(user.uid);
                        batch.set(userRef, {
                            historicalGains: (userProfile.historicalGains || 0) + unarchivedGains
                        }, { merge: true });
                    }

                    await batch.commit();
                    setClearHistoryConfirm(false);
                    showNotify("Historial limpiado exitosamente.");
                } catch (e) {
                    showNotify("Error al limpiar el historial.");
                } finally {
                    setIsProcessing(false);
                }
            };

            // Lógica para Borrar Historial Completo (Clientes y Ganancias)
            const handleWipeSystem = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const batch = db.batch();
                    
                    // 1. Reset ganancias históricas del usuario
                    const userRef = db.collection('users').doc(user.uid);
                    batch.set(userRef, { historicalGains: 0 }, { merge: true });

                    // 2. Limpiar el historial de cada cliente
                    clients.forEach(c => {
                        const clientRef = db.collection('users').doc(user.uid).collection('clients').doc(c.id);
                        batch.update(clientRef, { history: [] });
                    });

                    await batch.commit();
                    setWipeSystemConfirm(false);
                    showNotify("Sistema limpiado: Historial de todos los clientes y ganancias borrados permanentemente.");
                } catch (e) {
                    showNotify("Error al limpiar el sistema.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update({
                            idImage: event.target.result
                        });
                        showNotify("Documento subido con éxito");
                    } catch (err) {
                        showNotify("Error al subir documento");
                    }
                };
                reader.readAsDataURL(file);
            };

            const assignLoan = async (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.amount.value);
                const interest = parseFloat(e.target.interest.value);
                const inst = parseInt(e.target.inst.value);
                const total = amount + (amount * (interest/100));
                
                const startDateStr = e.target.startDate.value;
                const [y, m, d] = startDateStr.split('-');
                const firstPaymentDate = `${d.padStart(2, '0')}/${m.padStart(2, '0')}/${y}`;
                const currentLoansTaken = selectedClient.totalLoansTaken || 0;
                
                await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update({
                    totalDebt: total,
                    totalLoansTaken: currentLoansTaken + 1,
                    loan: {
                        amount, interest, totalToPay: total, totalInstallments: inst, paidInstallments: 0,
                        installmentAmount: total / inst, frequency: e.target.freq.value, partialCredit: 0,
                        nextPaymentDate: firstPaymentDate, mora: 0
                    }
                });
                setView('profile'); showNotify("Préstamo asignado");
            };

            const applyMora = async (moraAmount) => {
                if (!selectedClient || !selectedClient.loan) return;
                if (isProcessing) return;
                if (isNaN(moraAmount) || moraAmount <= 0) {
                    showNotify("Monto de mora no válido");
                    return;
                }
                setIsProcessing(true);
                try {
                    const currentMora = selectedClient.loan.mora || 0;
                    const newMora = currentMora + moraAmount;
                    const newDebt = selectedClient.totalDebt + moraAmount;

                    await db.collection('users').doc(user.uid).collection('clients').doc(selectedClientId).update({
                        totalDebt: newDebt,
                        'loan.mora': newMora
                    });
                    showNotify(`Mora de RD$${Math.round(moraAmount).toLocaleString()} aplicada correctamente`);
                } catch (e) {
                    showNotify("Error al aplicar mora");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleUpdateEmail = async (e) => {
                e.preventDefault();
                try {
                    await auth.currentUser.verifyBeforeUpdateEmail(e.target.email.value);
                    showNotify("Revisa tu nueva bandeja de entrada para verificar el correo.");
                    e.target.reset();
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar para cambiar datos sensibles.");
                    else showNotify("Error al actualizar correo: " + error.message);
                }
            };

            const handleUpdatePassword = async (e) => {
                e.preventDefault();
                try {
                    await auth.currentUser.updatePassword(e.target.password.value);
                    showNotify("Contraseña actualizada exitosamente");
                    e.target.reset();
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showNotify("Por seguridad, cierra sesión y vuelve a entrar.");
                    else showNotify("Error al actualizar contraseña");
                }
            };

            // Lógica de Migración y Backup
            const exportBackup = async () => {
                try {
                    const snap = await db.collection('users').doc(user.uid).collection('clients').get();
                    const clientsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const backup = {
                        version: "2.5.0",
                        timestamp: new Date().toISOString(),
                        data: clientsData
                    };
                    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_connect_prestamos_${new Date().getTime()}.json`;
                    a.click();
                    showNotify("Backup exportado con éxito");
                } catch (e) {
                    showNotify("Error al exportar el backup");
                }
            };

            const importBackup = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const backup = JSON.parse(event.target.result);
                        if (backup.data && Array.isArray(backup.data)) {
                            const batch = db.batch();
                            const clientsRef = db.collection('users').doc(user.uid).collection('clients');
                            backup.data.forEach(client => {
                                const docRef = client.id ? clientsRef.doc(client.id) : clientsRef.doc();
                                const { id, ...clientData } = client; 
                                batch.set(docRef, clientData);
                            });
                            await batch.commit();
                            showNotify("Cartera restaurada con éxito");
                        }
                    } catch(err) {
                        showNotify("Error al leer el archivo JSON");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            };

            // Lógica para hacer Corte de Ganancias
            const handleResetGains = async () => {
                setIsProcessing(true);
                try {
                    const batch = db.batch();
                    let currentEarnedToArchive = 0;
                    
                    clients.forEach(c => {
                        let updated = false;
                        const newHistory = (c.history || []).map(h => {
                            if (!h.archivedGain && c.loan && c.loan.totalToPay > 0) {
                                const profitRatio = (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay;
                                currentEarnedToArchive += (h.amount || 0) * profitRatio;
                                updated = true;
                                return { ...h, archivedGain: true };
                            }
                            return h;
                        });
                        
                        if (updated) {
                            const clientRef = db.collection('users').doc(user.uid).collection('clients').doc(c.id);
                            batch.update(clientRef, { history: newHistory });
                        }
                    });

                    const userRef = db.collection('users').doc(user.uid);
                    batch.set(userRef, {
                        historicalGains: (userProfile.historicalGains || 0) + currentEarnedToArchive
                    }, { merge: true });

                    await batch.commit();
                    showNotify("Corte realizado exitosamente.");
                } catch (e) {
                    showNotify("Error al hacer el corte.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleCalculate = (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.amount.value);
                const interest = parseFloat(e.target.interest.value);
                const inst = parseInt(e.target.inst.value);
                const freq = e.target.freq.value;
                const startDateStr = e.target.startDate.value;
                const clientName = e.target.clientName?.value || "Cliente";

                // Formatear la fecha ingresada para que sea compatible
                const [y, m, d] = startDateStr.split('-');
                let currentDate = `${d}/${m}/${y}`; 

                const total = amount + (amount * (interest/100));
                const installmentAmount = total / inst;

                const schedule = [];
                for(let i=1; i<=inst; i++) {
                    currentDate = calculateNextDate(currentDate, freq);
                    schedule.push({ number: i, date: currentDate, amount: installmentAmount });
                }

                setCalcResults({ amount, interest, total, inst, freq, installmentAmount, schedule, clientName });
            };

            const handleCompactCalculate = (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.amount.value);
                const interest = parseFloat(e.target.interest.value);
                const inst = parseInt(e.target.inst.value);
                const freq = e.target.freq.value;
                const clientName = e.target.clientName?.value || "Cliente";

                const total = amount + (amount * (interest/100));
                const installmentAmount = total / inst;

                setCompactCalcResults({ amount, interest, total, inst, freq, installmentAmount, clientName });
            };

            const handleCapacity = (e) => {
                e.preventDefault();
                const income = parseFloat(e.target.income.value);
                const expenses = parseFloat(e.target.expenses.value);
                const installment = parseFloat(e.target.installment.value);
                const clientName = e.target.clientName?.value || "Cliente";

                const freeIncome = income - expenses;
                const ratio = freeIncome > 0 ? (installment / freeIncome) * 100 : 100;
                
                let status = 'Aprobado';
                let color = 'text-emerald-500';
                let bg = 'bg-emerald-50';
                let border = 'border-emerald-100';
                if (ratio > 40 && ratio <= 60) { status = 'Riesgo Moderado'; color = 'text-amber-500'; bg = 'bg-amber-50'; border = 'border-amber-100'; }
                if (ratio > 60 || freeIncome <= 0) { status = 'Rechazado'; color = 'text-red-500'; bg = 'bg-red-50'; border = 'border-red-100'; }

                setCapacityResults({ income, expenses, installment, freeIncome, ratio, status, color, bg, border, clientName });
            };

            const handlePenalty = (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.amount.value);
                const days = parseInt(e.target.days.value);
                const penaltyRate = parseFloat(e.target.penaltyRate.value);
                const clientName = e.target.clientName?.value || "Cliente";

                const penaltyAmount = amount * (penaltyRate/100) * days;
                const total = amount + penaltyAmount;

                setPenaltyResults({ amount, days, penaltyRate, penaltyAmount, total, clientName });
            };

            const downloadCSV = () => {
                const headers = "Cliente,Fecha,Monto,Ganancia,Estado\n";
                const rows = filteredGains.map(g => `"${g.clientName}",${g.date},${g.totalValue.toFixed(2)},${g.gainAmount.toFixed(2)},${g.status}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `ganancias_connect_${new Date().getTime()}.csv`;
                a.click();
            };

            // Metrics Logic
            const todayStr = useMemo(() => formatDate(new Date()), []);
            const tomorrowStr = useMemo(() => {
                const d = new Date();
                d.setDate(d.getDate() + 1);
                return formatDate(d);
            }, []);
            
            const dueToday = useMemo(() => clients.filter(c => c.loan && c.loan.nextPaymentDate === todayStr && c.totalDebt > 0.1), [clients, todayStr]);
            const dueTomorrow = useMemo(() => clients.filter(c => c.loan && c.loan.nextPaymentDate === tomorrowStr && c.totalDebt > 0.1), [clients, tomorrowStr]);

            const netCapitalOnStreet = useMemo(() => clients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const principalRatio = curr.loan.amount / curr.loan.totalToPay;
                    return acc + ((curr.totalDebt || 0) * principalRatio);
                }
                return acc + (curr.totalDebt || 0);
            }, 0), [clients]);
            
            const totalEarned = useMemo(() => {
                let sum = 0;
                clients.forEach(c => {
                    if (c.history && c.loan && c.loan.totalToPay > 0) {
                        const profitRatio = (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay;
                        c.history.forEach(h => {
                            if (!h.archivedGain) sum += (h.amount || 0) * profitRatio;
                        });
                    }
                });
                return sum;
            }, [clients]);

            const pendingProfit = useMemo(() => clients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const profitRatio = (curr.loan.totalToPay - curr.loan.amount) / curr.loan.totalToPay;
                    return acc + ((curr.totalDebt || 0) * profitRatio);
                }
                return acc;
            }, 0), [clients]);

            const allGainsBreakdown = useMemo(() => {
                const list = [];
                clients.forEach(c => {
                    if (c.history) {
                        const profitRatio = (c.loan && c.loan.totalToPay > 0) ? (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay : 0;
                        c.history.forEach(h => {
                            if (!h.archivedGain) {
                                list.push({ id: h.id, clientId: c.id, clientName: c.name, date: h.date, totalValue: h.amount || 0, gainAmount: (h.amount || 0) * profitRatio, status: 'cobrada', desc: h.description });
                            } else {
                                list.push({ id: h.id, clientId: c.id, clientName: c.name, date: h.date, totalValue: h.amount || 0, gainAmount: (h.amount || 0) * profitRatio, status: 'archivada', desc: h.description + ' (Archivado)' });
                            }
                        });
                    }
                    if ((c.totalDebt || 0) > 0.1 && c.loan && c.loan.totalToPay > 0) {
                        const profitRatio = (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay;
                        list.push({ id: `pend-${c.id}`, clientId: c.id, clientName: c.name, date: c.loan.nextPaymentDate || 'Pendiente', totalValue: c.totalDebt, gainAmount: c.totalDebt * profitRatio, status: 'pendiente', desc: 'Interés por cobrar' });
                    }
                });
                return list;
            }, [clients]);

            const filteredGains = useMemo(() => {
                const search = earningsSearch.toLowerCase();
                return allGainsBreakdown.filter(g => {
                    const matchStatus = earningsFilter === 'todas' || g.status === earningsFilter;
                    const matchSearch = g.clientName.toLowerCase().includes(search);
                    return matchStatus && matchSearch;
                });
            }, [allGainsBreakdown, earningsFilter, earningsSearch]);

            const filteredClients = useMemo(() => {
                const s = searchTerm.toLowerCase();
                return clients.filter(c => 
                    c.name.toLowerCase().includes(s) ||
                    (c.cedula && c.cedula.includes(s)) ||
                    (c.phone && c.phone.includes(s)) ||
                    (c.address && c.address.toLowerCase().includes(s))
                );
            }, [clients, searchTerm]);

            // Filtrado específico para la Cartera
            const portfolioFilteredClients = useMemo(() => {
                const s = portfolioSearch.toLowerCase();
                return clients.filter(c => {
                    const matchSearch = c.name.toLowerCase().includes(s) || (c.cedula && c.cedula.includes(s)) || (c.phone && c.phone.includes(s));
                    let matchFilter = true;
                    if (portfolioFilter === 'active') matchFilter = c.loan && c.totalDebt > 0;
                    if (portfolioFilter === 'inactive') matchFilter = !c.loan || c.totalDebt <= 0;
                    return matchSearch && matchFilter;
                });
            }, [clients, portfolioSearch, portfolioFilter]);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 z-[500] bg-slate-950 flex flex-col items-center justify-center splash-fade-out">
                        <LogoSVG className="w-60 h-60 mb-6 logo-bounce" color="#6366f1" />
                        <h1 className="heading-font text-3xl font-black text-white tracking-tighter">Connect Préstamos</h1>
                        <p className="text-indigo-500/50 text-[10px] uppercase font-black tracking-[0.3em] mt-4">Gestión Inteligente</p>
                    </div>
                );
            }

            if (loading) return null;

            const selectedClient = clients.find(c => c.id === selectedClientId);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[110] bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-2xl animate-in">{notification}</div>}

                    {/* MODAL ELIMINAR CLIENTE */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Eliminar Cliente?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">Se borrará de la nube permanentemente.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={deleteClient} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-sm">Eliminar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL ANULAR PAGO (CUOTA) */}
                    {deletePaymentConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Anular Pago?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">El saldo (RD${deletePaymentConfirm.amount.toLocaleString()}) volverá a sumarse a la deuda del cliente y se retrocederán las cuotas.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeletePaymentConfirm(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={deletePayment} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-sm">Anular</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL LIMPIAR HISTORIAL */}
                    {clearHistoryConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="archive" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Limpiar Historial?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">Se borrarán los registros de pago de este cliente para limpiar la pantalla. Las ganancias no archivadas se guardarán en tu histórico de forma segura.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setClearHistoryConfirm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={clearClientHistory} disabled={isProcessing} className="flex-1 py-3 bg-amber-500 text-white rounded-xl font-black text-sm">Limpiar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL ARCHIVAR GANANCIAS */}
                    {resetGainsConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="archive" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Hacer corte?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">Las ganancias cobradas actuales se archivarán al Histórico Acumulado y el contador del periodo actual volverá a $0.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setResetGainsConfirm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={() => { setResetGainsConfirm(false); handleResetGains(); }} className="flex-1 py-3 bg-amber-500 text-white rounded-xl font-black text-sm">Archivar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL APLICAR MORA */}
                    {moraConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">Aplicar Mora</h3>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-4">Monto a sumar a la deuda (RD$)</p>
                                
                                <input 
                                    type="number" 
                                    value={customMoraAmount} 
                                    onChange={(e) => setCustomMoraAmount(e.target.value)} 
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-3xl focus:border-red-500 outline-none text-red-500 mb-3" 
                                />
                                
                                <div className="flex gap-2 mb-6">
                                    <button onClick={() => setCustomMoraAmount(Math.round(selectedClient?.loan?.installmentAmount * 0.05))} className="flex-1 text-[10px] bg-red-50 text-red-600 py-2 rounded-xl font-bold border border-red-100 active:scale-95 transition-transform">5%</button>
                                    <button onClick={() => setCustomMoraAmount(Math.round(selectedClient?.loan?.installmentAmount * 0.10))} className="flex-1 text-[10px] bg-red-50 text-red-600 py-2 rounded-xl font-bold border border-red-100 active:scale-95 transition-transform">10%</button>
                                    <button onClick={() => setCustomMoraAmount(Math.round(selectedClient?.loan?.installmentAmount * (selectedClient?.loan?.interest / 100)))} className="flex-1 text-[10px] bg-red-50 text-red-600 py-2 rounded-xl font-bold border border-red-100 active:scale-95 transition-transform">Base ({selectedClient?.loan?.interest}%)</button>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={() => setMoraConfirm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={() => { setMoraConfirm(false); applyMora(Number(customMoraAmount)); }} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-sm">Aplicar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL LIMPIAR SISTEMA COMPLETO */}
                    {wipeSystemConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">¿Borrar Historial Completo?</h3>
                                <p className="text-sm text-slate-400 font-bold mb-6">Esta acción es irreversible. Se borrará el historial de pagos de <strong>todos los clientes</strong> y el <strong>histórico de ganancias archivadas</strong>.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setWipeSystemConfirm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={handleWipeSystem} disabled={isProcessing} className="flex-1 py-3 bg-red-600 text-white rounded-xl font-black text-sm">Sí, Borrar Todo</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'login' && (
                        <div className="p-10 flex flex-col items-center justify-center h-screen animate-in bg-white">
                            <LogoSVG className="w-48 h-48 mb-8" color="#4f46e5" />
                            <h1 className="heading-font text-2xl font-black mb-8 text-slate-800 tracking-tight">Connect Préstamos</h1>
                            <form onSubmit={(e) => { e.preventDefault(); auth.signInWithEmailAndPassword(e.target.email.value, e.target.pass.value); }} className="w-full space-y-4">
                                <input name="email" type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">Iniciar Sesión</button>
                            </form>
                            <div className="mt-8 flex flex-col items-center gap-3 w-full border-t border-slate-100 pt-6">
                                <p className="text-xs text-slate-400 font-bold">¿Aún no tienes cuenta?</p>
                                <button onClick={() => setView('register')} className="w-full bg-slate-50 border border-slate-200 text-indigo-600 p-4 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors">
                                    <Icon name="user-plus" size={18} /> Crear Usuario / Registrar Cartera
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'register' && (
                        <div className="p-10 flex flex-col items-center justify-center h-screen animate-in bg-white">
                            <LogoSVG className="w-40 h-40 mb-6" color="#4f46e5" />
                            <h1 className="heading-font text-2xl font-black mb-8 text-slate-800 text-center leading-tight">Crea tu Cartera <br/>Connect</h1>
                            <form onSubmit={async (e) => { 
                                e.preventDefault(); 
                                try {
                                    const cred = await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.pass.value); 
                                    await db.collection('users').doc(cred.user.uid).set({
                                        phone: e.target.phone.value,
                                        smsAuto: false,
                                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                                    });
                                } catch (error) {
                                    showNotify("Error: " + error.message);
                                }
                            }} className="w-full space-y-4">
                                <input name="email" type="email" placeholder="Tu Email Principal" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />
                                <input name="phone" type="tel" placeholder="Tu Teléfono o WhatsApp" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none" required />

                                    </div>

                                    <div className={`${capacityResults.bg} border ${capacityResults.border} p-5 rounded-[1.5rem] text-center`}>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Estado de Aprobación</p>
                                        <h3 className={`text-2xl font-black ${capacityResults.color} uppercase tracking-tight`}>{capacityResults.status}</h3>
                                        <p className="text-[10px] font-bold text-slate-500 mt-2">Esta cuota compromete el <span className="font-black text-slate-800">{capacityResults.ratio.toFixed(1)}%</span> de sus fondos libres.</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(capacityRef, `Analisis_${capacityResults.clientName}`, 'Análisis Crediticio')} disabled={isGeneratingImage} className="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-emerald-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Enviar Reporte</>}
                                    </button>
                                    <button onClick={() => setCapacityResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA CALCULADORA DE MORA */}
                    {view === 'calc_penalty' && (
                        <div className="animate-in bg-white min-h-screen">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setView('settings')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button>
                                <h2 className="heading-font text-xl font-black text-slate-800">Cálculo de Mora</h2>
                            </header>
                            <form onSubmit={handlePenalty} className="p-8 space-y-5">
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Cliente</label><input name="clientName" type="text" placeholder="Para notificar atraso" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-red-500" /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Monto de la Cuota Atrasada</label><input name="amount" type="number" step="any" className="w-full p-5 bg-red-50 border border-red-200 rounded-2xl font-black text-center text-3xl outline-none focus:border-red-500 text-red-500" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Días de Atraso</label><input name="days" type="number" defaultValue="1" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-red-500 outline-none" required/></div>
                                    <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">% Mora (Por Día)</label><input name="penaltyRate" type="number" step="any" defaultValue="1" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:border-red-500 outline-none" required/></div>
                                </div>
                                
                                <button className="w-full bg-red-500 text-white p-5 rounded-[2.2rem] font-black shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Calcular Recargo</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL CALCULADORA DE MORA */}
                    {penaltyResults && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center p-4 overflow-y-auto items-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl animate-in">
                                <div ref={penaltyRef} className="p-8 bg-white text-slate-800 relative rounded-t-[2.5rem]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-red-500"></div>
                                    <div className="text-center mb-6 mt-2">
                                        <LogoSVG className="w-20 h-20 mx-auto mb-2" color="#ef4444" />
                                        <h4 className="heading-font text-xl font-black text-slate-900">Aviso de Atraso</h4>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center mb-6">
                                        <p className="font-black text-slate-800 text-sm">{penaltyResults.clientName}</p>
                                    </div>

                                    <div className="space-y-3 mb-6">
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Cuota Atrasada</span><span className="font-black text-slate-800">${penaltyResults.amount.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-400 font-bold">Días Vencidos</span><span className="font-black text-slate-800">{penaltyResults.days} días</span></div>
                                        <div className="flex justify-between text-sm pt-2 border-t border-slate-100"><span className="text-slate-400 font-bold">Recargo por Mora</span><span className="font-black text-red-500">${Math.round(penaltyResults.penaltyAmount).toLocaleString()}</span></div>
                                    </div>

                                    <div className="bg-red-50 border border-red-100 p-5 rounded-[1.5rem] text-center">
                                        <p className="text-[10px] font-black text-red-400 uppercase tracking-widest mb-1">Monto Exigible</p>
                                        <h3 className="text-3xl font-black text-red-600 tracking-tight">${Math.round(penaltyResults.total).toLocaleString()}</h3>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 flex gap-2 rounded-b-[2.5rem]">
                                    <button onClick={() => handleShare(penaltyRef, `Aviso_Mora_${penaltyResults.clientName}`, 'Aviso de Mora')} disabled={isGeneratingImage} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-red-100">
                                        {isGeneratingImage ? <span className="animate-pulse">...</span> : <><Icon name="share-2" size={18}/> Enviar Aviso</>}
                                    </button>
                                    <button onClick={() => setPenaltyResults(null)} className="p-4 bg-slate-200 text-slate-600 rounded-2xl active:scale-95"><Icon name="x"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
