    <script>
        const manifestData = {
            name: "Connect Préstamos",
            short_name: "Connect",

            display: "standalone",

            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
        document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = "self.addEventListener('fetch', function(e) {});";
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => {
                    console.log('Nota PWA: Para instalación nativa total, requiere un servidor HTTPS real.');
                });
            });
        }
    </script>

            // Estado para el formulario de Nuevo Préstamo
            const [loanForm, setLoanForm] = useState({
                amount: '', interest: '', installments: '1', type: 'Amortizado', interestType: 'Fijo', frequency: 'Mensual', startDate: new Date().toISOString().split('T')[0]
            });

            // ==========================================
            // AJUSTES PERSONALIZADOS DINÁMICOS
            // ==========================================
            const currency = userProfile?.currency || 'RD$';
            const companyName = userProfile?.companyName || 'Connect Préstamos';
            const receiptFooter = userProfile?.receiptFooter || '¡Gracias por su preferencia!';
            const privacyMode = userProfile?.privacyMode || false;
            const routesList = userProfile?.routes?.length > 0 ? userProfile.routes : ['General'];
            
            const handleUpdateSetting = async (field, value) => {
                try {
                    // Los ajustes globales siempre van al documento del Admin (dueño)
                    if(adminUid) await db.collection('users').doc(adminUid).set({ [field]: value }, { merge: true });
                } catch (e) { console.error("Error al actualizar ajuste", e); }
            };

            // Filtrar clientes si el usuario logueado es un cobrador
            const displayedClients = useMemo(() => {
                if (userProfile?.role === 'cobrador' && userProfile?.assignedRoute !== 'Todas') {
                    return clients.filter(c => c.route === userProfile.assignedRoute);
                }
                return clients;
            }, [clients, userProfile]);

            // Visualización en vivo del Préstamo
            const loanPreview = useMemo(() => {
                const amount = parseFloat(loanForm.amount) || 0;
                const interest = parseFloat(loanForm.interest) || 0;
                const inst = parseInt(loanForm.installments) || 1;
                
                if (loanForm.type === 'Rédito') {
                    return { totalToPay: amount, installmentAmount: amount * (interest / 100), totalInterest: amount * (interest / 100) };
                } else {
                    const totalInterest = loanForm.interestType === 'Por Cuota' ? (amount * (interest / 100) * inst) : (amount * (interest / 100));
                    const totalToPay = amount + totalInterest;
                    return { totalToPay, installmentAmount: totalToPay / inst, totalInterest };
                }
            }, [loanForm]);

            const receiptRef = useRef(null);
            const reminderRef = useRef(null);

            useEffect(() => {
                if (userProfile?.darkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [userProfile?.darkMode]);

            useEffect(() => {
                const handleOnline = () => { setIsOnline(true); showNotify("Conexión restaurada."); };
                const handleOffline = () => { setIsOnline(false); showNotify("Modo Offline activado."); };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            const showNotify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const formatDate = (date) => {
                const d = new Date(date);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                return `${day}/${month}/${d.getFullYear()}`;
            };

            const parseDateString = (dateStr) => {
                if (!dateStr) return new Date();
                if (dateStr.includes('-')) {
                    const parts = dateStr.split('-');
                    return new Date(parts[0], parts[1] - 1, parts[2]);
                }
                const parts = dateStr.split('/');
                if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
                return new Date();
            };

            const calculateNextDate = (currentDateStr, frequency) => {
                if (!currentDateStr || currentDateStr.includes('NaN')) currentDateStr = formatDate(new Date());
                const parts = currentDateStr.split('/');
                let date = new Date(parts[2], parts[1] - 1, parts[0]);
                if (frequency === 'Diario') date.setDate(date.getDate() + 1);
                else if (frequency === 'Semanal') date.setDate(date.getDate() + 7);
                else if (frequency === 'Quincenal') date.setDate(date.getDate() + 15);
                else if (frequency === 'Mensual') date.setMonth(date.getMonth() + 1);
                return formatDate(date);
            };

            useEffect(() => { const timer = setTimeout(() => setShowSplash(false), 3300); return () => clearTimeout(timer); }, []);

            // NUEVA LÓGICA DE AUTENTICACIÓN Y ROLES (Admin vs Cobrador)
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr) {
                        setView('dashboard');
                        db.collection('users').doc(usr.uid).onSnapshot(doc => {
                            if (doc.exists) {
                                const profile = doc.data();
                                setUserProfile(profile);
                                // Si es cobrador, usar el UID del admin para leer clientes. Si no, usar su propio UID.
                                setAdminUid(profile.role === 'cobrador' ? profile.adminUid : usr.uid);
                            }
                        });
                    } else {
                        setView('login');
                        setUserProfile(null);
                        setAdminUid(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Suscripción a los datos (usando adminUid)
            useEffect(() => {
                if (adminUid) {
                    const unsubClients = db.collection('users').doc(adminUid).collection('clients').onSnapshot(snap => {
                        setClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                    const unsubGains = db.collection('users').doc(adminUid).collection('gains').orderBy('date', 'desc').onSnapshot(snap => {
                        setStoredGains(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                    return () => { unsubClients(); unsubGains(); };
                }
            }, [adminUid]);

            // Obtener lista de cobradores creados por este admin
            useEffect(() => {
                if (user?.uid && userProfile?.role === 'admin') {
                    const unsub = db.collection('users').where('adminUid', '==', user.uid).onSnapshot(snap => {
                        setCobradores(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                    return () => unsub();
                }
            }, [user?.uid, userProfile?.role]);

            // ==========================================
            // CREACIÓN DE COBRADORES (Doble Instancia)
            // ==========================================
            const handleCreateCobrador = async (e) => {
                e.preventDefault();
                setIsProcessing(true);
                try {
                    let secApp = firebase.apps.find(a => a.name === "Secondary");
                    if (!secApp) secApp = firebase.initializeApp(firebaseConfig, "Secondary");
                    
                    const res = await secApp.auth().createUserWithEmailAndPassword(cobradorForm.email, cobradorForm.pass);
                    
                    await db.collection('users').doc(res.user.uid).set({
                        role: 'cobrador',
                        adminUid: user.uid,
                        assignedRoute: cobradorForm.route,
                        name: cobradorForm.name,
                        email: cobradorForm.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    await secApp.auth().signOut();
                    showNotify("Cobrador creado con éxito");
                    setCobradorModal(false);
                    setCobradorForm({ name: '', email: '', pass: '', route: 'Todas' });
                } catch(err) {
                    showNotify("Error: " + err.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file && adminUid) {
                    const reader = new FileReader();
                    reader.onload = (ev) => db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ idImage: ev.target.result });
                    reader.readAsDataURL(file);
                }
            };

            const recordTransaction = async (clientId, inputAmount, dateOverride) => {
                if(isProcessing || !adminUid) return;
                setIsProcessing(true);
                const client = clients.find(c => c.id === clientId);
                let amountStr = String(inputAmount).replace(/,/g, '');
                let amount = parseFloat(amountStr) || 0;
                
                if (amount <= 0) { setIsProcessing(false); return showNotify("Monto inválido"); }

                try {
                    let newHistory = client.history || [];
                    const isRedito = client.loan.type === 'Rédito';
                    const instBaseAmount = client.loan.installmentAmount;
                    const partialCredit = client.loan.partialCredit || 0;
                    const paidMora = client.loan.mora || 0;
                    
                    let totalMoneyAvailable = amount + partialCredit;
                    
                    if (paidMora > 0) {
                        if (totalMoneyAvailable >= paidMora) totalMoneyAvailable -= paidMora;
                        else totalMoneyAvailable = 0;
                    }

                    let installmentsCovered = 0;
                    let surplus = 0;
                    let newPaid = client.loan.paidInstallments || 0;
                    let currentPaid = newPaid;
                    
                    let newDebt = client.totalDebt;
                    let nextDate = client.loan.nextPaymentDate || formatDate(new Date());
                    if (nextDate.includes('NaN')) nextDate = formatDate(new Date());
                    let description = '';

                    if (isRedito) {
                        if (transactionType === 'Capital') {
                            newDebt = Math.max(0, client.totalDebt - totalMoneyAvailable);
                            surplus = 0; description = 'Abono a Capital';
                        } else {
                            installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                            surplus = totalMoneyAvailable % instBaseAmount;
                            newPaid = currentPaid + installmentsCovered;
                            if (installmentsCovered > 0) { for(let i=0; i < installmentsCovered; i++) { nextDate = calculateNextDate(nextDate, client.loan.frequency); } }
                            description = installmentsCovered > 0 ? `Pago Interés (${installmentsCovered} cuotas)` : (paidMora > 0 ? 'Pago de Mora' : 'Abono parcial a interés');
                        }
                    } else {
                        if (transactionType === 'Capital') {
                            newDebt = Math.max(0, client.totalDebt - totalMoneyAvailable);
                            surplus = 0; description = 'Abono a Capital (Reducción de Deuda)';
                        } else {
                            installmentsCovered = Math.floor(totalMoneyAvailable / instBaseAmount);
                            surplus = totalMoneyAvailable % instBaseAmount;
                            newPaid = Math.min(client.loan.totalInstallments, currentPaid + installmentsCovered);
                            let totalMoneyToDiscount = installmentsCovered * instBaseAmount;
                            newDebt = Math.max(0, client.totalDebt - totalMoneyToDiscount);
                            
                            if (installmentsCovered > 0) { for(let i=0; i < installmentsCovered; i++) { nextDate = calculateNextDate(nextDate, client.loan.frequency); } }
                            description = installmentsCovered > 0 ? `Pago Cuota ${newPaid}/${client.loan.totalInstallments}` : (paidMora > 0 ? 'Pago de Mora' : 'Abono parcial');
                        }
                    }

                    let newInstallmentAmount = instBaseAmount;
                    let gainRecord = {
                        clientId: client.id, clientName: client.name,
                        date: dateOverride ? parseDateString(dateOverride).toLocaleDateString('es-DO') : formatDate(new Date()),
                        totalValue: amount,
                        gainAmount: isRedito ? (transactionType === 'Interés' ? amount : 0) : (installmentsCovered * instBaseAmount * (client.loan.interest / (100 + client.loan.interest))),
                        status: 'Activo', type: transactionType, timestamp: new Date().toISOString()
                    };

                    const transaction = {
                        id: Date.now().toString(), amount: amount, surplus: surplus,
                        date: dateOverride ? parseDateString(dateOverride).toLocaleDateString('es-DO') : new Date().toLocaleString('es-DO'),
                        type: transactionType, description: description,
                        ref: Math.floor(1000 + Math.random() * 8999).toString(),
                        installmentStatus: installmentsCovered > 0 ? 'Pagada' : 'Abono',
                        remainingInstallments: isRedito ? '∞' : client.loan.totalInstallments - newPaid,
                        paidMora: paidMora, remainingDebt: newDebt
                    };

                    if (amount > 0) {
                        newHistory.unshift(transaction);
                        await db.collection('users').doc(adminUid).collection('gains').add(gainRecord);
                    }

                    if (newDebt <= 0.1) {
                        await db.collection('users').doc(adminUid).collection('clients').doc(clientId).update({ totalDebt: 0, loan: null, history: newHistory });
                        showNotify("¡Préstamo Saldado!");
                    } else {
                        await db.collection('users').doc(adminUid).collection('clients').doc(clientId).update({
                            totalDebt: newDebt, 'loan.paidInstallments': newPaid, 'loan.nextPaymentDate': nextDate,
                            'loan.partialCredit': surplus, 'loan.installmentAmount': newInstallmentAmount, 'loan.mora': 0, history: newHistory
                        });
                        showNotify("Transacción Exitosa");
                    }
                    setIsTransacting(false);
                    if(amount > 0) setReceiptData({ client, transaction });
                } catch (error) { showNotify("Error al procesar el pago"); } finally { setIsProcessing(false); }
            };

            const handleDeleteClient = async (id) => {
                await db.collection('users').doc(adminUid).collection('clients').doc(id).delete();
                setDeleteConfirm(null); setView('dashboard'); showNotify("Cliente eliminado");
            };

            const handleDeletePayment = async (paymentId) => {
                try {
                    const newHistory = selectedClient.history.filter(h => h.id !== paymentId);
                    await db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ history: newHistory });
                    const gainSnapshot = await db.collection('users').doc(adminUid).collection('gains').where('clientId', '==', selectedClientId).where('date', '==', selectedClient.history.find(h => h.id === paymentId).date).get();
                    gainSnapshot.forEach(doc => doc.ref.delete());
                    setDeletePaymentConfirm(null); showNotify("Pago anulado");
                } catch (e) { showNotify("Error al anular pago"); }
            };

            const handleClearHistory = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    await db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ history: [] });
                    setClearHistoryConfirm(false); showNotify("Historial limpio");
                } catch(e) { showNotify("Error al limpiar historial"); } finally { setIsProcessing(false); }
            };

            const handleResetGains = async () => {
                setIsProcessing(true);
                try {
                    const batch = db.batch();
                    clients.forEach(c => {
                        let updated = false;
                        const newHistory = (c.history || []).map(h => {
                            if (!h.archivedGain) { updated = true; return { ...h, archivedGain: true }; }
                            return h;
                        });
                        if (updated) {
                            const clientRef = db.collection('users').doc(adminUid).collection('clients').doc(c.id);
                            batch.update(clientRef, { history: newHistory });
                        }
                    });
                    let totalGainsToArchive = storedGains.reduce((sum, g) => sum + g.gainAmount, 0);
                    storedGains.forEach(g => { batch.delete(db.collection('users').doc(adminUid).collection('gains').doc(g.id)); });
                    
                    await batch.commit();
                    await db.collection('users').doc(adminUid).set({ historicalGains: firebase.firestore.FieldValue.increment(totalGainsToArchive) }, { merge: true });
                    
                    setResetGainsConfirm(false); showNotify("Corte realizado. Ganancias archivadas.");
                } catch (e) { showNotify("Error al hacer corte"); } finally { setIsProcessing(false); }
            };

            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(clients));
                const a = document.createElement('a'); a.href = dataStr; a.download = `connect_backup_${new Date().getTime()}.json`; a.click();
            };

            const importBackup = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const importedClients = JSON.parse(ev.target.result);
                        const batch = db.batch();
                        importedClients.forEach(client => {
                            const newDoc = db.collection('users').doc(adminUid).collection('clients').doc();
                            batch.set(newDoc, client);
                        });
                        await batch.commit(); showNotify("Backup importado con éxito");
                    } catch (err) { showNotify("Error al importar backup"); }
                };
                reader.readAsText(file);
            };

            const handleWipeSystem = async () => {
                if(isProcessing) return;
                setIsProcessing(true);
                try {
                    const batch = db.batch();
                    for(let c of clients) { batch.update(db.collection('users').doc(adminUid).collection('clients').doc(c.id), { history: [] }); }
                    for(let g of storedGains) { batch.delete(db.collection('users').doc(adminUid).collection('gains').doc(g.id)); }
                    await batch.commit();
                    await db.collection('users').doc(adminUid).set({ historicalGains: 0 }, { merge: true });
                    setWipeSystemConfirm(false); showNotify("¡Sistema limpiado por completo!");
                } catch (e) { showNotify("Error en la limpieza"); } finally { setIsProcessing(false); }
            };

            const handleRefinance = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    const addedAmount = parseFloat(refinanceForm.amount) || 0;
                    const newInterest = parseFloat(refinanceForm.interest);
                    const newInst = parseInt(refinanceForm.inst);
                    const currentClient = clients.find(c => c.id === selectedClientId);
                    
                    const currentDebt = currentClient.totalDebt;
                    const baseNewDebt = currentDebt + addedAmount;
                    const interestAmountPerCuota = baseNewDebt * (newInterest/100);
                    const totalInterest = currentClient.loan.interestType === 'Fijo' ? interestAmountPerCuota : interestAmountPerCuota * newInst;
                    const total = currentClient.loan.type === 'Rédito' ? baseNewDebt : baseNewDebt + totalInterest;
                    const newInstallmentAmount = currentClient.loan.type === 'Rédito' ? interestAmountPerCuota : total / newInst;
                    
                    await db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({
                        totalDebt: total, 'loan.amount': currentClient.loan.amount + addedAmount, 'loan.interest': newInterest,
                        'loan.totalToPay': total, 'loan.totalInstallments': newInst, 'loan.installmentAmount': newInstallmentAmount,
                        history: [{
                            id: Date.now().toString(), amount: 0, surplus: 0, date: formatDate(new Date()), type: 'Ajuste',
                            description: `Refinanciamiento: +${currency}${addedAmount} / ${newInterest}% / ${newInst} Cuotas`,
                            ref: 'REF-' + Math.floor(1000 + Math.random() * 8999), installmentStatus: 'N/A',
                            remainingInstallments: currentClient.loan.type === 'Rédito' ? '∞' : newInst - currentClient.loan.paidInstallments, paidMora: 0
                        }, ...(currentClient.history || [])]
                    });
                    setRefinanceModal(false); showNotify("Préstamo refinanciado con éxito");
                } catch (err) { showNotify("Error al refinanciar"); } finally { setIsProcessing(false); }
            };

            // Metrics Logic (USING DISPLAYED CLIENTS FOR ROLE RESTRICTIONS)
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const todayStr = useMemo(() => formatDate(new Date()), []);
            const tomorrowStr = useMemo(() => { const d = new Date(); d.setDate(d.getDate() + 1); return formatDate(d); }, []);
            
            const dueToday = useMemo(() => displayedClients.filter(c => c.status !== 'pending_approval' && c.loan && c.loan.nextPaymentDate === todayStr && c.totalDebt > 0.1), [displayedClients, todayStr]);
            const dueTomorrow = useMemo(() => displayedClients.filter(c => c.status !== 'pending_approval' && c.loan && c.loan.nextPaymentDate === tomorrowStr && c.totalDebt > 0.1), [displayedClients, tomorrowStr]);
            
            const overdueClients = useMemo(() => displayedClients.filter(c => {
                if (c.status === 'pending_approval' || !c.loan || c.totalDebt <= 0.1 || !c.loan.nextPaymentDate) return false;
                const nextDate = parseDateString(c.loan.nextPaymentDate);
                nextDate.setHours(0, 0, 0, 0);
                return nextDate < today;
            }), [displayedClients]);

            const pendingApprovalsCount = useMemo(() => clients.filter(c => c.status === 'pending_approval' || c.pendingLoan).length, [clients]);

            const netCapitalOnStreet = useMemo(() => displayedClients.reduce((acc, curr) => {
                if(curr.status === 'pending_approval') return acc;
                if(curr.loan && curr.loan.type === 'Rédito') return acc + curr.totalDebt;
                if(curr.loan && curr.loan.type !== 'Rédito') return acc + curr.loan.amount;
                return acc;
            }, 0), [displayedClients]);
            
            const totalCollectedToday = useMemo(() => {
                let total = 0;
                const todayFormatted = new Date().toLocaleDateString('es-DO');
                displayedClients.forEach(c => {
                    c.history?.forEach(h => {
                        if (h.date && h.date.split(',')[0].trim() === todayFormatted && !h.archivedGain) {
                            total += parseFloat(h.amount) || 0;
                        }
                    });
                });
                return total;
            }, [displayedClients]);

            const monthlyExpected = useMemo(() => displayedClients.reduce((acc, curr) => acc + (curr.loan ? (curr.totalDebt || 0) : 0), 0), [displayedClients]);
            
            const monthlyCollected = useMemo(() => storedGains.reduce((acc, curr) => acc + curr.totalValue, 0), [storedGains]);
            const monthlyGains = useMemo(() => storedGains.reduce((acc, curr) => acc + curr.gainAmount, 0), [storedGains]);

            const allGainsBreakdown = useMemo(() => {
                const list = [...storedGains];
                displayedClients.forEach(c => {
                    const isRedito = c.loan?.type === 'Rédito';
                    const profitRatio = (c.loan && c.loan.totalToPay > 0 && !isRedito) ? (c.loan.totalToPay - c.loan.amount) / c.loan.totalToPay : 0;
                    if ((c.totalDebt || 0) > 0.1 && c.loan && c.loan.totalToPay > 0) {
                        let pendingGain = 0;
                        if (isRedito) pendingGain = (c.loan.installmentAmount || 0) - (c.loan.partialCredit || 0) + (c.loan.mora || 0);
                        else pendingGain = c.totalDebt * profitRatio;
                        
                        if (pendingGain > 0) {
                            list.push({ id: `pend-${c.id}`, clientId: c.id, clientName: c.name, date: c.loan.nextPaymentDate || 'Pendiente', totalValue: isRedito ? pendingGain : c.totalDebt, gainAmount: pendingGain, status: 'pendiente', desc: isRedito ? 'Interés/Mora por cobrar' : 'Interés por cobrar' });
                        }
                    }
                });
                return list;
            }, [displayedClients, storedGains]);

            const filteredGains = useMemo(() => {
                const search = earningsSearch.toLowerCase();
                return allGainsBreakdown.filter(g => {
                    const matchStatus = earningsFilter === 'todas' || g.status === earningsFilter;
                    const matchSearch = g.clientName.toLowerCase().includes(search);
                    return matchStatus && matchSearch;
                });
            }, [allGainsBreakdown, earningsFilter, earningsSearch]);

            // Filtrado específico para la Cartera
            const portfolioFilteredClients = useMemo(() => {
                const s = portfolioSearch.toLowerCase();
                let filtered = displayedClients.filter(c => {
                    const matchSearch = c.name.toLowerCase().includes(s) || (c.cedula && c.cedula.includes(s)) || (c.phone && c.phone.includes(s)) || (c.address && c.address.toLowerCase().includes(s));
                    let matchFilter = true;
                    if (portfolioFilter === 'active') matchFilter = c.loan && c.totalDebt > 0 && c.status !== 'pending_approval';
                    if (portfolioFilter === 'inactive') matchFilter = (!c.loan || c.totalDebt <= 0) && c.status !== 'pending_approval';
                    if (portfolioFilter === 'overdue') {
                        if (c.status === 'pending_approval' || !c.loan || c.totalDebt <= 0.1 || !c.loan.nextPaymentDate) matchFilter = false;
                        else {
                            const nextDate = parseDateString(c.loan.nextPaymentDate);
                            nextDate.setHours(0, 0, 0, 0);
                            matchFilter = nextDate < today;
                        }
                    }
                    if (portfolioFilter === 'approvals') matchFilter = c.status === 'pending_approval' || !!c.pendingLoan;
                    
                    let matchRoute = true;
                    if (portfolioRouteFilter !== 'Todas') matchRoute = c.route === portfolioRouteFilter;
                    
                    return matchSearch && matchFilter && matchRoute;
                });

                return filtered.sort((a, b) => {
                    if (portfolioSort === 'debt_desc') return (b.totalDebt || 0) - (a.totalDebt || 0);
                    if (portfolioSort === 'debt_asc') return (a.totalDebt || 0) - (b.totalDebt || 0);
                    return a.name.localeCompare(b.name);
                });
            }, [displayedClients, portfolioSearch, portfolioFilter, portfolioSort, portfolioRouteFilter]);

            const pendingProfit = useMemo(() => displayedClients.reduce((acc, curr) => {
                if (curr.loan && curr.loan.totalToPay > 0) {
                    const isRedito = curr.loan.type === 'Rédito';
                    if (isRedito) return acc + ((curr.loan.installmentAmount || 0) - (curr.loan.partialCredit || 0) + (curr.loan.mora || 0));
                    else {
                        const profitRatio = (curr.loan.totalToPay - curr.loan.amount) / curr.loan.totalToPay;
                        return acc + ((curr.totalDebt || 0) * profitRatio);
                    }
                }
                return acc;
            }, 0), [displayedClients]);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center splash-fade-out">
                        <LogoSVG className="w-40 h-40 text-indigo-500 logo-bounce mb-8" />
                        <h1 className="text-white text-5xl font-black heading-font tracking-tight">{companyName.split(' ')[0] || 'Connect'}</h1>
                        <p className="text-indigo-400 text-xs font-black uppercase tracking-[0.4em] mt-3">{companyName.split(' ').slice(1).join(' ') || 'Préstamos'}</p>
                    </div>
                );
            }

            const selectedClient = clients.find(c => c.id === selectedClientId);
            const isRestrictedRole = userProfile?.role === 'empleado' || userProfile?.role === 'cobrador';

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    {!isOnline && (
                        <div className="bg-orange-500 text-white text-[10px] font-black uppercase tracking-widest text-center py-2 flex items-center justify-center gap-2 z-[105] sticky top-0 shadow-md">
                            <Icon name="alert-triangle" size={14} /> Modo Offline (Datos guardados localmente)
                        </div>
                    )}
                    {notification && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[110] bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-2xl animate-in">{notification}</div>}

                    {/* MODAL PIN DE SEGURIDAD (Solo aplica si el admin activó el candado local) */}
                    {pinModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[400] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="lock" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">PIN de Seguridad</h3>
                                <p className="text-xs text-slate-400 font-bold mb-6">Ingresa el PIN maestro para salir del Modo Empleado.</p>
                                <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-2xl tracking-[0.5em] focus:border-indigo-500 outline-none mb-4" placeholder="****" maxLength="4" />
                                <div className="flex gap-3">
                                    <button onClick={() => { setPinModal(false); setPinInput(''); }} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">Cancelar</button>
                                    <button onClick={() => {
                                        if (pinInput === (userProfile?.employeePin || '1234')) {
                                            db.collection('users').doc(user.uid).set({ role: 'admin' }, { merge: true });

                                        <button onClick={() => setDeleteConfirm(selectedClientId)} className="p-3 text-red-600 bg-red-100 rounded-2xl active:scale-95 transition-transform shadow-sm border border-red-200"><Icon name="trash-2" size={18}/></button>

                            </header>

                            <main className="p-6 space-y-6">
                                <div className="bg-white rounded-[2.8rem] p-8 border border-slate-100 shadow-sm flex flex-col items-center text-center pt-10 relative">

                                        <div className="w-full h-40 bg-slate-50 rounded-[2rem] overflow-hidden shadow-inner border border-slate-200 relative">

                                                <img src={selectedClient.idImage} className="w-full h-full object-cover" alt="Documento" />
                                            ) : (
                                                <label className="w-full h-full flex flex-col items-center justify-center text-slate-300 cursor-pointer hover:bg-slate-100 transition-colors">
                                                    <Icon name="camera" size={40} className="mb-2 opacity-50" />
                                                    <span className="text-[10px] font-black uppercase tracking-widest opacity-80">Subir Foto / Cédula</span>
                                                    <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if(file) {
                                                            const reader = new FileReader();
                                                            reader.onload = (ev) => db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ idImage: ev.target.result });
                                                            reader.readAsDataURL(file);
                                                        }
                                                    }} />
                                                </label>
                                            )}
                                        </div>
                                        {/* Controles Flotantes de la Imagen */}
                                        {selectedClient.idImage && (
                                            <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 flex gap-2 bg-white p-1.5 rounded-[1rem] shadow-lg border border-slate-100 z-10">
                                                <a href={selectedClient.idImage} download={`Doc_${selectedClient.name}.png`} className="w-9 h-9 bg-slate-50 text-slate-600 rounded-xl flex items-center justify-center hover:bg-slate-100 active:scale-95 transition-transform" title="Descargar"><Icon name="download" size={16}/></a>
                                                <label className="w-9 h-9 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center cursor-pointer hover:bg-indigo-100 active:scale-95 transition-transform" title="Cambiar Foto">
                                                    <Icon name="refresh-cw" size={16}/>
                                                    <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if(file) {
                                                            const reader = new FileReader();
                                                            reader.onload = (ev) => db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ idImage: ev.target.result });
                                                            reader.readAsDataURL(file);
                                                        }
                                                    }} />
                                                </label>
                                                {userProfile?.role !== 'empleado' && userProfile?.role !== 'cobrador' && (
                                                    <button onClick={() => { db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ idImage: null }); }} className="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-100 active:scale-95 transition-transform" title="Eliminar Foto"><Icon name="trash-2" size={16}/></button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    <h3 className="heading-font text-2xl font-black text-slate-800 leading-tight mt-2">{selectedClient.name}</h3>

                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>

                                    </a>

                                            <h4 className="font-black text-amber-700 text-lg">Cliente Pendiente</h4>
                                            <p className="text-xs text-amber-600/80 font-bold mb-4">Este perfil fue creado por un empleado y requiere aprobación.</p>
                                            {userProfile?.role === 'admin' ? (
                                                <div className="flex gap-2">
                                                    <button onClick={() => { db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ status: 'active' }); showNotify("Cliente Aprobado"); }} className="flex-1 bg-amber-500 text-white py-3 rounded-xl font-black text-xs active:scale-95 transition-transform shadow-lg shadow-amber-500/30">Aprobar</button>
                                                    <button onClick={() => { setView('dashboard'); db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).delete(); showNotify("Cliente Rechazado"); }} className="flex-1 bg-red-100 text-red-600 py-3 rounded-xl font-black text-xs active:scale-95 transition-transform">Rechazar</button>
                                                </div>
                                            ) : (
                                                <p className="text-[10px] font-black uppercase text-amber-500 tracking-widest bg-amber-100/50 py-2 rounded-lg">Esperando al administrador</p>
                                            )}

                                        <div className="w-full bg-indigo-50 p-6 rounded-[2rem] border border-indigo-200 text-center mb-6 shadow-inner">

                                            {userProfile?.role === 'admin' ? (
                                                <div className="flex gap-2">
                                                    <button onClick={() => { db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ loan: selectedClient.pendingLoan, totalDebt: selectedClient.pendingLoan.totalToPay, pendingLoan: firebase.firestore.FieldValue.delete() }); showNotify("Préstamo Aprobado"); }} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black text-xs active:scale-95 transition-transform shadow-lg shadow-indigo-600/30">Aprobar</button>

                                                </div>
                                            ) : (
                                                <p className="text-[10px] font-black uppercase text-indigo-500 tracking-widest bg-indigo-100/50 py-2 rounded-lg">Esperando al administrador</p>
                                            )}
                                        </div>
                                    )}

                                    <div className="w-full grid grid-cols-2 gap-3 mb-6">
                                        <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center">

                                            <p className="font-bold text-slate-700 text-xs">{selectedClient.cedula || 'N/D'}</p>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center">

                                            <p className={`font-black text-xs ${selectedClient.totalDebt > 0 ? 'text-red-500' : 'text-emerald-500'}`}>{selectedClient.totalDebt > 0 ? 'Con Deuda' : 'Limpio'}</p>
                                        </div>
                                    </div>

                                    {(selectedClient.loan && selectedClient.totalDebt > 0.1) && (
                                        <div className="w-full bg-slate-50 p-6 rounded-[2rem] border border-slate-100 text-left space-y-3">
                                            <div className="flex justify-between items-end border-b border-slate-200 pb-3">
                                                <div>
                                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Deuda Restante</p>
                                                    <p className="text-2xl font-black text-slate-800">{currency}{Math.round(selectedClient.totalDebt).toLocaleString()}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Modalidad</p>
                                                    <p className="font-bold text-indigo-600 text-sm bg-indigo-50 px-3 py-1 rounded-lg inline-block">{selectedClient.loan.type} • {selectedClient.loan.frequency}</p>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 pt-2">
                                                <div>
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Próx. Pago</p>
                                                    <p className="font-bold text-slate-700 text-sm">{(selectedClient.loan.nextPaymentDate && !selectedClient.loan.nextPaymentDate.includes('NaN')) ? selectedClient.loan.nextPaymentDate : 'Pendiente'}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">{selectedClient.loan.type === 'Rédito' ? 'Interés' : 'Progreso'}</p>
                                                    <p className="font-bold text-slate-700 text-sm">{selectedClient.loan.type === 'Rédito' ? `${selectedClient.loan.interest}%` : `${selectedClient.loan.paidInstallments}/${selectedClient.loan.totalInstallments} Cuotas`}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {selectedClient.status !== 'pending_approval' && (
                                        <div className="w-full mt-8 flex flex-col gap-3">
                                            {(selectedClient.totalDebt > 0.1) ? (
                                                <>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setReminderClient(selectedClient)} className="p-4 bg-emerald-50 text-emerald-600 rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-transform flex-1 font-black text-[10px] sm:text-xs uppercase"><Icon name="camera" size={16} className="mr-1 sm:mr-2"/> Recordar</button>
                                                        <button onClick={() => { 
                                                            const moraPercent = userProfile?.defaultMoraPercentage ? parseFloat(userProfile.defaultMoraPercentage) : selectedClient.loan.interest;
                                                            const defaultMora = selectedClient.loan.installmentAmount * (moraPercent / 100);
                                                            setCustomMoraAmount(Math.round(defaultMora));
                                                            setMoraConfirm(true); 
                                                        }} className="p-4 bg-red-50 text-red-500 rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-transform flex-1 font-black text-[10px] sm:text-xs uppercase"><Icon name="alert-triangle" size={16} className="mr-1 sm:mr-2"/> Mora</button>
                                                        
                                                        {userProfile?.role !== 'empleado' && userProfile?.role !== 'cobrador' && (
                                                            <button onClick={() => {
                                                                setRefinanceForm({ amount: '', interest: selectedClient.loan?.interest || 20, inst: selectedClient.loan?.totalInstallments || 10 });
                                                                setRefinanceModal(true);
                                                            }} className="p-4 bg-purple-50 text-purple-600 rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-transform flex-1 font-black text-[10px] sm:text-xs uppercase"><Icon name="refresh-cw" size={16} className="mr-1 sm:mr-2"/> Ajustar</button>
                                                        )}
                                                    </div>
                                                    <button onClick={() => { setTransactionType('Interés'); setIsTransacting(true); }} className="py-5 px-8 bg-indigo-600 text-white rounded-[1.8rem] font-black text-sm uppercase tracking-widest w-full active:scale-95 transition-transform mt-2">Cobrar Cuota</button>
                                                </>
                                            ) : selectedClient.pendingLoan ? (
                                                null
                                            ) : (
                                                <button onClick={() => { 
                                                    setLoanForm({ amount: '', interest: userProfile?.defaultInterest || '', installments: '1', type: 'Amortizado', interestType: 'Fijo', frequency: 'Mensual', startDate: new Date().toISOString().split('T')[0] });
                                                    setView('assign_loan'); 
                                                }} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black flex items-center justify-center gap-3 active:scale-95 transition-transform"><Icon name="trending-up" size={20} /> Asignar Nuevo Préstamo</button>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4 pb-20">
                                    <div className="flex justify-between items-center px-4">
                                        <h4 className="heading-font font-black text-[11px] uppercase text-slate-400 tracking-widest">Historial de Pagos</h4>
                                        {selectedClient.history?.length > 0 && userProfile?.role !== 'empleado' && userProfile?.role !== 'cobrador' && (
                                            <button onClick={() => setClearHistoryConfirm(true)} className="text-[10px] bg-amber-50 text-amber-600 font-black px-3 py-1.5 rounded-lg hover:bg-amber-100 active:scale-95 transition-colors">Limpiar Historial</button>
                                        )}
                                    </div>
                                    <div className="space-y-3 px-2">
                                        {selectedClient.history?.map(h => (
                                            <div key={h.id} className="p-5 bg-white border border-slate-100 rounded-[1.8rem] flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-4"><div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center border border-emerald-100"><Icon name="check-circle-2" size={22}/></div><div><p className="font-bold text-slate-800 text-sm leading-none">{h.description}</p><p className="text-[10px] text-slate-400 mt-1 uppercase font-black">{h.date}</p></div></div>
                                                <div className="flex items-center gap-2">
                                                    <p className="font-black text-emerald-500 text-lg mr-2">{currency}{h.amount.toLocaleString()}</p>
                                                    <button onClick={() => setReceiptData({client: selectedClient, transaction: h})} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-indigo-600 hover:bg-indigo-50 transition-colors"><Icon name="share-2" size={16}/></button>
                                                    {userProfile?.role !== 'empleado' && userProfile?.role !== 'cobrador' && (
                                                        <button onClick={() => setDeletePaymentConfirm(h)} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-red-500 hover:bg-red-50 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        {!selectedClient.history?.length && <p className="text-center text-xs font-bold text-slate-400 py-6">Sin historial registrado</p>}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* VISTA DE ASIGNAR PRÉSTAMO */}
                    {view === 'assign_loan' && selectedClient && (
                        <div className="animate-in bg-white min-h-screen pb-20">
                            <header className="p-6 border-b flex items-center gap-4 bg-white sticky top-0 z-10 shadow-sm"><button onClick={() => setView('profile')} className="p-3 text-slate-400"><Icon name="arrow-left"/></button><h2 className="heading-font text-xl font-black text-slate-800">Asignar Préstamo</h2></header>
                            
                            <form onSubmit={(e) => { 
                                e.preventDefault(); 
                                const { amount, interest, installments, type, interestType, frequency, startDate } = loanForm;
                                const loanData = { 
                                    amount: parseFloat(amount), interest: parseFloat(interest), totalInstallments: parseInt(installments) || 1, paidInstallments: 0, 
                                    type, interestType: type === 'Rédito' ? 'N/A' : interestType, frequency, 
                                    totalToPay: loanPreview.totalToPay, installmentAmount: loanPreview.installmentAmount, 
                                    startDate: formatDate(parseDateString(startDate)), nextPaymentDate: calculateNextDate(formatDate(parseDateString(startDate)), frequency) 
                                }; 
                                if (userProfile?.role === 'admin') {
                                    db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ totalDebt: loanPreview.totalToPay, loan: loanData }); 
                                    showNotify("Préstamo Asignado"); 
                                } else {
                                    db.collection('users').doc(adminUid).collection('clients').doc(selectedClientId).update({ pendingLoan: loanData }); 
                                    showNotify("Préstamo enviado para aprobación"); 
                                }
                                setView('profile'); 
                            }} className="p-6 space-y-6">
                                <div className="bg-slate-900 text-white rounded-[2rem] p-6 shadow-xl relative overflow-hidden">
